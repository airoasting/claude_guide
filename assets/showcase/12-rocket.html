<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>로켓 발사 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230b1a33'/><path d='M50 14c12 8 14 26 12 40l-6 8H44l-6-8c-2-14 0-32 12-40z' fill='%23e6ebf2'/><circle cx='50' cy='42' r='6' fill='%2358b0ff'/></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',"Helvetica Neue",Arial,sans-serif;
    background:#000;display:flex;align-items:center;justify-content:center;padding:8px;color:#dfe6f0}
  .stage{position:relative;width:300px;height:340px;border-radius:16px;overflow:hidden;
    background:linear-gradient(#0a1b3a 0%,#0c2249 42%,#123158 72%,#1d3a52 100%);
    box-shadow:0 16px 36px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.05);
    transition:background 1.4s ease}
  .stage.launched{background:linear-gradient(#01040c 0%,#04091c 46%,#06122c 100%)}
  .stars{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1}
  .stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;opacity:.7}
  .slayer{position:absolute;left:0;right:0;top:0;height:680px;will-change:transform}
  .stars.scroll .slayer.far{animation:starScroll 3.4s linear infinite}
  .stars.scroll .slayer.near{animation:starScroll 1.7s linear infinite}
  @keyframes starScroll{from{transform:translateY(-340px)}to{transform:translateY(0)}}
  .hud{position:relative;z-index:3;text-align:center;padding-top:14px}
  .status{font-size:11px;font-weight:800;letter-spacing:2px;color:#7fa6d8}
  .status.go{color:#5fd38a}.status.abort{color:#ff8a6a}
  .time{font-weight:800;font-variant-numeric:tabular-nums;font-size:34px;letter-spacing:1px;margin-top:4px;color:#eef3fb}
  .time .tp{color:#ffb454}.time .cs{font-size:19px;color:#9bb3d4}
  /* 로켓 (카메라가 추적: 로켓은 머무르고 배경이 흐른다) */
  .rocket-track{position:absolute;left:64px;bottom:96px;width:40px;height:96px;z-index:2;
    transition:transform .6s ease}
  .rocket-track.up{animation:liftoff 1.2s cubic-bezier(.45,.05,.35,1) forwards}
  @keyframes liftoff{0%{transform:translateY(0)}100%{transform:translateY(-58px)}}
  .rocket{position:relative;width:40px;height:96px}
  .rocket.thrust{animation:bob 1.8s ease-in-out infinite,shake .09s linear infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  @keyframes shake{0%,100%{margin-left:0}25%{margin-left:.7px}75%{margin-left:-.7px}}
  .body{position:absolute;left:11px;top:0;width:18px;height:64px;border-radius:50% 50% 22% 22%/40% 40% 12% 12%;
    background:linear-gradient(90deg,#c7ced8 0%,#fff 40%,#aab2bf 100%)}
  .stripe{position:absolute;left:11px;top:30px;width:18px;height:16px;background:#e8722e;opacity:.92}
  .win{position:absolute;left:16px;top:14px;width:8px;height:8px;border-radius:50%;background:#58b0ff;box-shadow:0 0 6px #58b0ff}
  .finL,.finR{position:absolute;top:46px;width:11px;height:20px;background:#9aa3b0}
  .finL{left:2px;border-radius:60% 0 0 60%;transform:skewY(24deg)}
  .finR{right:2px;border-radius:0 60% 60% 0;transform:skewY(-24deg)}
  .flame{position:absolute;left:14px;top:62px;width:12px;height:0;border-radius:0 0 50% 50%;
    background:linear-gradient(#ffd24a,#ff7a2e 60%,transparent);filter:blur(.4px);transition:height .15s}
  .rocket.thrust .flame{height:30px;animation:fl .12s infinite alternate}
  @keyframes fl{to{height:38px;opacity:.8}}
  /* 발사대 (상승하면 아래로 멀어진다) */
  .tower{position:absolute;left:110px;bottom:64px;width:14px;height:150px;z-index:1;
    background:repeating-linear-gradient(#5a6b7d 0 8px,#3f4d5c 8px 13px);border-radius:2px;opacity:.85;
    transition:transform .6s ease,opacity .6s ease}
  .ground{position:absolute;left:0;right:0;bottom:60px;height:18px;z-index:1;
    background:linear-gradient(#23415a,#16314a);transition:transform .6s ease,opacity .6s ease}
  .launched .tower,.launched .ground{animation:exitDown 1.2s ease-in forwards}
  @keyframes exitDown{to{transform:translateY(150px);opacity:0}}
  /* 랩 기록 패널 */
  .laps{position:absolute;left:10px;right:10px;bottom:64px;z-index:3;max-height:66px;overflow-y:auto;
    display:none;flex-direction:column;gap:3px;padding:6px 8px;border-radius:9px;
    background:rgba(4,10,24,.6);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .laps.show{display:flex}
  .lap{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;font-variant-numeric:tabular-nums}
  .lap .ln{color:#ffb454;min-width:40px}
  .lap .lt{color:#eef3fb}
  .lap .ls{margin-left:auto;color:#9bb3d4}
  .row{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;gap:7px;padding:10px;
    background:linear-gradient(transparent,rgba(4,12,26,.85) 40%)}
  button{flex:1;font-family:inherit;font-weight:800;font-size:12px;padding:11px 0;border:none;border-radius:10px;cursor:pointer;
    color:#eaf1fb;transition:transform .06s,filter .15s}
  button:active{transform:translateY(1px)}
  #b1{background:#2e7d4f}#b1.run{background:#9c3a2c}#b2{background:#3f5a78}#b3{background:#48505e}
  button:disabled{opacity:.4;cursor:default}
  button:focus-visible{outline:2px solid #ffb454;outline-offset:2px}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="stars" id="stars" aria-hidden="true"></div>
    <div class="hud">
      <div class="status" id="status">발사 준비 (READY)</div>
      <div class="time"><span class="tp">T+</span><span id="t">00:00<span class="cs">.00</span></span></div>
    </div>
    <div class="ground" aria-hidden="true"></div>
    <div class="tower" aria-hidden="true"></div>
    <div class="rocket-track" id="track" aria-hidden="true">
      <div class="rocket" id="rocket">
        <span class="finL"></span><span class="finR"></span>
        <span class="body"></span><span class="stripe"></span><span class="win"></span>
        <span class="flame"></span>
      </div>
    </div>
    <div class="laps" id="laps" aria-live="polite"></div>
    <div class="row">
      <button id="b1">Start</button>
      <button id="b2" disabled>Lap</button>
      <button id="b3" disabled>Reset</button>
    </div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),
      status=document.getElementById('status'),rocket=document.getElementById('rocket'),stars=document.getElementById('stars'),
      stage=document.getElementById('stage'),track=document.getElementById('track'),lapsEl=document.getElementById('laps');
  // 별 — 두 겹(원경 느림 / 근경 빠름)으로 패럴랙스, 340px 단위로 복제해 끊김 없이 스크롤
  var seed=7;function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
  function star(layer,x,y,op,sz){var e=document.createElement('i');e.style.left=x+'%';e.style.top=y+'px';e.style.opacity=op;if(sz){e.style.width=e.style.height=sz;}layer.appendChild(e);}
  function build(klass,count,oMin,oMax,bigThresh,bigSize){
    var layer=document.createElement('div');layer.className='slayer '+klass;
    for(var i=0;i<count;i++){
      var x=(rnd()*100).toFixed(1),y=rnd()*340,op=(oMin+rnd()*(oMax-oMin)).toFixed(2),sz=rnd()>bigThresh?bigSize:null;
      star(layer,x,y,op,sz);star(layer,x,y+340,op,sz);
    }
    stars.appendChild(layer);
  }
  build('far',24,0.25,0.55,1,null);
  build('near',15,0.55,0.95,0.6,'3px');
  var run=false,st=0,acc=0,iv=null,launched=false,laps=[];
  function el(){return acc+(run?performance.now()-st:0);}
  function parts(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);return[mm,ss,cc];}
  function pad(n){return String(n).padStart(2,'0');}
  function f(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1])+'<span class="cs">.'+pad(p[2])+'</span>';}
  function fp(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1])+'.'+pad(p[2]);}
  function draw(){t.innerHTML=f(el());}
  function lap(){ // 누른 순간의 T+ 시각을 기록(직전 랩과의 구간도 함께)
    if(!run)return;laps.push(el());renderLaps();
  }
  function renderLaps(){
    if(!laps.length){lapsEl.classList.remove('show');lapsEl.innerHTML='';return;}
    var h='';
    for(var i=laps.length-1,end=Math.max(0,laps.length-3);i>=end;i--){ // 최근 3개만 표시(이전 것 대체)
      var split=laps[i]-(i>0?laps[i-1]:0);
      h+='<div class="lap"><span class="ln">LAP '+(i+1)+'</span><span class="lt">T+'+fp(laps[i])+'</span><span class="ls">+'+fp(split)+'</span></div>';
    }
    lapsEl.innerHTML=h;lapsEl.classList.add('show');
  }
  function ui(){
    b1.textContent=run?'Stop':'Start';b1.classList.toggle('run',run);
    b2.disabled=!run;b3.disabled=run||el()===0;
    if(run){status.textContent='발사 (LAUNCH)';status.className='status go';}
    else if(el()>0){status.textContent='발사 중단 (ABORT)';status.className='status abort';}
    else{status.textContent='발사 준비 (READY)';status.className='status';}
  }
  function start(){
    run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);
    if(!launched){launched=true;stage.classList.add('launched');track.classList.add('up');} // 발사대 이탈은 한 번만
    stars.classList.add('scroll');rocket.classList.add('thrust');                            // 카메라 추적 시작(배경 흐름+추력)
    draw();ui();
  }
  function stop(){
    if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;
    stars.classList.remove('scroll');rocket.classList.remove('thrust');                       // 중단: 로켓은 공중에 머물고 흐름만 정지
    draw();ui();
  }
  function reset(){
    run=false;clearInterval(iv);iv=null;acc=0;st=0;launched=false;laps=[];renderLaps();
    stage.classList.remove('launched');track.classList.remove('up');
    stars.classList.remove('scroll');rocket.classList.remove('thrust');                       // 로켓이 발사대로 복귀
    draw();ui();
  }
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
