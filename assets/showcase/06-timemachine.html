<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>타임머신</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><polygon points='50,10 90,90 10,90' fill='%23F2415E'/></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Arial Black","Helvetica Neue",Arial,'Pretendard',sans-serif;background:#F1ECE2;
    display:flex;align-items:center;justify-content:center;color:#111;padding:14px;overflow:hidden;position:relative}
  .shape{position:absolute;z-index:0}
  .s-yel{top:6%;left:4%;width:64px;height:64px;border-radius:50%;background:#FFC400}
  .s-pur{top:20%;left:20%;width:30px;height:30px;border-radius:50%;background:#B061E0}
  .s-tri{top:8%;right:5%;width:0;height:0;border-left:42px solid transparent;border-right:42px solid transparent;border-bottom:70px solid #F2415E;transform:rotate(18deg)}
  .s-blu{bottom:5%;left:5%;width:56px;height:56px;background:#1E7BE0;transform:rotate(12deg)}
  .s-ring{bottom:6%;right:6%;width:60px;height:60px;border-radius:50%;border:11px solid #21C24A;background:none}
  .s-sq{bottom:8%;left:46%;width:70px;height:20px;border-bottom:6px solid #111;border-radius:0 0 60% 60%}
  .card{position:relative;z-index:1;background:#FFFDF7;border:3px solid #111;border-radius:22px;
    box-shadow:9px 9px 0 #111;padding:18px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;width:248px}
  .pill{background:#FF9E1B;border:2.5px solid #111;border-radius:20px;font-size:12px;font-weight:900;letter-spacing:.14em;padding:5px 14px}
  .time{font-weight:900;font-variant-numeric:tabular-nums;font-size:38px;letter-spacing:-1px;color:#111}
  .time .cs{font-size:26px}
  .row{display:flex;gap:8px}
  button{font-family:inherit;font-weight:900;font-size:13px;cursor:pointer;padding:11px 0;width:70px;border:2.5px solid #111;border-radius:18px;
    color:#111;transition:transform .07s}
  button:active{transform:translate(2px,2px)}
  #b1{background:#27C24A;color:#fff}#b1.run{background:#F2415E;color:#fff}#b2{background:#9CC8F0}#b3{background:#fff}
  button:disabled{opacity:.5;cursor:default}
  .laps{width:100%;display:flex;flex-direction:column;gap:5px;max-height:78px;overflow:auto}
  .laps div{display:flex;justify-content:space-between;background:#FBF0C8;border:1.5px dashed #B59A2A;border-radius:8px;padding:5px 10px;
    font-size:12px;font-weight:800;font-variant-numeric:tabular-nums}
  button:focus-visible{outline:3px solid #1E7BE0;outline-offset:2px}
</style>
</head>
<body>
  <span class="shape s-yel"></span><span class="shape s-pur"></span><span class="shape s-tri"></span>
  <span class="shape s-blu"></span><span class="shape s-ring"></span><span class="shape s-sq"></span>
  <div class="card">
    <span class="pill">TEMPO</span>
    <div class="time"><span id="t">00:00<span class="cs">.00</span></span></div>
    <div class="row">
      <button id="b1">시작</button>
      <button id="b2" disabled>랩</button>
      <button id="b3" disabled>리셋</button>
    </div>
    <div class="laps" id="laps"></div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lapsEl=document.getElementById('laps');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'정지':(el()>0?'재개':'시작');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lapsEl.innerHTML='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push({sp:sp,tot:e});render();}
  function render(){lapsEl.innerHTML='';for(var i=laps.length-1;i>=0;i--){var d=document.createElement('div');
    d.innerHTML='<span>랩 '+(i+1)+'</span><span>'+plain(laps[i].tot)+'</span>';lapsEl.appendChild(d);}}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
