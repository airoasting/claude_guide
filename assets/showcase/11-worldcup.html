<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>월드컵 응원석 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a1430'/><rect y='66' width='100' height='34' fill='%231f7a3d'/><circle cx='50' cy='44' r='15' fill='%23f3f4f6'/><path d='M50 31a13 13 0 0 1 0 26z' fill='%23cd2e3a'/><path d='M50 31a13 13 0 0 0 0 26z' fill='%230047a0'/></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',"Helvetica Neue",Arial,sans-serif;
    background:#000;display:flex;align-items:center;justify-content:center;padding:8px;color:#dfe6f0}
  .stage{position:relative;width:300px;height:340px;border-radius:16px;overflow:hidden;
    background:linear-gradient(#0a1430 0%,#0f1e44 58%,#16285a 100%);
    box-shadow:0 16px 36px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.05)}
  /* 경기장 배경 */
  .field{position:absolute;inset:0;z-index:1}
  .lights{position:absolute;inset:0;pointer-events:none;background:
    radial-gradient(130px 90px at 12% -6%,rgba(186,206,255,.20),transparent 70%),
    radial-gradient(130px 90px at 88% -6%,rgba(186,206,255,.20),transparent 70%)}
  .crowd{position:absolute;inset:0;pointer-events:none}
  .crowd i{position:absolute;width:5px;height:5px;border-radius:50%;background:#d7263d;opacity:.85;
    animation:wave 2.4s ease-in-out infinite}            /* 관중은 항상 잔잔히 출렁 */
  .field.live .crowd i{animation-duration:1.4s}          /* 경기 중 빨라짐 */
  .field.goal .crowd i{animation-duration:.42s}          /* 골 때 격해짐 */
  @keyframes wave{0%,100%{transform:translateY(0);filter:brightness(1)}50%{transform:translateY(-3px);filter:brightness(1.6)}}
  /* 태극기 */
  .flag{position:absolute;z-index:2;width:30px;height:20px;transform-origin:left center;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.45))}
  .flag svg{display:block;width:100%;height:100%}
  .flag.f1{left:14px;top:112px}.flag.f2{right:14px;top:146px}
  .field.live .flag{animation:flagwave 1.1s ease-in-out infinite}
  .field.goal .flag{animation:flagwave .34s ease-in-out infinite}
  @keyframes flagwave{0%,100%{transform:rotate(-5deg) skewX(0)}50%{transform:rotate(5deg) skewX(-7deg)}}
  /* 잔디 */
  .pitch{position:absolute;left:0;right:0;bottom:0;height:98px;overflow:hidden;
    background:repeating-linear-gradient(90deg,#1f7a3d 0 22px,#1b6e36 22px 44px);
    box-shadow:inset 0 3px 6px rgba(255,255,255,.06)}
  .pitch .midline{position:absolute;left:0;right:0;top:0;height:2px;background:rgba(255,255,255,.45)}
  .pitch .circle{position:absolute;left:50%;bottom:-44px;transform:translateX(-50%);
    width:118px;height:118px;border:2px solid rgba(255,255,255,.45);border-radius:50%}
  /* 전광판 */
  .board{position:relative;z-index:3;text-align:center;padding-top:11px;
    background:linear-gradient(rgba(5,12,30,.72),rgba(5,12,30,0))}
  .status{font-size:11px;font-weight:800;letter-spacing:2px;color:#9fb4d8}
  .status.live{color:#5fd38a}.status.half{color:#ffb454}
  .score{display:flex;align-items:center;justify-content:center;gap:9px;margin-top:5px}
  .score .tm{font-size:11px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:6px}
  .score .tm.kor{color:#fff;background:#cd2e3a}
  .score .tm.wld{color:#cdd8ea;background:rgba(255,255,255,.12)}
  .score b{display:inline-block;font-size:30px;font-weight:900;font-variant-numeric:tabular-nums;min-width:24px;color:#eef3fb}
  .score b#sk{color:#ff5a6e}
  .score b.pop{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.55);color:#ffd24a}100%{transform:scale(1)}}
  .score .cln{font-size:22px;font-weight:800;color:#7f93b4}
  .clock{margin-top:3px;font-size:21px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px;color:#cfe0f5}
  .clock .cs{font-size:13px;color:#8aa0c4}
  .last{height:15px;margin-top:3px;font-size:10px;font-weight:700;letter-spacing:.5px;color:#ffb454}
  /* 골 연출 */
  .goalflash{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;opacity:0;pointer-events:none}
  .goalflash .g{font-size:46px;font-weight:900;letter-spacing:2px;color:#fff;text-shadow:0 0 16px #ff3b52,0 0 4px #fff}
  .goalflash .kr{font-size:15px;font-weight:800;letter-spacing:4px;color:#ffd24a}
  .goalflash.show{animation:goalpop .85s ease-out}
  @keyframes goalpop{0%{opacity:0;transform:scale(.6)}18%{opacity:1;transform:scale(1.12)}70%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1)}}
  /* 버튼 */
  .row{position:absolute;left:0;right:0;bottom:0;z-index:4;display:flex;gap:7px;padding:10px;
    background:linear-gradient(transparent,rgba(4,10,24,.88) 42%)}
  button{flex:1;font-family:inherit;font-weight:800;font-size:12px;padding:11px 0;border:none;border-radius:10px;cursor:pointer;
    color:#fff;transition:transform .06s,filter .15s}
  button:active{transform:translateY(1px)}
  #b1{background:#1f9d57}#b1.run{background:#c0392b}#b2{background:#c98a1e}#b3{background:#48505e}
  button:disabled{opacity:.4;cursor:default}
  button:focus-visible{outline:2px solid #ffd24a;outline-offset:2px}
</style>
</head>
<body>
  <div class="stage" id="stage">
    <div class="field" id="field">
      <div class="lights" aria-hidden="true"></div>
      <div class="crowd" id="crowd" aria-hidden="true"></div>
      <div class="flag f1" aria-hidden="true">
        <svg viewBox="0 0 36 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="24" fill="#f5f6f7"/>
          <circle cx="18" cy="12" r="6" fill="#0047a0"/>
          <path d="M12 12 A6 6 0 0 1 24 12 Z" fill="#cd2e3a"/>
          <circle cx="15" cy="12" r="3" fill="#0047a0"/>
          <circle cx="21" cy="12" r="3" fill="#cd2e3a"/>
          <g fill="#111">
            <rect x="3.5" y="3.15" width="7" height="0.9"/><rect x="3.5" y="5.55" width="7" height="0.9"/><rect x="3.5" y="7.95" width="7" height="0.9"/>
            <rect x="25.5" y="3.15" width="2.8" height="0.9"/><rect x="29.7" y="3.15" width="2.8" height="0.9"/><rect x="25.5" y="5.55" width="7" height="0.9"/><rect x="25.5" y="7.95" width="2.8" height="0.9"/><rect x="29.7" y="7.95" width="2.8" height="0.9"/>
            <rect x="3.5" y="15.15" width="7" height="0.9"/><rect x="3.5" y="17.55" width="2.8" height="0.9"/><rect x="7.7" y="17.55" width="2.8" height="0.9"/><rect x="3.5" y="19.95" width="7" height="0.9"/>
            <rect x="25.5" y="15.15" width="2.8" height="0.9"/><rect x="29.7" y="15.15" width="2.8" height="0.9"/><rect x="25.5" y="17.55" width="2.8" height="0.9"/><rect x="29.7" y="17.55" width="2.8" height="0.9"/><rect x="25.5" y="19.95" width="2.8" height="0.9"/><rect x="29.7" y="19.95" width="2.8" height="0.9"/>
          </g>
        </svg>
      </div>
      <div class="flag f2" aria-hidden="true">
        <svg viewBox="0 0 36 24" xmlns="http://www.w3.org/2000/svg">
          <rect width="36" height="24" fill="#f5f6f7"/>
          <circle cx="18" cy="12" r="6" fill="#0047a0"/>
          <path d="M12 12 A6 6 0 0 1 24 12 Z" fill="#cd2e3a"/>
          <circle cx="15" cy="12" r="3" fill="#0047a0"/>
          <circle cx="21" cy="12" r="3" fill="#cd2e3a"/>
          <g fill="#111">
            <rect x="3.5" y="3.15" width="7" height="0.9"/><rect x="3.5" y="5.55" width="7" height="0.9"/><rect x="3.5" y="7.95" width="7" height="0.9"/>
            <rect x="25.5" y="3.15" width="2.8" height="0.9"/><rect x="29.7" y="3.15" width="2.8" height="0.9"/><rect x="25.5" y="5.55" width="7" height="0.9"/><rect x="25.5" y="7.95" width="2.8" height="0.9"/><rect x="29.7" y="7.95" width="2.8" height="0.9"/>
            <rect x="3.5" y="15.15" width="7" height="0.9"/><rect x="3.5" y="17.55" width="2.8" height="0.9"/><rect x="7.7" y="17.55" width="2.8" height="0.9"/><rect x="3.5" y="19.95" width="7" height="0.9"/>
            <rect x="25.5" y="15.15" width="2.8" height="0.9"/><rect x="29.7" y="15.15" width="2.8" height="0.9"/><rect x="25.5" y="17.55" width="2.8" height="0.9"/><rect x="29.7" y="17.55" width="2.8" height="0.9"/><rect x="25.5" y="19.95" width="2.8" height="0.9"/><rect x="29.7" y="19.95" width="2.8" height="0.9"/>
          </g>
        </svg>
      </div>
      <div class="pitch" aria-hidden="true"><div class="midline"></div><div class="circle"></div></div>
    </div>
    <div class="board">
      <div class="status" id="status">킥오프 대기 (READY)</div>
      <div class="score">
        <span class="tm kor">KOR</span>
        <b id="sk">0</b><span class="cln">:</span><b id="sw">0</b>
        <span class="tm wld">WLD</span>
      </div>
      <div class="clock"><span id="t">00:00<span class="cs">.00</span></span></div>
      <div class="last" id="last"></div>
    </div>
    <div class="goalflash" id="gf"><span class="g">GOAL!</span><span class="kr">대한민국</span></div>
    <div class="row">
      <button id="b1">킥오프</button>
      <button id="b2" disabled>⚽ 골!</button>
      <button id="b3" disabled>리셋</button>
    </div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),
      status=document.getElementById('status'),field=document.getElementById('field'),crowd=document.getElementById('crowd'),
      gf=document.getElementById('gf'),sk=document.getElementById('sk'),last=document.getElementById('last');
  // 관중석 — 붉은 악마 물결(좌→우로 번지도록 x에 따라 딜레이)
  var seed=11;function rnd(){seed=(seed*9301+49297)%233280;return seed/233280;}
  for(var i=0;i<56;i++){
    var d=document.createElement('i'),x=rnd()*100,y=94+rnd()*138,r=rnd();
    d.style.left=x.toFixed(1)+'%';d.style.top=y.toFixed(0)+'px';
    if(r>0.86){d.style.background='#eef2f8';}        // 흰 옷
    else if(r>0.78){d.style.background='#2a6bd4';}   // 파란 옷
    d.style.opacity=(0.55+rnd()*0.4).toFixed(2);
    if(rnd()>0.8){d.style.width=d.style.height='6px';}
    d.style.animationDelay=(x/100*1.1).toFixed(2)+'s';
    crowd.appendChild(d);
  }
  var run=false,st=0,acc=0,iv=null,score=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function parts(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);return[mm,ss,cc];}
  function pad(n){return String(n).padStart(2,'0');}
  function f(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1])+'<span class="cs">.'+pad(p[2])+'</span>';}
  function fp(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1]);}
  function draw(){t.innerHTML=f(el());}
  function goal(){ // 골! — 한국 득점, 전광판 +1 + 함성 연출
    if(!run)return;
    score++;sk.textContent=score;last.textContent='직전 골 '+fp(el());
    gf.classList.remove('show');void gf.offsetWidth;gf.classList.add('show');
    sk.classList.remove('pop');void sk.offsetWidth;sk.classList.add('pop');
    field.classList.add('goal');setTimeout(function(){field.classList.remove('goal');},700);
  }
  function ui(){
    b1.textContent=run?'정지':(el()>0?'후반전':'킥오프');b1.classList.toggle('run',run);
    b2.disabled=!run;b3.disabled=run||el()===0;
    if(run){status.textContent='경기 중 (LIVE)';status.className='status live';}
    else if(el()>0){status.textContent='하프타임 (HALF TIME)';status.className='status half';}
    else{status.textContent='킥오프 대기 (READY)';status.className='status';}
  }
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);field.classList.add('live');draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;field.classList.remove('live');draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;score=0;sk.textContent='0';last.textContent='';
    field.classList.remove('live','goal');draw();ui();}
  b1.onclick=function(){run?stop():start();};b2.onclick=goal;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
