<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>이중섭 황소 타이머</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23c33f27'/><text y='.9em' font-size='80'>🐂</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:Georgia,"Times New Roman",'Pretendard',serif;
    background:#542617;
    display:flex;align-items:center;justify-content:center;color:#f3e2c0;padding:14px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:288px}
  /* 원작 이미지(흰 여백 크롭본). 그림만 노출, 서명 포함 */
  .art{width:256px;overflow:hidden;border-radius:3px;
    border:1px solid rgba(0,0,0,.3);box-shadow:0 10px 22px rgba(20,6,2,.5)}
  .art img{width:100%;display:block}
  .cap{font-size:11px;font-style:italic;color:#d9b07e;letter-spacing:.5px;margin-top:-2px}
  .time{font-family:Georgia,serif;font-weight:700;font-size:40px;color:#f6e8c6;letter-spacing:1px;text-shadow:1px 1px 0 rgba(20,6,2,.5)}
  .time .cs{font-size:18px;color:#f0b24a}
  .row{display:flex;gap:8px}
  button{font-family:Georgia,'Pretendard',serif;font-weight:700;font-size:14px;cursor:pointer;padding:11px 0;width:80px;
    border:2px solid #2a1206;background:#e6d3b0;color:#2a1206;border-radius:2px;transition:transform .07s,background .15s;
    box-shadow:3px 3px 0 rgba(20,6,2,.85)}
  button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(20,6,2,.85)}
  #b1{background:#d68f2c;border-color:#5e2e0c}#b1.run{background:#9e2e1a;color:#fff;border-color:#4e1810}
  #b2{background:#7a4a26;color:#fff}#b3{background:#e6d3b0}
  button:disabled{opacity:.42;cursor:default}
  .lp{font-size:12px;color:#f0c98a;min-height:15px;font-style:italic}
  button:focus-visible{outline:3px solid #f0b24a;outline-offset:2px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="art"><img src="15-bull.jpg" alt="이중섭, 황소" /></div>
    <div class="cap">이중섭 &middot; 황소</div>
    <div class="time"><span id="t">00:00<span class="cs">.00</span></span></div>
    <div class="row">
      <button id="b2" disabled>랩</button>
      <button id="b1">시작</button>
      <button id="b3" disabled>초기화</button>
    </div>
    <div class="lp" id="lp"></div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lp=document.getElementById('lp');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'정지':(el()>0?'재개':'시작');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lp.textContent='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push(sp);lp.textContent='구간 '+laps.length+'  +'+plain(sp);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
