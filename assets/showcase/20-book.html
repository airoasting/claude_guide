<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>책장 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='14' y='18' width='72' height='64' rx='4' fill='%233a1d22'/><rect x='18' y='22' width='32' height='56' fill='%23f4ead2'/><rect x='50' y='22' width='32' height='56' fill='%23efe3c6'/><path d='M14 18h72v64h-72z' fill='none' stroke='%23C9A24A' stroke-width='2'/></svg>" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%}
  body{word-break:keep-all;font-family:Georgia,'Nanum Myeongjo','Batang',serif;
    background:
      radial-gradient(1.4px 1.4px at 12% 20%,rgba(255,244,200,.75),transparent),
      radial-gradient(1.2px 1.2px at 86% 14%,rgba(255,244,200,.6),transparent),
      radial-gradient(1px 1px at 22% 76%,rgba(255,244,200,.55),transparent),
      radial-gradient(1.3px 1.3px at 74% 82%,rgba(255,244,200,.6),transparent),
      radial-gradient(1px 1px at 92% 55%,rgba(255,244,200,.5),transparent),
      radial-gradient(1px 1px at 6% 50%,rgba(255,244,200,.5),transparent),
      radial-gradient(circle at 50% 16%,#3a2c40 0%,#241a30 46%,#150e1e 100%);
    display:flex;align-items:center;justify-content:center;padding:8px;color:#2b2115}

  .stage{position:relative;width:312px;height:340px;display:flex;flex-direction:column;align-items:center}

  /* ── 책 (그리모어 느낌: 금장 트림 + 코너 장식) ── */
  .book{position:relative;width:300px;height:266px;margin-top:10px;padding:11px;border-radius:11px;
    background:linear-gradient(160deg,#5a2e34 0%,#3a1d22 52%,#241014 100%);
    box-shadow:0 16px 28px rgba(0,0,0,.55),inset 0 0 0 1px rgba(201,162,71,.35),inset 0 1px 2px rgba(255,255,255,.1);
    perspective:900px}
  .corner{position:absolute;width:14px;height:14px;border:1.5px solid #C9A24A;opacity:.85;pointer-events:none;z-index:4}
  .corner.tl{top:5px;left:5px;border-right:0;border-bottom:0;border-radius:5px 0 0 0}
  .corner.tr{top:5px;right:5px;border-left:0;border-bottom:0;border-radius:0 5px 0 0}
  .corner.bl{bottom:5px;left:5px;border-right:0;border-top:0;border-radius:0 0 0 5px}
  .corner.br{bottom:5px;right:5px;border-left:0;border-top:0;border-radius:0 0 5px 0}
  .stack{position:absolute;right:2px;bottom:6px;top:16px;width:5px;pointer-events:none;
    background:repeating-linear-gradient(180deg,#e7d9b4 0 2px,#d6c495 2px 3px);
    box-shadow:1px 0 0 rgba(0,0,0,.15);border-radius:0 2px 2px 0;opacity:.85}
  .spread{position:relative;width:100%;height:100%;display:flex;border-radius:2px;overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,.35)}
  .page{position:relative;flex:1;background:
    repeating-linear-gradient(180deg,transparent 0 25px,rgba(120,92,48,.07) 25px 26px),
    linear-gradient(120deg,#faf2dd 0%,#f0e2c1 100%);overflow:hidden}
  .page::before{content:'';position:absolute;top:0;bottom:0;width:16px;z-index:1}
  .page-left::before{right:0;background:linear-gradient(90deg,rgba(60,36,10,.22),transparent)}
  .page-right::before{left:0;background:linear-gradient(270deg,rgba(60,36,10,.22),transparent)}
  .curl{position:absolute;right:0;bottom:0;width:22px;height:22px;z-index:1;pointer-events:none;
    background:linear-gradient(135deg,transparent 50%,rgba(0,0,0,.12) 50%,rgba(0,0,0,.05) 62%,transparent 64%),
    linear-gradient(315deg,#f6ecd3 50%,transparent 50%);
    box-shadow:-2px -2px 4px rgba(0,0,0,.1)}
  .spine{width:6px;flex:none;background:linear-gradient(90deg,rgba(0,0,0,.5),rgba(0,0,0,.08) 30%,rgba(0,0,0,.08) 70%,rgba(0,0,0,.5))}
  .ribbon{position:absolute;top:-11px;left:38%;width:11px;height:32px;z-index:5;
    background:linear-gradient(180deg,#a52d3d,#7d1f2c);
    clip-path:polygon(0 0,100% 0,100% 100%,50% 76%,0 100%);
    box-shadow:1px 0 2px rgba(0,0,0,.3),inset 0 0 0 1px rgba(201,162,71,.55)}

  /* ── 왼쪽 페이지 (랩 기록) ── */
  .page-left{padding:13px 13px 10px;display:flex;flex-direction:column}
  .pl-head{font-size:9px;letter-spacing:2.5px;font-weight:700;color:#9a7a45;text-align:center}
  .pl-rule{width:34px;height:1px;background:linear-gradient(90deg,transparent,#C9A24A,transparent);margin:5px auto 9px}
  .lap-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .lap-empty{margin-top:26px;text-align:center;font-size:10px;color:#a89568;font-style:italic;line-height:1.6}
  .lap-row{display:flex;align-items:baseline;gap:4px;font-size:10px;color:#3a2c18;line-height:1.3;
    animation:lapIn .25s ease}
  @keyframes lapIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
  .lap-row .n{font-weight:700;color:#8c2432;min-width:28px;font-style:italic}
  .lap-row .leader{flex:1;border-bottom:1px dotted #b8a679;height:1px;margin:0 2px 2px;min-width:6px}
  .lap-row .v{font-variant-numeric:tabular-nums;font-size:9.5px;color:#5c4a2c;white-space:nowrap}
  .lap-list::-webkit-scrollbar{width:4px}
  .lap-list::-webkit-scrollbar-thumb{background:#c9b98a;border-radius:3px}

  /* ── 오른쪽 페이지 (시간 + 페이지 넘김) ── */
  .page-right{padding:13px 13px 10px;display:flex;flex-direction:column;align-items:center}
  .folio{align-self:flex-end;position:relative;width:38px;height:15px;perspective:240px;margin-bottom:20px}
  .flap{position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;
    font-family:Georgia,serif;font-style:italic;font-size:11px;font-weight:700;color:#a3781f;
    text-shadow:0 0 5px rgba(201,162,71,.4);backface-visibility:hidden}
  .flap-base{transform:rotateX(0)}
  .flap-top{transform-origin:50% 100%;transform:rotateX(0deg)}
  .flap-top.turn{transition:transform .46s cubic-bezier(.4,.1,.3,1);transform:rotateX(-140deg)}
  .pr-status{font-size:9px;letter-spacing:2px;font-weight:700;color:#8c6a34}
  .pr-status.run{color:#6a3a7a}
  .time{margin-top:9px;font-weight:700;font-variant-numeric:tabular-nums;font-size:31px;letter-spacing:.5px;color:#2b2115;
    text-shadow:0 0 10px rgba(120,60,140,.18)}
  .time .cs{font-size:16px;color:#8c6a34}
  .pr-foot{margin-top:auto;font-size:8.5px;letter-spacing:.5px;color:#b8a679;text-align:center;line-height:1.6}

  /* ── 버튼 ── */
  .row{display:flex;gap:7px;padding:10px 4px 0;width:290px}
  button{flex:1;font-family:Georgia,'Nanum Myeongjo',serif;font-weight:700;font-size:12px;padding:11px 0;
    border:1px solid rgba(201,162,71,.4);border-radius:8px;cursor:pointer;color:#f4ead2;transition:transform .06s,filter .15s,background .15s}
  button:active{transform:translateY(1px)}
  button:hover:not(:disabled){filter:brightness(1.08)}
  #b1{background:linear-gradient(180deg,#6b4527,#4d2f18)}#b1.run{background:linear-gradient(180deg,#8c2432,#6a1b26)}
  #b2{background:linear-gradient(180deg,#9a7a45,#7d6236)}#b3{background:linear-gradient(180deg,#5a4a38,#443627)}
  button:disabled{opacity:.42;cursor:default}
  button:focus-visible{outline:2px solid #d9b25a;outline-offset:2px}
</style>
</head>
<body>
  <div class="stage">
    <div class="book" id="book">
      <span class="corner tl" aria-hidden="true"></span><span class="corner tr" aria-hidden="true"></span>
      <span class="corner bl" aria-hidden="true"></span><span class="corner br" aria-hidden="true"></span>
      <div class="ribbon"></div>
      <div class="spread">
        <div class="page page-left">
          <div class="pl-head">기록된 책갈피</div>
          <div class="pl-rule"></div>
          <div class="lap-list" id="laps" aria-live="polite">
            <div class="lap-empty">아직 꽂은 책갈피가 없습니다</div>
          </div>
        </div>
        <div class="spine" aria-hidden="true"></div>
        <div class="page page-right">
          <div class="folio" aria-hidden="true">
            <div class="flap flap-base" id="flapBase"><span>1쪽</span></div>
            <div class="flap flap-top" id="flapTop"><span id="flapTopText">1쪽</span></div>
          </div>
          <div class="pr-status" id="status">덮인 책</div>
          <div class="time" id="t">00:00<span class="cs">.00</span></div>
          <div class="curl" aria-hidden="true"></div>
        </div>
      </div>
      <div class="stack" aria-hidden="true"></div>
    </div>
    <div class="row">
      <button id="b1">시작</button>
      <button id="b2" disabled>랩</button>
      <button id="b3" disabled>초기화</button>
    </div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),
      status=document.getElementById('status'),lapsEl=document.getElementById('laps'),
      flapBase=document.getElementById('flapBase'),flapTop=document.getElementById('flapTop'),flapTopText=document.getElementById('flapTopText');

  var run=false,st=0,acc=0,iv=null,laps=[],page=1,flapTimer=null;

  function el(){return acc+(run?performance.now()-st:0);}
  function parts(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);return[mm,ss,cc];}
  function pad(n){return String(n).padStart(2,'0');}
  function f(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1])+'<span class="cs">.'+pad(p[2])+'</span>';}
  function fp(ms){var p=parts(ms);return pad(p[0])+':'+pad(p[1])+'.'+pad(p[2]);}

  function draw(){t.innerHTML=f(el());}

  // 페이지 플립: 매 정수 초가 바뀔 때 flap-top이 뒤로 넘어가며 base(다음 쪽)를 드러낸다
  var lastSec=-1;
  function syncPage(force){
    var sec=Math.floor(el()/1000);
    if(sec===lastSec && !force)return;
    var jumped=lastSec>=0 && sec-lastSec>1; // 백그라운드 탭 복귀 등으로 여러 초가 한번에 지나간 경우
    lastSec=sec;page=sec+1;
    flapBase.querySelector('span').textContent=page+'쪽';
    if(force||jumped||!run){
      // 애니메이션 없이 즉시 정렬(리셋/큰 점프/정지 상태)
      flapTop.classList.remove('turn');
      flapTop.style.transition='none';
      flapTop.style.transform='rotateX(0deg)';
      flapTopText.textContent=page+'쪽';
      void flapTop.offsetWidth;
      flapTop.style.transition='';
      return;
    }
    // 정상 진행: 이전 쪽을 보여준 채로 뒤로 넘긴다
    flapTopText.textContent=page-1+'쪽';
    flapTop.classList.remove('turn');
    flapTop.style.transform='rotateX(0deg)';
    void flapTop.offsetWidth;
    flapTop.classList.add('turn');
    clearTimeout(flapTimer);
    flapTimer=setTimeout(function(){
      flapTop.classList.remove('turn');
      flapTop.style.transition='none';
      flapTop.style.transform='rotateX(0deg)';
      flapTopText.textContent=page+'쪽';
      void flapTop.offsetWidth;
      flapTop.style.transition='';
    },470);
  }

  function lap(){
    if(!run)return;
    var total=el(),prev=laps.length?laps[laps.length-1].total:0;
    laps.push({total:total,split:total-prev});
    renderLaps();
  }
  function renderLaps(){
    if(!laps.length){lapsEl.innerHTML='<div class="lap-empty">아직 꽂은 책갈피가 없습니다</div>';return;}
    var h='';
    for(var i=laps.length-1;i>=0;i--){
      h+='<div class="lap-row"><span class="n">'+(i+1)+'장</span><span class="leader"></span><span class="v">'+fp(laps[i].total)+'</span></div>';
    }
    lapsEl.innerHTML=h;
    lapsEl.scrollTop=0;
  }

  function ui(){
    b1.textContent=run?'정지':'시작';b1.classList.toggle('run',run);
    b2.disabled=!run;b3.disabled=run||el()===0;
    if(run){status.textContent='읽는 중';status.className='pr-status run';}
    else if(el()>0){status.textContent='잠시 덮음';status.className='pr-status';}
    else{status.textContent='덮인 책';status.className='pr-status';}
  }

  function start(){
    run=true;st=performance.now();if(!iv)iv=setInterval(function(){draw();syncPage(false);},31);
    draw();syncPage(false);ui();
  }
  function stop(){
    if(!run)return;
    acc=el();run=false;clearInterval(iv);iv=null;clearTimeout(flapTimer);
    draw();syncPage(true);ui();
  }
  function reset(){
    run=false;clearInterval(iv);iv=null;clearTimeout(flapTimer);
    acc=0;st=0;laps=[];lastSec=-1;page=1;
    renderLaps();draw();syncPage(true);ui();
  }

  b1.onclick=function(){run?stop():start();};
  b2.onclick=lap;
  b3.onclick=reset;
  document.addEventListener('keydown',function(e){
    if(e.code==='Space'){e.preventDefault();run?stop():start();}
    else if(e.key==='l'||e.key==='L'){lap();}
    else if(e.key==='r'||e.key==='R'){if(!b3.disabled)reset();}
  });
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run){draw();syncPage(true);}});

  draw();syncPage(true);ui();
})();
</script>
</body>
</html>
