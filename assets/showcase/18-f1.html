<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>F1 레이싱 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230a0a0c'/><circle cx='25' cy='40' r='9' fill='%23e10600'/><circle cx='50' cy='40' r='9' fill='%23e10600'/><circle cx='75' cy='40' r='9' fill='%23e10600'/><rect x='14' y='62' width='72' height='10' rx='2' fill='%2325d3d8'/></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../../assets/fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',"Helvetica Neue",Arial,sans-serif;
    background:#000;display:flex;align-items:center;justify-content:center;padding:8px;color:#eef0f3}
  :root{
    --red:#e10600; --cyan:#25d3d8; --purple:#b14bdb; --green:#19e07a; --amber:#ffb020;
    --muted:#8b8f99; --mono:ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace;
  }
  .stage{position:relative;width:300px;height:344px;border-radius:16px;overflow:hidden;
    background:
      radial-gradient(120% 80% at 50% -10%,rgba(37,211,216,.10),transparent 55%),
      linear-gradient(#15161b 0%,#0e0f13 48%,#0a0a0c 100%);
    box-shadow:0 18px 40px rgba(0,0,0,.6),inset 0 0 0 1px rgba(255,255,255,.06);
    display:flex;flex-direction:column}
  /* 카본 위브 텍스처 */
  .stage::before{content:'';position:absolute;inset:0;pointer-events:none;opacity:.5;z-index:0;
    background:
      repeating-linear-gradient(45deg,rgba(255,255,255,.022) 0 2px,transparent 2px 4px),
      repeating-linear-gradient(-45deg,rgba(0,0,0,.10) 0 2px,transparent 2px 4px)}
  /* 라이트 아웃 순간 그린 플래시 (출발) */
  .stage.launch::after{content:'';position:absolute;inset:0;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 40%,rgba(25,224,122,.30),transparent 62%);
    animation:launchFlash .62s ease-out forwards}
  @keyframes launchFlash{0%{opacity:0}18%{opacity:1}100%{opacity:0}}
  /* 상단 RPM 시프트 LED 바 */
  .rpm{position:relative;z-index:2;display:flex;gap:3px;justify-content:center;
    padding:11px 14px 8px}
  .rpm i{width:13px;height:5px;border-radius:2px;background:#22242c;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);transition:background .05s,box-shadow .05s}
  .rpm i.on.g{background:var(--green);box-shadow:0 0 7px rgba(25,224,122,.8)}
  .rpm i.on.y{background:var(--amber);box-shadow:0 0 7px rgba(255,176,32,.8)}
  .rpm i.on.r{background:var(--red);box-shadow:0 0 8px rgba(225,6,0,.9)}
  /* 헤더: 팀명 + 랩 카운터 */
  .hdr{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px 6px}
  .marque{display:flex;align-items:center;gap:7px;font-weight:800;font-size:11px;letter-spacing:1.5px}
  .marque .bar{width:4px;height:13px;background:var(--red);border-radius:1px;
    box-shadow:0 0 8px rgba(225,6,0,.6)}
  .marque b{color:#fff}.marque span{color:var(--cyan)}
  .lapno{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.5px}
  .lapno b{color:#fff;font-size:13px}
  /* 스타트 라이트 갠트리 */
  .lights{position:relative;z-index:2;display:flex;gap:9px;justify-content:center;margin:2px 0 4px}
  .lights .lg{width:21px;height:21px;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#3a0807,#170303 75%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.07),inset 0 -2px 4px rgba(0,0,0,.6);
    transition:background .28s ease,box-shadow .28s ease,transform .28s ease}
  .lights .lg.lit{background:radial-gradient(circle at 38% 32%,#ff5b52,var(--red) 60%,#8c0400);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 0 12px rgba(225,6,0,.85),0 0 22px rgba(225,6,0,.4)}
  /* 그리드 점등은 좌→우 순차(포메이션), 소등은 동시(라이트 아웃 = 출발) */
  .lights.form .lg{animation:lgForm .34s backwards}
  .lights.form .lg:nth-child(2){animation-delay:.09s}
  .lights.form .lg:nth-child(3){animation-delay:.18s}
  .lights.form .lg:nth-child(4){animation-delay:.27s}
  .lights.form .lg:nth-child(5){animation-delay:.36s}
  @keyframes lgForm{from{opacity:0;transform:scale(.45)}to{opacity:1;transform:scale(1)}}
  /* 메인 타임 디스플레이 */
  .main{position:relative;z-index:2;flex:none;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;padding:5px 0 3px}
  .status{font-size:10px;font-weight:800;letter-spacing:3px;color:var(--muted);
    text-transform:uppercase;transition:color .2s}
  .status.go{color:var(--green)}.status.pit{color:var(--amber)}.status.staged{color:var(--red)}
  .clock{font-family:var(--mono);font-weight:700;font-size:37px;line-height:1;
    letter-spacing:1px;color:#fff;font-variant-numeric:tabular-nums;
    text-shadow:0 0 18px rgba(37,211,216,.18)}
  .clock .cs{font-size:20px;color:var(--cyan)}
  .sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px;
    display:flex;gap:6px;align-items:center}
  .sub .dot{width:4px;height:4px;border-radius:50%;background:#333;display:inline-block}
  .sub b{color:#d4d7dd;font-weight:700}
  /* 타이밍 타워(랩) */
  .tower{position:relative;z-index:2;margin:0 12px;flex:1 1 auto;min-height:0;overflow-y:auto;
    display:flex;flex-direction:column;gap:3px;padding:2px 0;scrollbar-width:thin}
  .tower::-webkit-scrollbar{width:4px}.tower::-webkit-scrollbar-thumb{background:#2a2c34;border-radius:4px}
  .tower:empty::after{content:'LAP 버튼으로 구간 기록';display:block;text-align:center;
    color:#7b818c;font-size:10px;letter-spacing:1px;padding:24px 0;font-weight:600}
  .lap{display:grid;grid-template-columns:42px 1fr auto;align-items:center;gap:8px;
    padding:5px 9px;border-radius:7px;background:rgba(255,255,255,.035);
    font-family:var(--mono);font-size:11px;font-weight:700;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.04);animation:lapIn .25s ease}
  @keyframes lapIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .lap .ln{color:var(--muted);letter-spacing:.5px}
  .lap .lt{color:#eef0f3;font-variant-numeric:tabular-nums;justify-self:start}
  .lap .ld{font-variant-numeric:tabular-nums;font-size:10px;color:#9aa0c0}
  .lap.best{background:rgba(177,75,219,.16);box-shadow:inset 0 0 0 1px rgba(177,75,219,.5)}
  .lap.best .ln,.lap.best .lt{color:#e3b6ff}
  .lap.best .ld{color:var(--purple);font-weight:800;letter-spacing:.5px}
  .lap.flash{animation:newBest .9s ease-out}
  @keyframes newBest{0%{background:rgba(25,224,122,.32)}100%{background:rgba(177,75,219,.16)}}
  /* ── 트랙 씬 (카메라 추적: 머신 고정, 배경·노면 스크롤) ── */
  .track{position:relative;z-index:2;height:92px;margin:5px 12px 0;border-radius:11px;overflow:hidden;
    background:linear-gradient(#0e111a 0%,#151a26 44%,#1d2331 53%,#161b23 100%);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
  /* 갠트리(스타트 라이트) — 트랙 상단 */
  .track .lights{position:absolute;top:5px;left:0;right:0;margin:0;gap:7px;z-index:6}
  .track .lights::before{content:'';position:absolute;top:6px;left:24px;right:24px;height:3px;background:#0a0c11;border-radius:2px;z-index:-1}
  .track .lights .lg{width:12px;height:12px}
  /* 관중석(원경, 느린 패럴랙스) */
  .stand{position:absolute;top:26px;left:0;width:100%;height:15px;opacity:.42;z-index:1;
    background:repeating-linear-gradient(90deg,#454e68 0 7px,#2b3142 7px 14px)}
  .track.run .stand{animation:scrollStand 1.1s linear infinite}
  @keyframes scrollStand{to{background-position-x:-14px}}
  /* 노면 가드(킹) + 중앙 점선(빠른 패럴랙스) */
  .kerb{position:absolute;bottom:0;left:0;width:100%;height:6px;z-index:3;
    background:repeating-linear-gradient(90deg,#e10600 0 11px,#eef0f3 11px 22px)}
  .track.run .kerb{animation:scrollKerb .17s linear infinite}
  @keyframes scrollKerb{to{background-position-x:-22px}}
  .lane{position:absolute;bottom:17px;left:0;width:100%;height:3px;opacity:.5;z-index:2;
    background:repeating-linear-gradient(90deg,#c9cdd4 0 13px,transparent 13px 30px)}
  .track.run .lane{animation:scrollLane .26s linear infinite}
  @keyframes scrollLane{to{background-position-x:-30px}}
  /* 스피드 라인 */
  .speed{position:absolute;inset:0;pointer-events:none;z-index:3}
  .speed i{position:absolute;right:100%;height:2px;border-radius:2px;opacity:0;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.6))}
  .track.run .speed i{animation:streak .5s linear infinite}
  .track.run .speed i:nth-child(2){animation-duration:.42s;animation-delay:.16s}
  .track.run .speed i:nth-child(3){animation-duration:.62s;animation-delay:.3s}
  @keyframes streak{0%{transform:translateX(0);opacity:0}12%{opacity:.85}100%{transform:translateX(330px);opacity:0}}
  /* ── F1 머신 (사이드뷰, 중앙 고정) ── */
  .car{position:absolute;left:50%;bottom:5px;width:98px;height:46px;transform:translateX(-50%);z-index:4}
  .car.run{animation:carBob .11s linear infinite}
  @keyframes carBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-1.2px)}}
  .car span{position:absolute}
  .wheel{bottom:0;width:26px;height:26px;border-radius:50%;z-index:1;
    background:radial-gradient(circle at 50% 50%,#16161c 0 38%,#0a0a0d 39%);box-shadow:inset 0 0 0 2px #26262d,0 1px 3px rgba(0,0,0,.5)}
  .wheel.rear{left:3px}.wheel.front{right:3px}
  .wheel::before{content:'';position:absolute;inset:5px;border-radius:50%;
    background:repeating-conic-gradient(#9aa0ab 0 18deg,#34373f 18deg 36deg)}
  .wheel::after{content:'';position:absolute;inset:10px;border-radius:50%;background:#1a1c22}
  .car.run .wheel::before{animation:spin .22s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* 페라리 로쏘 코르사 */
  .body{left:8px;bottom:11px;width:82px;height:17px;z-index:2;
    background:linear-gradient(#ff2d1a,#c20000);box-shadow:inset 0 -3px 5px rgba(0,0,0,.3);
    clip-path:polygon(0 34%,13% 0,44% 0,52% 40%,80% 30%,100% 64%,100% 100%,0 100%)}
  /* 검정 엔진 커버(에어박스) */
  .cover{left:11px;bottom:18px;width:32px;height:13px;z-index:3;
    background:linear-gradient(#33353d,#15171c);
    clip-path:polygon(0 60%,26% 0,100% 22%,100% 100%,0 100%)}
  /* 프랜싱 호스 노란 방패 엠블럼 */
  .badge{position:absolute;left:17px;bottom:18px;width:11px;height:14px;z-index:5;
    filter:drop-shadow(0 1px 1px rgba(0,0,0,.5))}
  .rwing{left:0;bottom:13px;width:5px;height:25px;background:#23262f;border-radius:1px;z-index:1}
  .rwing::before{content:'';position:absolute;top:-1px;left:-3px;width:13px;height:5px;background:#15171d;border-radius:2px}
  .halo{left:38px;bottom:23px;width:20px;height:12px;border:2px solid #14161c;border-bottom:none;border-radius:11px 11px 0 0;z-index:4;background:transparent}
  .helmet{left:43px;bottom:24px;width:11px;height:9px;border-radius:50% 50% 38% 38%;z-index:2;
    background:linear-gradient(#ffe14a,#e0a400)}
  .nose{right:5px;bottom:11px;width:27px;height:8px;z-index:2;
    background:linear-gradient(#ff2d1a,#c20000);clip-path:polygon(0 0,100% 66%,100% 100%,0 100%)}
  .fwing{right:0;bottom:5px;width:21px;height:5px;background:#23262f;border-radius:2px;z-index:2}
  .fwing::after{content:'';position:absolute;right:0;bottom:-3px;width:4px;height:9px;background:#15171d;border-radius:2px}
  .exhaust{left:-7px;bottom:15px;width:7px;height:5px;border-radius:50% 0 0 50%;opacity:0;z-index:0;
    background:linear-gradient(90deg,transparent,#ffb020,#ff5b2e)}
  .car.run .exhaust{animation:flame .12s linear infinite alternate}
  @keyframes flame{from{opacity:.45;width:6px}to{opacity:.95;width:12px}}
  @media (prefers-reduced-motion:reduce){
    .track.run .stand,.track.run .kerb,.track.run .lane,.track.run .speed i,.car.run,.car.run .wheel::before,.car.run .exhaust{animation:none}
  }
  /* 컨트롤 */
  .row{position:relative;z-index:2;display:flex;gap:7px;padding:9px 11px 11px}
  button{flex:1;font-family:inherit;font-weight:800;font-size:12px;letter-spacing:.5px;
    padding:11px 0;border:none;border-radius:9px;cursor:pointer;color:#fff;
    text-transform:uppercase;transition:transform .06s,filter .15s,background .2s;
    box-shadow:0 3px 10px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12)}
  button:active{transform:translateY(1px)}
  button:hover{filter:brightness(1.1)}
  #b1{background:linear-gradient(#1ea85a,#16823f)}
  #b1.run{background:linear-gradient(#e8362c,#b91a12)}
  #b2{background:linear-gradient(#2a3550,#1c2740);color:#cfe6ff}
  #b3{background:linear-gradient(#33363f,#23252c);color:#c9cdd4}
  button:disabled{opacity:.35;cursor:default;filter:none;box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}
  button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  @media (max-width:330px){.stage{width:96vw}}
</style>
</head>
<body>
  <div class="stage" id="stage" role="application" aria-label="F1 레이싱 스탑워치">
    <div class="rpm" id="rpm" aria-hidden="true"></div>
    <div class="hdr">
      <div class="marque"><span class="bar"></span><b>GRID</b><span>P1</span></div>
      <div class="lapno">LAP <b id="lapno">0</b></div>
    </div>
    <div class="main">
      <div class="status staged" id="status">ON THE GRID</div>
      <div class="clock" id="clock" aria-live="off">0:00<span class="cs">.00</span></div>
      <div class="sub"><span>THIS LAP <b id="curlap">0:00.00</b></span><span class="dot"></span><span>BEST <b id="best">--:--</b></span></div>
    </div>
    <!-- 트랙 씬: 카메라가 머신을 추적(머신은 중앙 고정, 갠트리·관중석·노면이 흐른다) -->
    <div class="track" id="track" aria-hidden="true">
      <div class="lights" id="lights">
        <span class="lg"></span><span class="lg"></span><span class="lg"></span><span class="lg"></span><span class="lg"></span>
      </div>
      <div class="stand"></div>
      <div class="speed"><i style="top:36px;width:26px"></i><i style="top:45px;width:18px"></i><i style="top:54px;width:32px"></i></div>
      <div class="car" id="car">
        <span class="rwing"></span>
        <span class="body"></span>
        <span class="cover"></span>
        <svg class="badge" viewBox="0 0 24 30" aria-hidden="true">
          <path d="M2 2 H22 V17 C22 24 12 28 12 28 C12 28 2 24 2 17 Z" fill="#ffd21e" stroke="#111" stroke-width="1"/>
          <path d="M9.4 5.2c-1.5.7-1.7 2.3-.8 3.3-1.9.3-2.9 2-2 3.4-1 .5-1.2 1.9-.3 2.7-.7.6-.5 1.8.5 2l-.7 1.9 1.7-.5c.2.7 1.1.9 1.7.4l.9 1.7.7-1.8c1.4.3 2.6-.7 2.4-2l1.4.7-.4-1.7c1.3.1 2-1.2 1.3-2.2 1.1-.2 1.6-1.5.9-2.4.8-.5.9-1.7.1-2.4l.6-1.9-1.6.8c-.4-.6-1.3-.6-1.8-.1l-1.1-1.3-.5 1.8c-1-.6-2.3-.4-2.9.6-.2-.9-1-1.5-1.9-1.2z" fill="#111"/>
        </svg>
        <span class="halo"></span>
        <span class="helmet"></span>
        <span class="nose"></span>
        <span class="fwing"></span>
        <span class="exhaust"></span>
        <span class="wheel rear"></span>
        <span class="wheel front"></span>
      </div>
      <div class="lane"></div>
      <div class="kerb"></div>
    </div>
    <div class="tower" id="tower" aria-live="polite" aria-label="랩 타임"></div>
    <div class="row">
      <button id="b1">Start</button>
      <button id="b2" disabled>Lap</button>
      <button id="b3" disabled>Reset</button>
    </div>
  </div>
<script>
(function(){
  var clock=document.getElementById('clock'),curlapEl=document.getElementById('curlap'),
      bestEl=document.getElementById('best'),lapnoEl=document.getElementById('lapno'),
      status=document.getElementById('status'),tower=document.getElementById('tower'),
      rpm=document.getElementById('rpm'),stage=document.getElementById('stage'),
      track=document.getElementById('track'),car=document.getElementById('car'),
      lightsEl=document.getElementById('lights'),lights=lightsEl.children,
      b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3');

  // RPM LED 12개 (좌측 green → 중앙 amber → 우측 red)
  var LEDN=12;
  for(var i=0;i<LEDN;i++){var d=document.createElement('i');
    d.className=i<6?'g':i<9?'y':'r';rpm.appendChild(d);}
  var leds=rpm.children;

  var SHOW_LAPS=2;    // 화면엔 최근 2개만 표시(이전 랩은 아래로 사라짐), 기록은 무제한
  var run=false, st=0, acc=0, iv=null;
  var laps=[];        // 각 랩 누적시각(T)
  var lapStart=0;     // 현재 랩 시작 누적시각
  var bestIdx=-1, bestVal=Infinity;

  function el(){return acc+(run?performance.now()-st:0);}
  function parts(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);return[mm,ss,cc];}
  function p2(n){return String(n).padStart(2,'0');}
  function fmt(ms){var p=parts(ms);return p[0]+':'+p2(p[1])+'.'+p2(p[2]);}
  function fmtClock(ms){var p=parts(ms);return p[0]+':'+p2(p[1])+'<span class="cs">.'+p2(p[2])+'</span>';}

  function drawRpm(ms){
    // 1초 주기로 0→풀 스윕 (엔진 레브 느낌)
    var frac=run?((ms%1000)/1000):0;
    var lit=Math.round(frac*LEDN);
    for(var i=0;i<LEDN;i++){
      var on=run && i<lit;
      leds[i].className=(i<6?'g':i<9?'y':'r')+(on?' on':'');
    }
  }
  function draw(){
    var t=el();
    clock.innerHTML=fmtClock(t);
    curlapEl.textContent=fmt(t-lapStart);
    drawRpm(t);
  }

  function setLights(state){
    // state: 'grid'(좌→우 순차 점등 = 포메이션) | 'out'(동시 소등 = 출발)
    if(state==='grid'){
      lightsEl.classList.remove('form');void lightsEl.offsetWidth;lightsEl.classList.add('form');
    } else {
      lightsEl.classList.remove('form');
    }
    for(var i=0;i<5;i++) lights[i].classList.toggle('lit', state==='grid');
  }

  function renderTower(flashIdx){
    tower.innerHTML='';
    var stop=Math.max(0,laps.length-SHOW_LAPS);   // 최근 SHOW_LAPS개만, 이전 것은 아래로 사라짐
    for(var i=laps.length-1;i>=stop;i--){
      var dur=laps[i]-(i>0?laps[i-1]:0);
      var div=document.createElement('div');
      div.className='lap'+(i===bestIdx?' best':'')+(i===flashIdx?' flash':'');
      var delta,dCls;
      if(i===bestIdx){delta='FASTEST';dCls='ld';}
      else{delta='+'+fmt(dur-bestVal);dCls='ld';} // 최고 대비 격차(항상 양수), 톤은 차분하게
      div.innerHTML='<span class="ln">L'+(i+1)+'</span>'+
                    '<span class="lt">'+fmt(dur)+'</span>'+
                    '<span class="'+dCls+'">'+delta+'</span>';
      tower.appendChild(div);
    }
  }

  function ui(){
    b1.textContent=run?'Pause':(acc>0?'Resume':'Start');
    b1.classList.toggle('run',run);
    track.classList.toggle('run',run);   // 머신 주행(바퀴·노면·스피드라인) 토글
    car.classList.toggle('run',run);
    b2.disabled=!run;
    b3.disabled=run||acc===0;
    if(run){status.textContent='RACING';status.className='status go';setLights('out');}
    else if(acc>0){status.textContent='IN THE PIT';status.className='status pit';setLights('out');}
    else{status.textContent='ON THE GRID';status.className='status staged';setLights('grid');}
  }

  function start(){
    var fresh=(acc===0&&laps.length===0);
    run=true;st=performance.now();if(!iv)iv=setInterval(draw,30);
    if(fresh){stage.classList.remove('launch');void stage.offsetWidth;stage.classList.add('launch');} // 라이트 아웃 플래시
    setLights('out');draw();ui();
  }
  function pause(){
    if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();
  }
  function lap(){
    if(!run)return;
    var now=el();laps.push(now);lapStart=now;
    var newIdx=laps.length-1;
    var prevBest=bestVal;
    // 최고 랩 갱신
    bestVal=Infinity;bestIdx=-1;
    for(var i=0;i<laps.length;i++){
      var dur=laps[i]-(i>0?laps[i-1]:0);
      if(dur<bestVal){bestVal=dur;bestIdx=i;}
    }
    bestEl.textContent=fmt(bestVal);
    lapnoEl.textContent=laps.length;
    // 방금 기록이 신기록이면(첫 랩 제외) 그 행을 그린 플래시
    var flashIdx=(bestIdx===newIdx&&newIdx>0&&bestVal<prevBest)?newIdx:-1;
    renderTower(flashIdx);draw();
  }
  function reset(){
    run=false;clearInterval(iv);iv=null;acc=0;st=0;
    laps=[];lapStart=0;bestIdx=-1;bestVal=Infinity;
    lapnoEl.textContent='0';bestEl.textContent='--:--';
    stage.classList.remove('launch');
    tower.innerHTML='';draw();ui();
  }

  b1.onclick=function(){run?pause():start();};
  b2.onclick=lap;
  b3.onclick=reset;
  // 키보드: Space=시작/정지, L=랩, R=리셋
  document.addEventListener('keydown',function(e){
    if(e.code==='Space'){e.preventDefault();run?pause():start();}
    else if(e.key==='l'||e.key==='L'){if(run)lap();}
    else if(e.key==='r'||e.key==='R'){if(!b3.disabled)reset();}
  });
  document.addEventListener('visibilitychange',function(){if(!document.hidden)draw();});

  draw();ui();
})();
</script>
</body>
</html>
