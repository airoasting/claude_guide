<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>피카소 타이머</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:Georgia,"Times New Roman",'Pretendard',serif;
    background:#EBDCBB;
    display:flex;align-items:center;justify-content:center;color:#241c14;padding:14px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:11px;width:100%;max-width:288px}
  .title{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:.4em;color:#7a3a1f;text-indent:.4em}
  .title .dot{width:9px;height:9px;border-radius:50%;background:conic-gradient(#C0392B,#E6B422,#2A6A9A,#5B8A88,#C0392B);text-indent:0}
  .art{width:190px;height:196px;filter:drop-shadow(0 8px 16px rgba(120,80,40,.2))}
  .art svg{width:100%;height:100%;display:block}
  .time{font-family:Georgia,serif;font-weight:700;font-size:40px;color:#241c14;letter-spacing:1px}
  .time .cs{font-size:18px;color:#9a2f1a}
  .row{display:flex;gap:8px}
  button{font-family:Georgia,'Pretendard',serif;font-weight:700;font-size:14px;cursor:pointer;padding:11px 0;width:80px;
    border:2px solid #241c14;background:#EBDCBB;color:#241c14;border-radius:3px;transition:transform .07s,background .15s;
    box-shadow:3px 3px 0 rgba(36,28,20,.9)}
  button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(36,28,20,.9)}
  #b1{background:#E6B422;border-color:#7a5a0e}#b1.run{background:#C0392B;color:#fff;border-color:#7a2418}
  #b2{background:#C3A9D9}#b3{background:#EBDCBB}
  button:disabled{opacity:.42;cursor:default}
  .lp{font-size:12px;color:#7a6a52;min-height:15px;font-style:italic}
  button:focus-visible{outline:3px solid #C0392B;outline-offset:2px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="art" aria-hidden="true">
      <svg viewBox="0 0 200 206">
        <!-- 배경 면 -->
        <path d="M0,0 H120 L92,206 H0 Z" fill="#5B8A88" opacity=".9"/>
        <path d="M120,0 H200 V206 H92 Z" fill="#D8C49A"/>
        <rect x="150" y="14" width="50" height="58" fill="#C0392B" opacity=".82"/>
        <circle cx="38" cy="168" r="20" fill="#E6B422" opacity=".9"/>
        <path d="M150,150 h50 v56 h-50 Z" fill="#2A3A52" opacity=".5"/>

        <!-- 머리카락(뒤) -->
        <path d="M58,40 C70,12 140,8 158,44 C172,72 168,150 150,176 C176,120 168,52 130,40 C150,70 150,120 138,150 C140,90 120,52 100,50 C80,52 70,96 74,150 C58,110 58,64 58,40 Z" fill="#2C2330"/>

        <!-- 얼굴 베이스(정면: 따뜻한 노랑) -->
        <path d="M100,28 C146,30 168,66 168,112 C168,162 142,196 100,196 C62,196 40,160 40,112 C40,64 58,26 100,28 Z" fill="#F1C96E"/>
        <!-- 측면 면(라벤더) : 중앙 옆얼굴 곡선 오른쪽 -->
        <path d="M100,28 C146,30 168,66 168,112 C168,162 142,196 100,196
                 C104,176 104,168 104,158
                 C112,140 112,124 104,110
                 C114,106 132,106 132,96
                 C132,82 114,78 104,70
                 C100,58 100,44 100,28 Z" fill="#C3A9D9"/>

        <!-- 얼굴 외곽선 -->
        <path d="M100,28 C146,30 168,66 168,112 C168,162 142,196 100,196 C62,196 40,160 40,112 C40,64 58,26 100,28 Z"
              fill="none" stroke="#211a12" stroke-width="3.4" stroke-linejoin="round"/>
        <!-- 옆얼굴(코) 윤곽선 -->
        <path d="M100,28 C100,44 100,58 104,70 C114,78 132,82 132,96 C132,106 114,106 104,110 C112,124 112,140 104,158 C104,168 104,176 100,196"
              fill="none" stroke="#211a12" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- 콧구멍 -->
        <path d="M120,98 q8,2 8,8" fill="none" stroke="#211a12" stroke-width="2" stroke-linecap="round"/>

        <!-- 눈썹 -->
        <path d="M58,82 Q74,72 90,80" fill="none" stroke="#211a12" stroke-width="3.4" stroke-linecap="round"/>
        <path d="M120,74 Q138,66 154,76" fill="none" stroke="#211a12" stroke-width="3.2" stroke-linecap="round"/>
        <!-- 눈(정면, 왼) -->
        <ellipse cx="74" cy="98" rx="16" ry="11" fill="#F7F1E2" stroke="#211a12" stroke-width="2.6"/>
        <circle cx="74" cy="98" r="6.5" fill="#2A2A2A"/><circle cx="76.5" cy="95.5" r="2" fill="#fff"/>
        <!-- 눈(측면쪽, 오른 / 다른 형태) -->
        <ellipse cx="138" cy="92" rx="15" ry="10" fill="#F7F1E2" stroke="#211a12" stroke-width="2.6"/>
        <circle cx="138" cy="92" r="6" fill="#2A5AA0"/><circle cx="140" cy="89.5" r="1.8" fill="#fff"/>

        <!-- 입술(반은 빨강/반은 진홍) -->
        <path d="M78,150 C92,162 120,160 140,150 C122,156 96,156 78,150 Z" fill="#C0392B"/>
        <path d="M78,150 C96,146 122,146 140,150 C120,150 96,150 78,150 Z" fill="#8E2A40"/>
        <path d="M78,150 C100,170 120,166 140,150" fill="none" stroke="#211a12" stroke-width="2.4" stroke-linecap="round"/>

        <!-- 볼 블러시 + 점 -->
        <circle cx="62" cy="128" r="9" fill="#D98A6A" opacity=".5"/>
        <circle cx="150" cy="118" r="3" fill="#211a12"/>
        <!-- 목 -->
        <path d="M84,196 H120 L116,206 H88 Z" fill="#C3A9D9" stroke="#211a12" stroke-width="2.4"/>
      </svg>
    </div>
    <div class="time"><span id="t">00:00<span class="cs">.00</span></span></div>
    <div class="row">
      <button id="b2" disabled>랩</button>
      <button id="b1">시작</button>
      <button id="b3" disabled>초기화</button>
    </div>
    <div class="lp" id="lp"></div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lp=document.getElementById('lp');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'정지':(el()>0?'재개':'시작');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lp.textContent='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push(sp);lp.textContent='구간 '+laps.length+'  +'+plain(sp);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
