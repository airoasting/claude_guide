<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>고양이 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐱</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:linear-gradient(180deg,#FBD9C4 0%,#FBE7C8 38%,#CDEBD6 62%,#BfE6DE 100%);
    display:flex;align-items:center;justify-content:center;color:#7A5A48;padding:14px;overflow:hidden}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:300px}
  .cat{width:128px;height:120px;position:relative}
  .ear{position:absolute;top:0;width:0;height:0;border-left:26px solid transparent;border-right:26px solid transparent;border-bottom:42px solid #F4B97E}
  .ear.l{left:8px;transform:rotate(-12deg)}.ear.r{right:8px;transform:rotate(12deg)}
  .head{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:112px;height:96px;border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#FCD9A8,#F4B97E);box-shadow:0 6px 16px rgba(180,120,60,.22)}
  .bow{position:absolute;top:16px;left:50%;transform:translateX(-50%);font-size:18px;z-index:2}
  .eye{position:absolute;top:54px;width:16px;height:18px;border-radius:50%;background:#2BB6B0}
  .eye.l{left:34px}.eye.r{right:34px}
  .eye::after{content:"";position:absolute;top:3px;left:3px;width:6px;height:6px;border-radius:50%;background:#0B3B3A}
  .eye::before{content:"";position:absolute;top:2px;right:3px;width:4px;height:4px;border-radius:50%;background:#fff;z-index:1}
  .pnose{position:absolute;top:74px;left:50%;transform:translateX(-50%);width:9px;height:7px;border-radius:50%;background:#E78AA0}
  .wk{position:absolute;top:72px;width:24px;height:1.5px;background:rgba(0,0,0,.18)}
  .wk.l{left:-2px}.wk.r{right:-2px}
  .card{background:rgba(255,255,255,.72);border-radius:24px;padding:16px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:12px;
    box-shadow:0 8px 22px rgba(120,90,60,.16);backdrop-filter:blur(3px);width:100%}
  .time{font-variant-numeric:tabular-nums;font-weight:800;font-size:40px;color:#C66A3C}
  .time .cs{font-size:20px;color:#E0A06A}
  .row{display:flex;gap:8px}
  button{font-family:inherit;font-weight:800;font-size:13px;color:#fff;border:none;cursor:pointer;
    padding:12px 0;width:76px;border-radius:20px;box-shadow:0 4px 9px rgba(0,0,0,.12);transition:transform .07s,opacity .15s}
  button:active{transform:translateY(2px)}
  #b1{background:#E89A5C}#b1.run{background:#E0705C}#b2{background:#5EC0BE}#b3{background:#D6A0C0}
  button:disabled{opacity:.45;cursor:default}
  .lp{font-size:11px;color:#A07A60;font-weight:700;min-height:14px}
  button:focus-visible{outline:3px solid #C66A3C;outline-offset:2px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="cat" aria-hidden="true">
      <span class="ear l"></span><span class="ear r"></span>
      <span class="head"></span><span class="bow">🎀</span>
      <span class="eye l"></span><span class="eye r"></span>
      <span class="wk l"></span><span class="wk r"></span>
      <span class="pnose"></span>
    </div>
    <div class="card">
      <div class="time"><span id="t">00:00<span class="cs">.00</span></span></div>
      <div class="row">
        <button id="b1">시작</button>
        <button id="b2" disabled>랩</button>
        <button id="b3" disabled>초기화</button>
      </div>
      <div class="lp" id="lp"></div>
    </div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lp=document.getElementById('lp');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'정지':(el()>0?'재개':'시작');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lp.textContent='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push(sp);lp.textContent='랩 '+laps.length+'  +'+plain(sp);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
