<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>푸른 호랑이 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐯</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:radial-gradient(circle at 50% 40%,#1A4650 0%,#0E2C3C 52%,#06141F 100%);
    display:flex;align-items:center;justify-content:center;color:#EAF1FB;padding:14px}
  .wrap{display:flex;flex-direction:column;align-items:center;gap:13px;width:100%;max-width:300px}
  .tiger{width:212px;height:194px;position:relative;filter:drop-shadow(0 6px 22px rgba(0,0,0,.45))}
  .tiger svg{width:100%;height:100%;display:block;overflow:visible}

  /* 눈빛 발광 */
  .eyeglow{transform-origin:center;animation:gleam 2.6s ease-in-out infinite}
  @keyframes gleam{0%,100%{opacity:.72}50%{opacity:1}}
  /* 작동 중 */
  .tiger.run .eyeglow{animation-duration:.85s}
  .tiger.run .body{animation:prowl 1.1s ease-in-out infinite}
  @keyframes prowl{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
  .pupil{transform-box:fill-box;transform-origin:center}
  .tiger.run .pupil{animation:dilate 1.1s ease-in-out infinite}
  @keyframes dilate{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.7)}}

  .time{font-variant-numeric:tabular-nums;font-weight:800;font-size:42px;letter-spacing:1px;color:#FFE0B0;
    text-shadow:0 0 18px rgba(255,140,50,.45)}
  .time .cs{font-size:22px;color:#FFA34D}
  .row{display:flex;gap:9px}
  button{font-family:inherit;font-weight:800;font-size:14px;color:#fff;border:none;cursor:pointer;
    padding:13px 0;width:80px;border-radius:22px;box-shadow:0 4px 0 rgba(0,0,0,.34),0 6px 14px rgba(0,0,0,.3);transition:transform .07s,opacity .15s,background .15s}
  button:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.34)}
  #b1{background:#E0762F;box-shadow:0 4px 0 rgba(0,0,0,.34),0 0 16px rgba(224,118,47,.5)}
  #b1.run{background:#D23F35;box-shadow:0 4px 0 rgba(0,0,0,.34),0 0 16px rgba(210,63,53,.55)}
  #b2{background:#2C6E9C}#b3{background:#37485E}
  button:disabled{opacity:.4;cursor:default}
  .lp{font-size:12px;color:#9EC0D6;font-weight:700;min-height:16px}
  button:focus-visible{outline:3px solid #FFE0B0;outline-offset:2px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="tiger" id="tiger" aria-label="푸른 호랑이">
      <svg viewBox="0 0 212 196" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="fur" cx="44%" cy="26%" r="82%">
            <stop offset="0%" stop-color="#6699D8"/><stop offset="52%" stop-color="#3E6FB4"/><stop offset="100%" stop-color="#234E8C"/>
          </radialGradient>
          <radialGradient id="cheek" cx="50%" cy="35%" r="70%">
            <stop offset="0%" stop-color="#79A6DF"/><stop offset="100%" stop-color="#4D7BBA"/>
          </radialGradient>
          <radialGradient id="chest" cx="50%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#8FB6E6"/><stop offset="100%" stop-color="#4E7CB8"/>
          </radialGradient>
          <radialGradient id="iris" cx="44%" cy="40%" r="62%">
            <stop offset="0%" stop-color="#FFEC6A"/><stop offset="34%" stop-color="#FFB02A"/>
            <stop offset="66%" stop-color="#F86A1C"/><stop offset="100%" stop-color="#DE2410"/>
          </radialGradient>
          <radialGradient id="halo" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#FF5A28" stop-opacity=".95"/><stop offset="55%" stop-color="#FF3A1E" stop-opacity=".45"/><stop offset="100%" stop-color="#FF3A1E" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="nose" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F472A6"/><stop offset="100%" stop-color="#C83E78"/>
          </linearGradient>
          <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="4"/></filter>
          <filter id="softer" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="7"/></filter>
        </defs>

        <!-- 바닥 그림자 -->
        <ellipse cx="106" cy="184" rx="70" ry="11" fill="#04101A" opacity=".6"/>

        <!-- 어두운 정글 잎 (배경) -->
        <g opacity=".5" filter="url(#softer)" fill="#0A2A2E">
          <path d="M6 30 q26 -16 40 8 q-24 10 -40 -8 z"/>
          <path d="M206 24 q-26 -14 -42 8 q24 12 42 -8 z"/>
          <path d="M2 92 q22 -6 30 16 q-22 4 -30 -16 z"/>
        </g>
        <!-- 작은 화분 (오른쪽 아래, 영화 속 소품) -->
        <g transform="translate(176,158)">
          <path d="M0 8 q9 9 18 0 l-3 14 q-6 4 -12 0 z" fill="#9C5A3C"/>
          <ellipse cx="9" cy="8" rx="9" ry="3.5" fill="#7C4226"/>
          <circle cx="3" cy="3" r="4" fill="#2F6B3A"/><circle cx="10" cy="0" r="4.5" fill="#3C8049"/><circle cx="16" cy="4" r="4" fill="#2A5F35"/><circle cx="9" cy="6" r="4" fill="#357040"/>
        </g>

        <g class="body">
          <!-- 몸통/엉덩이 -->
          <ellipse cx="106" cy="150" rx="64" ry="42" fill="url(#fur)"/>
          <!-- 앞다리 -->
          <path d="M70 128 q-12 22 -8 44 q0 6 14 6 q10 0 10 -8 q-2 -24 6 -42 z" fill="url(#fur)"/>
          <path d="M142 128 q12 22 8 44 q0 6 -14 6 q-10 0 -10 -8 q2 -24 -6 -42 z" fill="url(#fur)"/>
          <!-- 앞발 -->
          <ellipse cx="76" cy="176" rx="18" ry="12" fill="#2C548C"/>
          <ellipse cx="136" cy="176" rx="18" ry="12" fill="#2C548C"/>
          <path d="M68 180 v5 M76 182 v5 M84 180 v5 M128 180 v5 M136 182 v5 M144 180 v5" stroke="#19366A" stroke-width="2.2" stroke-linecap="round"/>
          <!-- 가슴 -->
          <ellipse cx="106" cy="150" rx="34" ry="36" fill="url(#chest)"/>
          <!-- 몸통 줄무늬 -->
          <path d="M48 140 q14 -5 17 6 M52 162 q14 -4 15 7 M164 140 q-14 -5 -17 6 M160 162 q-14 -4 -15 7"
                stroke="#1B3D72" stroke-width="6" fill="none" stroke-linecap="round"/>

          <!-- 머리 -->
          <ellipse cx="106" cy="78" rx="62" ry="56" fill="url(#fur)"/>
          <!-- 볼(jowl) -->
          <ellipse cx="64" cy="98" rx="24" ry="22" fill="url(#cheek)"/>
          <ellipse cx="148" cy="98" rx="24" ry="22" fill="url(#cheek)"/>
          <!-- 귀 -->
          <path d="M58 30 q-14 -16 2 -26 q18 6 22 28 q-14 6 -24 -2 z" fill="url(#fur)"/>
          <path d="M154 30 q14 -16 -2 -26 q-18 6 -22 28 q14 6 24 -2 z" fill="url(#fur)"/>
          <path d="M60 22 q-6 -8 4 -13 q9 5 11 18 q-9 2 -15 -5 z" fill="#1E4079"/>
          <path d="M152 22 q6 -8 -4 -13 q-9 5 -11 18 q9 2 15 -5 z" fill="#1E4079"/>
          <!-- 정수리 림라이트 -->
          <path d="M62 38 Q106 8 150 38" stroke="#9CCBF5" stroke-width="3.5" fill="none" stroke-linecap="round" opacity=".55"/>

          <!-- 정수리 줄무늬 + 이마 점 -->
          <path d="M92 30 q4 10 -1 20 M106 26 v22 M120 30 q-4 10 1 20" stroke="#1B3D72" stroke-width="5" fill="none" stroke-linecap="round"/>
          <circle cx="106" cy="58" r="2.6" fill="#1B3D72"/><circle cx="98" cy="62" r="2.2" fill="#1B3D72"/><circle cx="114" cy="62" r="2.2" fill="#1B3D72"/>
          <!-- 볼 줄무늬 -->
          <path d="M44 84 q14 1 20 -5 M44 100 q15 1 22 -4 M168 84 q-14 1 -20 -5 M168 100 q-15 1 -22 -4"
                stroke="#1B3D72" stroke-width="5" fill="none" stroke-linecap="round"/>

          <!-- 눈두덩 브로우 능선 (밝은 림) -->
          <path d="M58 70 Q76 52 96 64" stroke="#84B6EE" stroke-width="4" fill="none" stroke-linecap="round" opacity=".7"/>
          <path d="M154 70 Q136 52 116 64" stroke="#84B6EE" stroke-width="4" fill="none" stroke-linecap="round" opacity=".7"/>
          <!-- 미간 주름 -->
          <path d="M102 60 q4 8 0 16 M110 60 q-4 8 0 16" stroke="#1B3D72" stroke-width="3" fill="none" stroke-linecap="round" opacity=".8"/>

          <!-- ── 큰 발광 눈 ── -->
          <g class="eyeglow">
            <circle cx="78" cy="84" r="30" fill="url(#halo)" filter="url(#soft)"/>
            <circle cx="134" cy="84" r="30" fill="url(#halo)" filter="url(#soft)"/>
          </g>
          <!-- 눈알 (동심원: 노랑→주황→빨강) -->
          <circle cx="78" cy="84" r="23" fill="url(#iris)"/>
          <circle cx="134" cy="84" r="23" fill="url(#iris)"/>
          <circle cx="78" cy="84" r="23" fill="none" stroke="#B81C0C" stroke-width="2.5"/>
          <circle cx="134" cy="84" r="23" fill="none" stroke="#B81C0C" stroke-width="2.5"/>
          <!-- 초록빛 세로 동공 (정면 응시) -->
          <ellipse class="pupil" cx="78" cy="85" rx="5.2" ry="18" fill="#0A2410"/>
          <ellipse class="pupil" cx="134" cy="85" rx="5.2" ry="18" fill="#0A2410"/>
          <ellipse cx="78" cy="85" rx="5.2" ry="18" fill="none" stroke="#43C873" stroke-width="1.4" opacity=".7"/>
          <ellipse cx="134" cy="85" rx="5.2" ry="18" fill="none" stroke="#43C873" stroke-width="1.4" opacity=".7"/>
          <!-- 캐치라이트 -->
          <circle cx="72" cy="74" r="4" fill="#FFF7E6" opacity=".95"/>
          <circle cx="128" cy="74" r="4" fill="#FFF7E6" opacity=".95"/>
          <!-- 아래 눈꺼풀 -->
          <path d="M58 92 Q78 104 98 92" stroke="#2C548C" stroke-width="3.5" fill="none" stroke-linecap="round" opacity=".7"/>
          <path d="M154 92 Q134 104 114 92" stroke="#2C548C" stroke-width="3.5" fill="none" stroke-linecap="round" opacity=".7"/>

          <!-- 코 -->
          <path d="M99 104 q-7 -1 -7 5 q0 4 14 4 q14 0 14 -4 q0 -6 -7 -5 z" fill="url(#nose)"/>
          <path d="M106 113 v5" stroke="#9C2E58" stroke-width="2.2" stroke-linecap="round"/>

          <!-- 다문 입 (카리스마 있는 고양이 입매, 이빨 없음) -->
          <path d="M106 118 Q106 128 94 128 Q86 128 83 121" stroke="#16315C" stroke-width="3" fill="none" stroke-linecap="round"/>
          <path d="M106 118 Q106 128 118 128 Q126 128 129 121" stroke="#16315C" stroke-width="3" fill="none" stroke-linecap="round"/>

          <!-- 수염 -->
          <path d="M62 106 q-22 -3 -34 -10 M62 112 q-22 1 -35 1 M62 118 q-21 5 -32 12
                   M150 106 q22 -3 34 -10 M150 112 q22 1 35 1 M150 118 q21 5 32 12"
                stroke="#D6E6FA" stroke-width="1.7" fill="none" stroke-linecap="round" opacity=".85"/>
        </g>
      </svg>
    </div>

    <div class="time"><span id="t">00:00<span class="cs">.00</span></span></div>
    <div class="row">
      <button id="b1">시작</button>
      <button id="b2" disabled>랩</button>
      <button id="b3" disabled>초기화</button>
    </div>
    <div class="lp" id="lp"></div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lp=document.getElementById('lp'),fig=document.getElementById('tiger');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'정지':(el()>0?'재개':'시작');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;fig.classList.toggle('run',run);}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lp.textContent='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push(sp);lp.textContent='랩 '+laps.length+'  +'+plain(sp);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
