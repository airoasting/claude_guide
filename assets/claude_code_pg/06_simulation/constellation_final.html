<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>별자리 시뮬레이터</title>
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('폰트/PretendardVariable.ttf') format('truetype');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --glass-bg: rgba(6, 10, 26, 0.60);
      --glass-surface: rgba(255, 255, 255, 0.045);
      --glass-border: rgba(255, 255, 255, 0.09);
      --glass-border-top: rgba(255, 255, 255, 0.18);
      --glass-blur: blur(28px) saturate(160%);
      --accent: #72b8ff;
      --accent-dim: rgba(90, 155, 255, 0.22);
      --accent-glow: rgba(70, 130, 255, 0.38);
      --text-primary: rgba(218, 230, 255, 0.95);
      --text-secondary: rgba(175, 198, 255, 0.50);
      --text-muted: rgba(148, 172, 255, 0.30);
      --shadow-panel: 0 16px 56px rgba(0, 0, 12, 0.60), 0 2px 10px rgba(0, 0, 0, 0.35);
      --shadow-inset: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      --shadow-btn: 0 2px 8px rgba(0, 0, 0, 0.25);
      --radius-xl: 20px;
      --radius-lg: 16px;
      --radius-md: 11px;
      --radius-sm: 8px;
      --radius-xs: 6px;
    }

    html, body {
      width: 100%; height: 100%;
      background: #04070f;
      overflow: hidden;
      font-family: 'Pretendard', system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      user-select: none;
    }

    #mainCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: grab;
    }
    #mainCanvas:active { cursor: grabbing; }

    #trailCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }

    /* ─── GLASS BASE ─── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-top-color: var(--glass-border-top);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-panel), var(--shadow-inset);
    }

    /* ─── GLASS BUTTONS ─── */
    .glass-btn {
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      border-top-color: rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-md);
      color: rgba(195, 215, 255, 0.62);
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 400;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.16s ease;
      white-space: nowrap;
      letter-spacing: 0.15px;
      box-shadow: var(--shadow-btn);
    }
    .glass-btn:hover {
      background: rgba(255, 255, 255, 0.085);
      border-color: rgba(100, 165, 255, 0.26);
      border-top-color: rgba(140, 195, 255, 0.36);
      color: var(--text-primary);
      box-shadow: 0 0 18px rgba(70, 130, 255, 0.14), var(--shadow-btn);
      transform: translateY(-1px);
    }
    .glass-btn:active {
      transform: translateY(0);
      box-shadow: var(--shadow-btn);
    }
    .glass-btn.active {
      background: rgba(70, 135, 255, 0.17);
      border-color: rgba(90, 155, 255, 0.38);
      border-top-color: rgba(135, 190, 255, 0.48);
      color: rgba(205, 228, 255, 1.0);
      box-shadow: 0 0 22px rgba(70, 130, 255, 0.22),
                  inset 0 1px 0 rgba(255, 255, 255, 0.09),
                  var(--shadow-btn);
    }
    .glass-btn.active:hover {
      background: rgba(80, 145, 255, 0.24);
      border-color: rgba(100, 165, 255, 0.48);
      box-shadow: 0 0 28px rgba(70, 130, 255, 0.32),
                  inset 0 1px 0 rgba(255, 255, 255, 0.10),
                  var(--shadow-btn);
      transform: translateY(-1px);
    }
    .glass-btn.small {
      padding: 4px 9px;
      font-size: 11px;
      border-radius: var(--radius-sm);
    }

    /* ─── HEADER ─── */
    #header {
      position: fixed;
      top: 20px; left: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: var(--radius-lg);
      font-size: 16px;
      font-weight: 300;
      letter-spacing: 2.8px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
      color: rgba(210, 228, 255, 0.88);
    }
    #header.visible { opacity: 1; }

    /* ─── BRANDING ─── */
    #branding {
      position: fixed;
      bottom: 100px; right: 20px;
      font-size: 10.5px;
      font-weight: 300;
      color: var(--text-muted);
      z-index: 100;
      pointer-events: none;
      letter-spacing: 0.4px;
    }

    /* ─── CONTROL BAR ─── */
    #controlBar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      width: calc(100% - 48px);
      max-width: 1020px;
      padding: 14px 20px;
      border-radius: var(--radius-xl);
      opacity: 0;
      transition: opacity 0.4s ease-out, transform 0.4s ease-out;
      z-index: 100;
    }
    #controlBar.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #controlBar.idle {
      opacity: 0.22;
    }
    #controlBar:hover {
      opacity: 1 !important;
    }

    .ctrl-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .ctrl-row + .ctrl-row { margin-top: 10px; }

    .ctrl-sep {
      width: 1px;
      height: 22px;
      background: linear-gradient(to bottom,
        transparent,
        rgba(255, 255, 255, 0.11) 30%,
        rgba(255, 255, 255, 0.11) 70%,
        transparent
      );
      margin: 0 3px;
      flex-shrink: 0;
    }

    /* ─── TIME DISPLAY ─── */
    #timeDisplay {
      font-size: 15px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      color: rgba(200, 220, 255, 0.88);
      min-width: 160px;
      text-align: right;
      letter-spacing: 0.4px;
    }

    /* ─── SPEED BUTTON ─── */
    #speedBtn {
      min-width: 44px;
      text-align: center;
    }

    /* ─── TIME SLIDER ─── */
    .slider-wrap {
      flex: 1;
      min-width: 180px;
      display: flex;
      align-items: center;
      position: relative;
      height: 20px;
    }
    #timeSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      cursor: pointer;
      position: relative;
    }
    #timeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 0 3px rgba(90, 155, 255, 0.28),
                  0 0 18px rgba(70, 130, 255, 0.60);
      cursor: pointer;
      transition: box-shadow 0.15s ease, transform 0.15s ease;
    }
    #timeSlider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 4px rgba(90, 155, 255, 0.38),
                  0 0 26px rgba(70, 130, 255, 0.80);
      transform: scale(1.15);
    }
    #timeSlider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 0 0 3px rgba(90, 155, 255, 0.28),
                  0 0 18px rgba(70, 130, 255, 0.60);
      border: none;
      cursor: pointer;
    }

    /* ─── LIGHT POLLUTION SLIDER ─── */
    #lpSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 88px;
      height: 3px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      outline: none;
      cursor: pointer;
    }
    #lpSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 2px rgba(90, 155, 255, 0.22),
                  0 0 12px rgba(70, 130, 255, 0.50);
      cursor: pointer;
    }
    #lpSlider::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 0 0 2px rgba(90, 155, 255, 0.22),
                  0 0 12px rgba(70, 130, 255, 0.50);
      border: none;
      cursor: pointer;
    }

    /* ─── INFO PANEL ─── */
    #infoPanel {
      position: fixed;
      top: 80px; bottom: 80px;
      left: 0;
      width: 300px;
      border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
      border-left: none;
      padding: 24px 20px;
      transform: translateX(-100%);
      opacity: 0;
      transition: transform 0.32s ease-out, opacity 0.32s ease-out;
      z-index: 200;
      overflow-y: auto;
    }
    #infoPanel.open {
      transform: translateX(0);
      opacity: 1;
    }

    #infoPanelTitle {
      font-size: 19px;
      font-weight: 500;
      margin-bottom: 4px;
      color: rgba(220, 234, 255, 0.98);
      letter-spacing: 0.5px;
    }
    #infoPanelSubtitle {
      font-size: 11.5px;
      font-weight: 300;
      color: var(--text-secondary);
      margin-bottom: 14px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }
    .panel-divider {
      height: 1px;
      background: linear-gradient(to right,
        rgba(255, 255, 255, 0.10),
        rgba(255, 255, 255, 0.03) 80%,
        transparent
      );
      margin: 14px 0;
    }
    #infoPanelMyth {
      font-size: 13px;
      font-weight: 300;
      line-height: 1.78;
      color: rgba(192, 214, 255, 0.68);
      margin-bottom: 12px;
    }

    .star-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .star-table th {
      text-align: left;
      padding: 6px 8px;
      color: var(--text-secondary);
      font-weight: 400;
      font-size: 10.5px;
      letter-spacing: 0.9px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .star-table td {
      padding: 8px 8px;
      color: rgba(198, 218, 255, 0.80);
    }
    .star-table tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.022);
    }
    .star-table tr:hover td {
      background: rgba(90, 155, 255, 0.07);
      transition: background 0.12s ease;
    }

    .close-btn {
      position: absolute;
      top: 14px; right: 14px;
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.16s ease;
    }
    .close-btn:hover {
      background: rgba(255, 255, 255, 0.09);
      color: var(--text-primary);
      border-color: rgba(90, 155, 255, 0.30);
      box-shadow: 0 0 14px rgba(70, 130, 255, 0.18);
    }

    /* ─── MINI MAP ─── */
    #miniMap {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) scale(0.95);
      width: 240px;
      height: 360px;
      padding: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease-out, transform 0.25s ease-out;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #miniMap.open {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: all;
    }
    #mapCanvas {
      flex: 1;
      border-radius: var(--radius-sm);
      cursor: crosshair;
      border: 1px solid rgba(255, 255, 255, 0.055);
    }
    .map-presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .map-divider {
      height: 1px;
      background: linear-gradient(to right,
        rgba(255, 255, 255, 0.08),
        rgba(255, 255, 255, 0.02) 80%,
        transparent
      );
      margin: 2px 0;
    }
    #mapCoords {
      font-size: 10px;
      font-weight: 300;
      color: var(--text-secondary);
      text-align: center;
      min-height: 14px;
      letter-spacing: 0.3px;
    }

    /* ─── DATE PICKER ─── */
    #datePicker {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--glass-border);
      border-top-color: rgba(255, 255, 255, 0.14);
      border-radius: var(--radius-md);
      color: rgba(200, 218, 255, 0.82);
      font-size: 12px;
      padding: 7px 10px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
      box-shadow: var(--shadow-btn);
    }
    #datePicker:focus {
      border-color: rgba(90, 155, 255, 0.45);
      box-shadow: 0 0 18px rgba(70, 130, 255, 0.18), var(--shadow-btn);
    }

    /* ─── FOCUS OVERLAY ─── */
    #focusOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      transition: background 0.6s ease-out;
      z-index: 50;
    }
    #focusOverlay.active {
      background: rgba(0, 0, 0, 0.68);
      pointer-events: all;
    }

    #focusLabel {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 4px;
      padding: 12px 28px;
      border-radius: var(--radius-lg);
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 201;
      pointer-events: none;
      color: rgba(218, 232, 255, 0.95);
    }
    #focusLabel.visible { opacity: 1; }

    /* ─── FADE OVERLAY ─── */
    #fadeOverlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0);
      pointer-events: none;
      z-index: 300;
    }

    /* ─── OPENING EMOJI ─── */
    #openingEmoji {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 60px;
      opacity: 0;
      z-index: 400;
      pointer-events: none;
      animation: emojiPulse 1s ease-in-out infinite;
    }
    @keyframes emojiPulse {
      0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
    }
    #openingEmoji.hidden {
      animation: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(90, 155, 255, 0.22);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(90, 155, 255, 0.42);
    }

    /* ─── LP LABEL ─── */
    #lpLabel {
      font-size: 11.5px;
      font-weight: 300;
      color: var(--text-secondary);
      min-width: 50px;
    }


    /* ─── LP ICON ─── */
    .lp-icon {
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
</style>
</head>

<!-- Canvas layers -->
<canvas id="trailCanvas"></canvas>
<canvas id="mainCanvas"></canvas>

</div>

<!-- Info Panel (left side) -->
<div id="infoPanel" class="glass">

  <div id="infoPanelTitle">오리온자리</div>

      <tr><th>별 이름</th><th>등급</th><th>색상</th></tr>

</div>

    <button class="glass-btn small" data-city="제주">제주</button>

  <div class="map-divider"></div>
  <div class="map-presets">

    <button class="glass-btn small" data-city="레이캬비크">🌍 레이캬비크</button>
  </div>
</div>

<!-- Control Bar -->
<div id="controlBar" class="glass">
  <!-- Top row: playback + slider + time -->
  <div class="ctrl-row">
    <button class="glass-btn" id="playBtn" title="Space: 재생/정지">▶</button>
    <button class="glass-btn" id="speedBtn" title="재생 속도">×1</button>
    <div class="slider-wrap">
      <input type="range" id="timeSlider" min="0" max="720" value="240" step="1">
    </div>
    <div id="timeDisplay">22:00 KST</div>
  </div>
  <!-- Bottom row: location + toggles -->
  <div class="ctrl-row">
    <button class="glass-btn" id="locationBtn" title="위치 변경">📍 서울</button>
    <input type="date" id="datePicker" title="날짜 변경">
    <button class="glass-btn small" id="todayBtn">오늘 밤</button>
    <div class="ctrl-sep"></div>
    <span class="lp-icon">💡</span>
    <input type="range" id="lpSlider" min="1" max="5" value="3" step="1" title="광해">
    <span id="lpLabel">시골</span>
    <div class="ctrl-sep"></div>
    <button class="glass-btn active" id="btnLines" title="C: 별자리 선">☆ 선</button>
    <button class="glass-btn active" id="btnNames" title="N: 별자리 이름">Aa 이름</button>
    <button class="glass-btn" id="btnGrid" title="G: 격자"># 격자</button>
    <button class="glass-btn" id="btnMilky" title="M: 은하수">🌌 은하수</button>
    <button class="glass-btn" id="btnMeteor" title="S: 유성">✨ 유성</button>
    <button class="glass-btn" id="btnTrail" title="T: Star Trail">◎ Trail</button>
    <button class="glass-btn active" id="btnAudio" title="A: 사운드">🔊</button>
  </div>
</div>

function generateStardust() {
  const data = [];
  let seed = 42;
  function rand() {
    seed = (seed * 1664525 + 1013904223) & 0xffffffff;
    return (seed >>> 0) / 0xffffffff;
  }
  // Milky Way band regions for denser coverage
  const regions = [
    {ra: 270, dec: -25, spread: 40},  // Sagittarius
    {ra: 300, dec: 40, spread: 30},   // Cygnus
    {ra: 15,  dec: 60, spread: 25},   // Cassiopeia
    {ra: 50,  dec: 50, spread: 20},   // Perseus
    {ra: 85,  dec: 0,  spread: 25},   // Orion
    {ra: 190, dec: 10, spread: 35},   // Virgo area
    {ra: 240, dec: 50, spread: 20},   // general coverage
    {ra: 130, dec: 40, spread: 30},   // general coverage
  ];
  for (let i = 0; i < 2500; i++) {
    if (i % 3 === 0) {
      // Milky Way band star
      const r = regions[Math.floor(rand() * regions.length)];
      const ra = (r.ra + (rand() - 0.5) * r.spread * 2 + 360) % 360;
      const dec = Math.max(-30, Math.min(89, r.dec + (rand() - 0.5) * r.spread));
      data.push([+ra.toFixed(2), +dec.toFixed(2)]);
    } else {
      // Random sky coverage
      const ra = rand() * 360;
      const dec = -30 + rand() * 120; // -30 to 90
      data.push([+ra.toFixed(2), +dec.toFixed(2)]);
    }
  }
  return data;
}
const DATA_STARDUST = generateStardust();

// ═══ astro.js ═══
// [8] ASTRO — 천문 좌표 변환 (순수 함수)
'use strict';

/**
 * 율리우스 일 계산
 * @param {number} year  UTC year
 * @param {number} month UTC month (1-12)
 * @param {number} day   UTC day
 * @param {number} utHours UTC decimal hours
 * @returns {number} Julian Day Number
 */
function dateToJD(year, month, day, utHours) {
  if (month <= 2) { year -= 1; month += 12; }
  const A = Math.floor(year / 100);
  const B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716))
       + Math.floor(30.6001 * (month + 1))
       + day + utHours / 24 + B - 1524.5;
}

/**
 * 그리니치 항성시 (GMST) in degrees
 * @param {number} jd Julian Day
 * @returns {number} GMST in degrees [0, 360)
 */
function jdToGMST(jd) {
  const T = (jd - 2451545.0) / 36525.0;
  let gmst = 280.46061837
           + 360.98564736629 * (jd - 2451545.0)
           + T * T * 0.000387933
           - T * T * T / 38710000.0;
  gmst = gmst % 360;
  if (gmst < 0) gmst += 360;
  return gmst;
}

/**
 * 지방 항성시 (LST) in degrees
 * @param {number} gmst GMST in degrees
 * @param {number} longitude observer longitude in degrees (east positive)
 * @returns {number} LST in degrees [0, 360)
 */
function gmstToLST(gmst, longitude) {
  let lst = (gmst + longitude) % 360;
  if (lst < 0) lst += 360;
  return lst;
}

/**
 * 적도좌표 → 지평좌표 변환
 * @param {number} ra  Right Ascension in degrees
 * @param {number} dec Declination in degrees
 * @param {number} lst Local Sidereal Time in degrees
 * @param {number} latitude Observer latitude in degrees (north positive)
 * @returns {{ alt: number, az: number }} altitude and azimuth in degrees
 */
function equatorialToHorizontal(ra, dec, lst, latitude) {
  const ha = ((lst - ra) % 360 + 360) % 360; // Hour angle [0,360)
  const hRad  = ha  * Math.PI / 180;
  const dRad  = dec * Math.PI / 180;
  const latRad = latitude * Math.PI / 180;

  const sinAlt = Math.sin(dRad) * Math.sin(latRad)
               + Math.cos(dRad) * Math.cos(latRad) * Math.cos(hRad);
  const alt = Math.asin(Math.max(-1, Math.min(1, sinAlt))) * 180 / Math.PI;

  const cosAltRad = Math.cos(alt * Math.PI / 180);
  let az;
  if (Math.abs(cosAltRad) < 1e-10) {
    az = 0;
  } else {
    const cosAz = (Math.sin(dRad) - Math.sin(latRad) * sinAlt)
                / (Math.cos(latRad) * cosAltRad);
    az = Math.acos(Math.max(-1, Math.min(1, cosAz))) * 180 / Math.PI;
    if (Math.sin(hRad) > 0) az = 360 - az;
  }
  return { alt, az };
}

/**
 * 지평좌표 → 화면좌표 변환 (등거리 방위 투영, azimuthal equidistant)
 * @param {number} alt  Star altitude in degrees
 * @param {number} az   Star azimuth in degrees
 * @param {number} viewAlt View center altitude in degrees
 * @param {number} viewAz  View center azimuth in degrees
 * @param {number} fov  Field of view in degrees
 * @param {number} cx   Canvas center X
 * @param {number} cy   Canvas center Y
 * @param {number} scale Canvas half-height (used as scale reference)
 * @returns {{ x: number, y: number, visible: boolean }}
 */
function horizontalToScreen(alt, az, viewAlt, viewAz, fov, cx, cy, scale) {
  const altR  = alt    * Math.PI / 180;
  const azR   = az     * Math.PI / 180;
  const vAltR = viewAlt * Math.PI / 180;
  const vAzR  = viewAz  * Math.PI / 180;

  // Great-circle angular distance from view center
  const cosC = Math.sin(vAltR) * Math.sin(altR)
             + Math.cos(vAltR) * Math.cos(altR) * Math.cos(azR - vAzR);
  const c = Math.acos(Math.max(-1, Math.min(1, cosC)));

  // Cull objects beyond FOV + margin
  const halfFovR = (fov / 2) * Math.PI / 180;
  if (c > halfFovR * 1.15) {
    return { x: 0, y: 0, visible: false };
  }

  // Azimuthal equidistant projection: radial distance proportional to angular distance c
  const pixScale = scale / halfFovR; // pixels per radian at view center
  const r = c * pixScale;

  // Direction: use standard azimuthal projection formulae
  const sinC = Math.sin(c);
  let dx, dy;
  if (sinC < 1e-10) {
    dx = 0; dy = 0;
  } else {
    const k = r / sinC;
    dx =  k * Math.cos(altR) * Math.sin(azR - vAzR);
    dy = -k * (Math.cos(vAltR) * Math.sin(altR)
             - Math.sin(vAltR) * Math.cos(altR) * Math.cos(azR - vAzR));
  }

  return {
    x: cx + dx,
    y: cy + dy,
    visible: true
  };
}


// ═══ planets.js ═══
// [9] PLANETS — 행성 위치 계산 (케플러 방정식)
'use strict';

/**
 * 각도를 [0, 360) 범위로 정규화
 */
function normDeg(x) {
  x = x % 360;
  return x < 0 ? x + 360 : x;
}

/**
 * 케플러 방정식 풀기: E - e*sin(E) = M
 * Newton-Raphson iteration
 * @param {number} M Mean anomaly in radians
 * @param {number} e Eccentricity
 * @returns {number} Eccentric anomaly in radians
 */
function solveKepler(M, e) {
  let E = M + e * Math.sin(M) * (1 + e * Math.cos(M));
  for (let i = 0; i < 15; i++) {
    const dE = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
    E -= dE;
    if (Math.abs(dE) < 1e-6) break;
  }
  return E;
}

/**
 * 행성의 적도좌표(RA, Dec) 계산
 * @param {string} planetKey  Key in PLANET_ELEMENTS (e.g. 'mars')
 * @param {number} jd         Julian Day
 * @returns {{ ra: number, dec: number, mag: number }} RA/Dec in degrees, estimated magnitude
 */
function computePlanetPosition(planetKey, jd) {
  const el = PLANET_ELEMENTS[planetKey];
  if (!el) return null;

  const T = (jd - 2451545.0) / 36525.0;

  // Compute orbital elements at epoch T
  const a = el.a[0] + el.a[1] * T;
  const e = el.e[0] + el.e[1] * T;
  const I = (el.I[0] + el.I[1] * T) * Math.PI / 180; // inclination rad
  const L = normDeg(el.L[0] + el.L[1] * T);           // mean longitude deg
  const w = normDeg(el.w[0] + el.w[1] * T);           // longitude of perihelion deg
  const O = normDeg(el.O[0] + el.O[1] * T);           // longitude of ascending node deg

  // Argument of perihelion and mean anomaly
  const omega = normDeg(w - O); // argument of perihelion
  const M = normDeg(L - w);     // mean anomaly

  // Solve Kepler's equation
  const Mrad = M * Math.PI / 180;
  const E = solveKepler(Mrad, e);

  // True anomaly
  const v = 2 * Math.atan2(
    Math.sqrt(1 + e) * Math.sin(E / 2),
    Math.sqrt(1 - e) * Math.cos(E / 2)
  ) * 180 / Math.PI;

  // Heliocentric distance
  const r = a * (1 - e * Math.cos(E));

  // Heliocentric ecliptic coordinates (planet)
  const omRad    = omega * Math.PI / 180;
  const ORad     = O     * Math.PI / 180;
  const IRad     = I;
  const vRad     = v     * Math.PI / 180;

  const xHelio = r * (Math.cos(ORad) * Math.cos(vRad + omRad)
                    - Math.sin(ORad) * Math.sin(vRad + omRad) * Math.cos(IRad));
  const yHelio = r * (Math.sin(ORad) * Math.cos(vRad + omRad)
                    + Math.cos(ORad) * Math.sin(vRad + omRad) * Math.cos(IRad));
  const zHelio = r * Math.sin(vRad + omRad) * Math.sin(IRad);

  // Earth's heliocentric position (simplified circular orbit)
  // Use Earth's mean longitude
  const earthL = normDeg(100.46457166 + 36000.77 * T);
  const earthLRad = earthL * Math.PI / 180;
  const rEarth = 1.00; // AU approximately
  const xEarth = rEarth * Math.cos(earthLRad);
  const yEarth = rEarth * Math.sin(earthLRad);
  const zEarth = 0;

  // Geocentric ecliptic coordinates
  const dx = xHelio - xEarth;
  const dy = yHelio - yEarth;
  const dz = zHelio - zEarth;
  const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);

  // Convert ecliptic to equatorial (obliquity of ecliptic)
  const eps = (23.4393 - 0.0130 * T) * Math.PI / 180;
  const xEq = dx;
  const yEq = dy * Math.cos(eps) - dz * Math.sin(eps);
  const zEq = dy * Math.sin(eps) + dz * Math.cos(eps);

  // RA and Dec
  let ra = Math.atan2(yEq, xEq) * 180 / Math.PI;
  if (ra < 0) ra += 360;
  const dec = Math.asin(Math.max(-1, Math.min(1, zEq / dist))) * 180 / Math.PI;

  // Approximate visual magnitude (very rough)
  const magTable = {
    mercury: -0.42, venus: -4.40, mars: -2.01, jupiter: -2.94, saturn: 0.67
  };
  const baseMag = magTable[planetKey] ?? 1.0;
  // Magnitude increases with distance from Earth
  const mag = baseMag + 5 * Math.log10(dist * r);

  return { ra, dec, mag: Math.min(mag, 6), dist, r };
}

/**
 * 모든 행성의 현재 위치 계산
 * @param {number} jd Julian Day
 * @returns {Array} array of {key, name, color, ra, dec, mag}
 */
function computeAllPlanets(jd) {
  const keys = ['mercury', 'venus', 'mars', 'jupiter', 'saturn'];
  return keys.map(k => {
    const pos = computePlanetPosition(k, jd);
    if (!pos) return null;
    return {
      key: k,
      name: PLANET_ELEMENTS[k].name,
      color: PLANET_ELEMENTS[k].color,
      ra: pos.ra,
      dec: pos.dec,
      mag: pos.mag,
    };
  }).filter(Boolean);
}


// ═══ renderer.js ═══
// [10] RENDERER — Canvas 렌더링 엔진
'use strict';

const RENDERER = (() => {
  // ─── Internal state ───────────────────────────────────────────────
  let mainCanvas, mainCtx, trailCanvas, trailCtx;
  let starScreenPos = [];      // Cached screen positions for DATA_STARS
  let dustScreenPos = [];      // Cached screen positions for DATA_STARDUST
  let planetScreenPos = [];    // Computed planet positions

  // Constellation line drawing animation state
  let constAnim = {
    active: false,
    startTime: 0,
    segments: [],  // [{x1,y1,x2,y2,delay,done}]
  };

  // Meteor state
  let meteors = [];
  let lastMeteorTime = 0;
  let nextMeteorInterval = 15000;

  // Star hover state
  let hoveredStarId = null;
  let hoveredStarAlpha = 0;

  // Focused constellation
  let focusedConst = null;
  let focusDimAlpha = 0;  // 0=none, 0.6=full

  // ─── Spectral color lookup ─────────────────────────────────────────
  const SPECTRAL_COLOR = {
    O: '#aaccff', B: '#aaccff', A: '#ffffff',
    F: '#ffffcc', G: '#ffee88', K: '#ffcc66', M: '#ff8844',
    default: '#ffffff'
  };

  function getStarColor(sp) {
    return SPECTRAL_COLOR[sp] || SPECTRAL_COLOR.default;
  }

  // ─── Star visual properties by magnitude ──────────────────────────
  function getStarSize(mag) {
    if (mag <= 0)   return { core: 5.5, glowR: 20, glowA: 0.18 };
    if (mag <= 1)   return { core: 4.5, glowR: 14, glowA: 0.12 };
    if (mag <= 2)   return { core: 3.5, glowR: 8,  glowA: 0.08 };
    if (mag <= 3)   return { core: 2.5, glowR: 5,  glowA: 0.04 };
    return              { core: 1.2, glowR: 0,  glowA: 0    };
  }

  // ─── Public init ──────────────────────────────────────────────────
  function init(mc, tc) {
    mainCanvas = mc;
    mainCtx    = mc.getContext('2d');
    trailCanvas = tc;
    trailCtx    = tc.getContext('2d');
  }

  // ─── Reproject all stars/dust to screen coords ────────────────────
  function reproject(state) {
    const { lat, lng, jd, viewAlt, viewAz, fov } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const cx = W / 2, cy = H / 2;
    const scale = Math.min(W, H) / 2;

    const gmst = jdToGMST(jd);
    const lst  = gmstToLST(gmst, lng);

    // Stars
    starScreenPos = DATA_STARS.map(s => {
      const [id,,,, ra, dec] = s;
      const horiz = equatorialToHorizontal(ra, dec, lst, lat);
      const screen = horizontalToScreen(horiz.alt, horiz.az, viewAlt, viewAz, fov, cx, cy, scale);
      // Fade near horizon
      let horizFade = 1;
      if (horiz.alt < 5 && horiz.alt >= 0) horizFade = horiz.alt / 5;
      return { id, screen, alt: horiz.alt, az: horiz.az, horizFade };
    });

    // Stardust
    dustScreenPos = DATA_STARDUST.map(([ra, dec]) => {
      const horiz = equatorialToHorizontal(ra, dec, lst, lat);
      if (horiz.alt <= 0) return null;
      const screen = horizontalToScreen(horiz.alt, horiz.az, viewAlt, viewAz, fov, cx, cy, scale);
      let horizFade = 1;
      if (horiz.alt < 5) horizFade = horiz.alt / 5;
      return screen.visible ? { x: screen.x, y: screen.y, alpha: horizFade } : null;
    });

    // Planets
    const planets = computeAllPlanets(jd);
    planetScreenPos = planets.map(p => {
      const horiz = equatorialToHorizontal(p.ra, p.dec, lst, lat);
      if (horiz.alt <= 0) return null;
      const screen = horizontalToScreen(horiz.alt, horiz.az, viewAlt, viewAz, fov, cx, cy, scale);
      let horizFade = 1;
      if (horiz.alt < 5) horizFade = horiz.alt / 5;
      return screen.visible ? { ...p, x: screen.x, y: screen.y, horizFade } : null;
    }).filter(Boolean);
  }

  // ─── Draw background gradient ─────────────────────────────────────
  function drawBackground(state) {
    const { viewAlt, lpLevel } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const ctx = mainCtx;

    // Brightness adjustments for light pollution
    const lpBright = [0.15, 0.08, 0, -0.05, -0.10][lpLevel - 1];
    const c1 = `hsl(225, 50%, ${8 + lpBright * 100}%)`;
    const c2 = `hsl(225, 45%, ${12 + lpBright * 100}%)`;

    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.hypot(W, H)/2);
    grad.addColorStop(0, c1);
    grad.addColorStop(1, c2);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  // ─── Draw stardust ────────────────────────────────────────────────
  function drawStardust(state) {
    const { lpLevel } = state;
    const ctx = mainCtx;
    // Stardust visibility by light pollution: 0%,25%,50%,80%,100%
    const dustRatio = [0, 0.25, 0.5, 0.8, 1.0][lpLevel - 1];
    if (dustRatio === 0) return;

    const count = Math.floor(dustScreenPos.length * dustRatio);
    ctx.save();
    for (let i = 0; i < count; i++) {
      const d = dustScreenPos[i];
      if (!d) continue;
      const alpha = (0.08 + Math.random() * 0.07) * d.alpha;
      ctx.fillStyle = `rgba(180, 200, 240, ${alpha.toFixed(3)})`;
      ctx.fillRect(d.x - 0.5, d.y - 0.5, 1, 1);
    }
    ctx.restore();
  }

  // ─── Draw Milky Way band ──────────────────────────────────────────
  function drawMilkyWay(state) {
    if (!state.showMilky) return;
    const { lat, lng, jd, viewAlt, viewAz, fov } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const cx = W/2, cy = H/2;
    const scale = Math.min(W, H) / 2;
    const gmst = jdToGMST(jd);
    const lst  = gmstToLST(gmst, lng);
    const ctx  = mainCtx;

    // Sample the galactic equator: l=0..360°, b=0 (galactic plane)
    // Galactic north pole: RA=192.86°, Dec=+27.13°, roll=122.93°
    // We'll trace two curves at b=±6° (band half-width)
    const cosNP = Math.cos(27.13 * Math.PI/180);
    const sinNP = Math.sin(27.13 * Math.PI/180);
    const npRA  = 192.86;

    function galToEq(l, b) {
      const lRad = (l + 33) * Math.PI / 180; // +33 for correct galactic pole direction
      const bRad = b * Math.PI / 180;
      // Convert galactic to equatorial
      const sinDec = Math.sin(bRad) * sinNP + Math.cos(bRad) * cosNP * Math.sin(lRad - Math.PI/2);
      const dec = Math.asin(Math.max(-1, Math.min(1, sinDec))) * 180 / Math.PI;
      const cosLHS = Math.cos(bRad) * Math.cos(lRad - Math.PI/2);
      const sinLHS = Math.cos(bRad) * sinNP * Math.sin(lRad - Math.PI/2) - Math.sin(bRad) * cosNP;
      let ra = (npRA - 90 + Math.atan2(sinLHS, cosLHS) * 180 / Math.PI + 360) % 360;
      return { ra, dec };
    }

    const steps = 60;
    const bandsB = [-9, -6, -3, 0, 3, 6, 9];
    const centerAlphas = [0.02, 0.04, 0.06, 0.07, 0.06, 0.04, 0.02];

    ctx.save();
    for (let bi = 0; bi < bandsB.length; bi++) {
      const points = [];
      for (let i = 0; i <= steps; i++) {
        const l = i * 360 / steps;
        const eq = galToEq(l, bandsB[bi]);
        const hz = equatorialToHorizontal(eq.ra, eq.dec, lst, lat);
        if (hz.alt <= 0) { points.push(null); continue; }
        const sc = horizontalToScreen(hz.alt, hz.az, viewAlt, viewAz, fov, cx, cy, scale);
        points.push(sc.visible ? { x: sc.x, y: sc.y } : null);
      }
      // Draw as poly-line with low alpha
      ctx.beginPath();
      ctx.strokeStyle = `rgba(200, 210, 240, ${centerAlphas[bi]})`;
      ctx.lineWidth = 18;
      ctx.lineCap = 'round';
      let drawing = false;
      for (const pt of points) {
        if (!pt) { drawing = false; continue; }
        if (!drawing) { ctx.moveTo(pt.x, pt.y); drawing = true; }
        else ctx.lineTo(pt.x, pt.y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ─── Draw coordinate grid ─────────────────────────────────────────
  function drawGrid(state) {
    if (!state.showGrid) return;
    const { lat, lng, jd, viewAlt, viewAz, fov } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const cx = W/2, cy = H/2;
    const scale = Math.min(W, H) / 2;
    const gmst = jdToGMST(jd);
    const lst  = gmstToLST(gmst, lng);
    const ctx  = mainCtx;

    ctx.save();
    ctx.strokeStyle = 'rgba(80, 100, 160, 0.25)';
    ctx.lineWidth = 0.5;

    // RA lines every 15° (1h)
    for (let ra = 0; ra < 360; ra += 15) {
      ctx.beginPath();
      let started = false;
      for (let dec = -80; dec <= 80; dec += 5) {
        const hz = equatorialToHorizontal(ra, dec, lst, lat);
        if (hz.alt <= 0) { started = false; continue; }
        const sc = horizontalToScreen(hz.alt, hz.az, viewAlt, viewAz, fov, cx, cy, scale);
        if (!sc.visible) { started = false; continue; }
        if (!started) { ctx.moveTo(sc.x, sc.y); started = true; }
        else ctx.lineTo(sc.x, sc.y);
      }
      ctx.stroke();
    }

    // Dec lines every 15°
    for (let dec = -75; dec <= 75; dec += 15) {
      ctx.beginPath();
      let started = false;
      for (let ra = 0; ra <= 360; ra += 10) {
        const hz = equatorialToHorizontal(ra, dec, lst, lat);
        if (hz.alt <= 0) { started = false; continue; }
        const sc = horizontalToScreen(hz.alt, hz.az, viewAlt, viewAz, fov, cx, cy, scale);
        if (!sc.visible) { started = false; continue; }
        if (!started) { ctx.moveTo(sc.x, sc.y); started = true; }
        else ctx.lineTo(sc.x, sc.y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // ─── Draw horizon mask (below horizon fade) ────────────────────────
  function drawHorizonMask(state) {
    const { viewAlt, viewAz, fov } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const ctx = mainCtx;
    const cx = W/2, cy = H/2;
    const scale = Math.min(W, H) / 2;

    // Find approximate horizon screen position
    // Az=viewAz, alt=0 → screen y position of horizon
    const hz0 = horizontalToScreen(0, viewAz, viewAlt, viewAz, fov, cx, cy, scale);
    const hzY = hz0.visible ? hz0.y : H * 0.75;

    if (hzY >= H) return; // horizon below screen, nothing to mask

    // Draw gradient fade from hzY to bottom
    const grad = ctx.createLinearGradient(0, Math.max(0, hzY - 40), 0, Math.min(H, hzY + 80));
    grad.addColorStop(0, 'rgba(10, 14, 26, 0)');
    grad.addColorStop(0.5, 'rgba(10, 14, 26, 0.8)');
    grad.addColorStop(1, 'rgba(10, 14, 26, 1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, Math.max(0, hzY - 40), W, H);
  }

  // ─── Draw constellation lines ─────────────────────────────────────
  function drawConstellationLines(state, now) {
    if (!state.showLines) return;
    const ctx = mainCtx;
    const starById = {};
    starScreenPos.forEach((sp, i) => { starById[sp.id] = sp; });

    // Update animation
    if (constAnim.active) {
      const elapsed = now - constAnim.startTime;
      constAnim.segments.forEach(seg => {
        if (seg.done) return;
        const segElapsed = elapsed - seg.delay;
        if (segElapsed < 0) { seg.t = 0; return; }
        seg.t = Math.min(1, segElapsed / 300); // 300ms per segment
        if (seg.t >= 1) seg.done = true;
      });
      if (constAnim.segments.every(s => s.done)) constAnim.active = false;
    }

    ctx.save();
    DATA_CONST.forEach(con => {
      const isFocused = focusedConst && focusedConst.abbr === con.abbr;
      const isHovered = state.hoveredConst === con.abbr;
      const lineAlpha = isFocused ? 0.9 : isHovered ? 0.7 : 0.35;
      const lineWidth = isFocused ? 2.5 : isHovered ? 1.5 : 1;

      con.lines.forEach(([id1, id2]) => {
        const sp1 = starById[id1], sp2 = starById[id2];
        if (!sp1 || !sp2) return;
        if (!sp1.screen.visible || !sp2.screen.visible) return;
        if (sp1.alt <= 0 || sp2.alt <= 0) return;

        // Animation t value
        let t = 1;
        if (constAnim.active) {
          const segKey = `${id1}-${id2}`;
          const seg = constAnim.segments.find(s => s.key === segKey);
          if (seg) t = seg.t ?? 0;
        }
        if (t <= 0) return;

        const x1 = sp1.screen.x, y1 = sp1.screen.y;
        const x2 = sp2.screen.x, y2 = sp2.screen.y;
        const ex = x1 + (x2 - x1) * t;
        const ey = y1 + (y2 - y1) * t;

        ctx.beginPath();
        ctx.strokeStyle = `rgba(100, 149, 237, ${lineAlpha})`;
        ctx.lineWidth = lineWidth;
        ctx.moveTo(x1, y1);
        ctx.lineTo(ex, ey);
        ctx.stroke();
      });
    });
    ctx.restore();
  }

  // ─── Draw constellation name labels ──────────────────────────────
  function drawConstellationNames(state) {
    if (!state.showNames) return;
    const ctx = mainCtx;
    const starById = {};
    starScreenPos.forEach(sp => { starById[sp.id] = sp; });

    ctx.save();
    ctx.font = '300 12px Pretendard, system-ui, sans-serif';
    ctx.letterSpacing = '1px';

    DATA_CONST.forEach(con => {
      // Find centroid of visible stars
      const visStars = [];
      const allIds = new Set();
      con.lines.forEach(([a, b]) => { allIds.add(a); allIds.add(b); });
      allIds.forEach(id => {
        const sp = starById[id];
        if (sp && sp.screen.visible && sp.alt > 5) visStars.push(sp.screen);
      });
      if (visStars.length < 2) return;

      const cx = visStars.reduce((s, p) => s + p.x, 0) / visStars.length;
      const cy = visStars.reduce((s, p) => s + p.y, 0) / visStars.length;

      // Fade in when animation done or no animation
      const nameAlpha = constAnim.active ? 0 : 0.6;
      if (nameAlpha <= 0) return;

      ctx.fillStyle = `rgba(180, 200, 240, ${nameAlpha})`;
      ctx.textAlign = 'center';
      ctx.fillText(con.name, cx, cy);
    });
    ctx.restore();
  }

  // ─── Draw a single star ────────────────────────────────────────────
  function drawStar(ctx, x, y, mag, color, glowMult, showHighlight, twinkleFactor, horizFade) {
    const { core, glowR, glowA } = getStarSize(mag);

    ctx.save();
    ctx.globalAlpha = horizFade;

    // Glow
    if (glowR > 0) {
      const hexToRgb = hex => {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return [r,g,b];
      };
      const [r,g,b] = hexToRgb(color.startsWith('#') ? color : '#ffffff');
      const gr2 = ctx.createRadialGradient(x, y, 0, x, y, glowR * glowMult);
      gr2.addColorStop(0, `rgba(${r},${g},${b},${glowA * twinkleFactor})`);
      gr2.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = gr2;
      ctx.beginPath();
      ctx.arc(x, y, glowR * glowMult, 0, Math.PI * 2);
      ctx.fill();
    }

    // Core
    ctx.fillStyle = color;
    ctx.globalAlpha = horizFade * twinkleFactor;
    ctx.beginPath();
    ctx.arc(x, y, core, 0, Math.PI * 2);
    ctx.fill();

    // Highlight (brightest stars)
    if (showHighlight && mag <= 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.beginPath();
      ctx.arc(x, y, 1, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // ─── Draw all stars ────────────────────────────────────────────────
  function drawStars(state, now) {
    const { lpLevel } = state;
    // Limiting magnitudes by light pollution
    const magLimits = [2.0, 3.0, 3.8, 4.2, 4.5];
    const magLimit = magLimits[lpLevel - 1];
    // Glow strength by LP
    const glowMults = [0.5, 0.7, 1.0, 1.2, 1.5];
    const glowMult = glowMults[lpLevel - 1];

    const ctx = mainCtx;
    ctx.save();

    DATA_STARS.forEach((s, i) => {
      const [id, nameKo, nameEn, con, ra, dec, mag, sp] = s;
      if (mag > magLimit) return;
      const sp_data = starScreenPos[i];
      if (!sp_data || !sp_data.screen.visible) return;
      if (sp_data.alt <= 0) return;

      const { x, y } = sp_data.screen;
      const color = getStarColor(sp);

      // Twinkle for bright stars
      let twinkle = 1;
      if (mag <= 2) {
        // Each star has a stable twinkling based on its id
        const freq = 0.3 + (id % 13) * 0.04;
        const phase = (id * 137.508) % (Math.PI * 2);
        const amp = 0.15;
        twinkle = 1 + amp * Math.sin(now * freq * 0.001 * Math.PI * 2 + phase);
      }

      // Hover effect
      let hoverMult = 1;
      if (state.hoveredStarId === id) {
        hoverMult = 1.5 + 0.5 * (1 - Math.min(1, (now - state.hoverStartTime) / 200));
      }

      // Focus mode: dim stars not in focused constellation
      let focusFade = 1;
      if (focusedConst) {
        const inFocus = focusedConst.lines.some(([a,b]) => a === id || b === id);
        focusFade = inFocus ? 1 : 0.15;
      }

      ctx.globalAlpha = sp_data.horizFade * focusFade;

      // Opening animation alpha
      const openAlpha = state.starAlpha ? state.starAlpha(id, mag) : 1;
      ctx.globalAlpha *= openAlpha;

      if (mag > 3) {
        // Dark stars - just a point
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 0.8, 0, Math.PI * 2);
        ctx.fill();
      } else {
        ctx.restore();
        ctx.save();
        drawStar(ctx, x, y, mag, color, glowMult * hoverMult, mag <= 0, twinkle, sp_data.horizFade * focusFade * openAlpha);
      }
    });

    ctx.restore();

    // Draw hover label
    if (state.hoveredStarId !== null) {
      drawHoverLabel(state, now);
    }
  }

  // ─── Draw hover star label ─────────────────────────────────────────
  function drawHoverLabel(state, now) {
    const idx = DATA_STARS.findIndex(s => s[0] === state.hoveredStarId);
    if (idx < 0) return;
    const s = DATA_STARS[idx];
    const [id, nameKo, nameEn, ,,,mag] = s;
    const sp = starScreenPos[idx];
    if (!sp || !sp.screen.visible) return;

    const elapsed = now - state.hoverStartTime;
    const alpha = Math.min(0.9, elapsed / 150);
    if (alpha <= 0) return;

    const label = nameEn && nameKo ? `${nameEn} ${nameKo}` : (nameEn || nameKo || '');
    if (!label) return;

    const ctx = mainCtx;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = '11px Pretendard, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(200, 220, 255, 0.9)';
    ctx.fillText(label, sp.screen.x + 10, sp.screen.y - 8);
    ctx.restore();
  }

  // ─── Draw planets ─────────────────────────────────────────────────
  function drawPlanets(state) {
    if (!state.showPlanets) return;
    const ctx = mainCtx;
    ctx.save();

    planetScreenPos.forEach(p => {
      const size = getStarSize(p.mag);
      const r = Math.max(2, size.core);

      // No twinkle for planets
      if (size.glowR > 0) {
        const hexToRgb = hex => [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
        const [pr, pg, pb] = hexToRgb(p.color.startsWith('#') ? p.color : '#ffffff');
        const gr = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size.glowR);
        gr.addColorStop(0, `rgba(${pr},${pg},${pb},${size.glowA})`);
        gr.addColorStop(1, `rgba(${pr},${pg},${pb},0)`);
        ctx.fillStyle = gr;
        ctx.beginPath();
        ctx.arc(p.x, p.y, size.glowR, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.horizFade;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
      ctx.fill();

      // Planet name label
      ctx.font = '11px Pretendard, system-ui, sans-serif';
      ctx.fillStyle = `rgba(200,220,255,0.8)`;
      ctx.globalAlpha = p.horizFade;
      ctx.fillText(p.name, p.x + r + 4, p.y + 4);
    });

    ctx.restore();
  }

  // ─── Draw horizon and compass ─────────────────────────────────────
  function drawHorizon(state) {
    const { viewAlt, viewAz, fov } = state;
    const W = mainCanvas.width, H = mainCanvas.height;
    const cx = W/2, cy = H/2;
    const scale = Math.min(W, H) / 2;
    const ctx = mainCtx;

    // Draw horizon arc
    const points = [];
    for (let az = 0; az <= 360; az += 3) {
      const sc = horizontalToScreen(0, az, viewAlt, viewAz, fov, cx, cy, scale);
      if (sc.visible) points.push({ x: sc.x, y: sc.y });
    }

    if (points.length > 2) {
      ctx.save();
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(60, 80, 120, 0.3)';
      ctx.lineWidth = 1;
      ctx.moveTo(points[0].x, points[0].y);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.closePath();
      ctx.stroke();
      ctx.restore();
    }

    // Compass labels
    const compass = [
      { label: 'N', az: 0 }, { label: 'E', az: 90 },
      { label: 'S', az: 180 }, { label: 'W', az: 270 },
    ];

    ctx.save();
    ctx.font = '14px Pretendard, system-ui, sans-serif';
    ctx.fillStyle = 'rgba(150, 170, 210, 0.7)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    compass.forEach(({ label, az }) => {
      const sc = horizontalToScreen(-3, az, viewAlt, viewAz, fov, cx, cy, scale);
      if (sc.visible) ctx.fillText(label, sc.x, sc.y);
    });
    ctx.restore();
  }

  // ─── Draw meteors ─────────────────────────────────────────────────
  function drawMeteors(state, now) {
    if (!state.showMeteors) {
      meteors = [];
      return;
    }

    const W = mainCanvas.width, H = mainCanvas.height;
    const ctx = mainCtx;

    // Spawn new meteor
    if (now - lastMeteorTime > nextMeteorInterval && meteors.length === 0) {
      const angle = (Math.random() * 60 - 30 + 230) * Math.PI / 180; // mostly downward
      const len = 80 + Math.random() * 120;
      const x = Math.random() * W;
      const y = Math.random() * H * 0.6;
      meteors.push({
        x, y,
        vx: Math.cos(angle) * 4,
        vy: Math.sin(angle) * 4,
        len, life: 0, maxLife: 500,
        startX: x, startY: y
      });
      lastMeteorTime = now;
      nextMeteorInterval = 10000 + Math.random() * 20000;
    }

    ctx.save();
    meteors = meteors.filter(m => m.life < m.maxLife);
    meteors.forEach(m => {
      m.life += 16;
      const t = m.life / m.maxLife;
      const fade = t < 0.2 ? t / 0.2 : 1 - (t - 0.2) / 0.8;

      const tailLen = m.len * Math.min(1, t * 4);
      const cx2 = m.startX + m.vx * m.life * 0.1;
      const cy2 = m.startY + m.vy * m.life * 0.1;
      const dx = -m.vx / Math.hypot(m.vx, m.vy);
      const dy = -m.vy / Math.hypot(m.vx, m.vy);

      const grad = ctx.createLinearGradient(cx2, cy2, cx2 + dx * tailLen, cy2 + dy * tailLen);
      grad.addColorStop(0, `rgba(255, 255, 255, ${fade * 0.9})`);
      grad.addColorStop(1, 'rgba(255, 255, 255, 0)');

      ctx.beginPath();
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2 - t * 1.5;
      ctx.moveTo(cx2, cy2);
      ctx.lineTo(cx2 + dx * tailLen, cy2 + dy * tailLen);
      ctx.stroke();
    });
    ctx.restore();
  }

  // ─── Star Trail: accumulate on offscreen canvas ────────────────────
  function updateTrail(state) {
    if (!state.showTrail || !state.isPlaying || state.isDragging) return;

    const ctx = trailCtx;
    ctx.save();
    DATA_STARS.forEach((s, i) => {
      const [id,,,,,,mag] = s;
      if (mag > 2) return; // Only bright stars
      const sp = starScreenPos[i];
      if (!sp || !sp.screen.visible || sp.alt <= 0) return;
      const color = getStarColor(s[7]);
      const [r,g,b] = [
        parseInt(color.slice(1,3),16)||200,
        parseInt(color.slice(3,5),16)||200,
        parseInt(color.slice(5,7),16)||255
      ];
      ctx.fillStyle = `rgba(${r},${g},${b},0.03)`;
      ctx.fillRect(sp.screen.x - 0.5, sp.screen.y - 0.5, 1, 1);
    });
    ctx.restore();
  }

  function clearTrail(fadeOut = false) {
    if (fadeOut) {
      let alpha = 1;
      const fade = () => {
        trailCtx.globalAlpha = 0.1;
        trailCtx.fillStyle = 'rgba(0,0,0,0.1)';
        trailCtx.fillRect(0, 0, trailCanvas.width, trailCanvas.height);
        trailCtx.globalAlpha = 1;
        alpha -= 0.1;
        if (alpha > 0) requestAnimationFrame(fade);
        else trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
      };
      requestAnimationFrame(fade);
    } else {
      trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
    }
  }

  // ─── Polaris 북극성 항상 표시 ─────────────────────────────────────
  function drawPolarisIndicator() {
    const POLARIS_ID = 37;
    const polarisIdx = DATA_STARS.findIndex(s => s[0] === POLARIS_ID);
    if (polarisIdx < 0) return;

    const sp = starScreenPos[polarisIdx];
    if (!sp || sp.alt <= 0) return; // 지평선 아래면 표시 안 함

    const ctx = mainCtx;
    const W = mainCanvas.width, H = mainCanvas.height;
    const margin = 36;

    if (sp.screen.visible) {
      // ── 화면 안에 있을 때: 테두리 링 + "북극성" 라벨 ──
      const { x, y } = sp.screen;

      ctx.save();
      // 특별 링
      ctx.beginPath();
      ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(140, 190, 255, 0.55)';
      ctx.lineWidth = 1;
      ctx.setLineDash([3, 3]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 한국어 라벨 "북극성"
      ctx.font = '300 11px Pretendard, system-ui, sans-serif';
      ctx.fillStyle = 'rgba(180, 210, 255, 0.95)';
      ctx.textAlign = 'left';
      ctx.fillText('북극성', x + 16, y + 4);
      ctx.restore();

    } else {
      // ── 화면 밖에 있을 때: 가장자리 방향 화살표 ──
      const cx = W / 2, cy = H / 2;
      const { x: ox, y: oy } = sp.screen;
      const angle = Math.atan2(oy - cy, ox - cx);

      // 화면 가장자리 교점 계산
      const cos = Math.cos(angle), sin = Math.sin(angle);
      let t = Infinity;
      if (cos > 0)  t = Math.min(t, (W - margin - cx) / cos);
      if (cos < 0)  t = Math.min(t, (margin - cx) / cos);
      if (sin > 0)  t = Math.min(t, (H - margin - cy) / sin);
      if (sin < 0)  t = Math.min(t, (margin - cy) / sin);

      const ex = cx + cos * t;
      const ey = cy + sin * t;

      ctx.save();
      // 화살표
      ctx.translate(ex, ey);
      ctx.rotate(angle);
      ctx.beginPath();
      ctx.moveTo(10, 0);
      ctx.lineTo(-5, -5);
      ctx.lineTo(-5, 5);
      ctx.closePath();
      ctx.fillStyle = 'rgba(140, 190, 255, 0.75)';
      ctx.fill();

      // 점선 원
      ctx.beginPath();
      ctx.arc(0, 0, 14, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(140, 190, 255, 0.35)';
      ctx.lineWidth = 1;
      ctx.setLineDash([2, 3]);
      ctx.stroke();
      ctx.setLineDash([]);

      // 라벨
      ctx.rotate(-angle); // 텍스트는 항상 바로
      ctx.font = '300 10px Pretendard, system-ui, sans-serif';
      ctx.fillStyle = 'rgba(140, 190, 255, 0.85)';
      ctx.textAlign = 'center';
      ctx.fillText('북극성', 0, 26);
      ctx.restore();
    }
  }

  // ─── Focus mode dimming overlay ────────────────────────────────────
  function drawFocusDim(state) {
    if (!focusedConst) return;
    const W = mainCanvas.width, H = mainCanvas.height;
    const ctx = mainCtx;
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${focusDimAlpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ─── Start constellation drawing animation ─────────────────────────
  function startConstAnimation(now) {
    const segments = [];
    const starById = {};
    starScreenPos.forEach(sp => { starById[sp.id] = sp; });

    DATA_CONST.forEach(con => {
      con.lines.forEach(([id1, id2], idx) => {
        const sp1 = starById[id1], sp2 = starById[id2];
        if (!sp1 || !sp2 || !sp1.screen.visible || !sp2.screen.visible) return;
        segments.push({
          key: `${id1}-${id2}`,
          delay: idx * 50,
          t: 0, done: false
        });
      });
    });

    constAnim = { active: true, startTime: now, segments };
  }

  function stopConstAnimation() {
    constAnim.active = false;
    constAnim.segments.forEach(s => { s.t = 1; s.done = true; });
  }

  // ─── Set focus constellation ───────────────────────────────────────
  function setFocusConst(con, targetDimAlpha) {
    focusedConst = con;
    focusDimAlpha = targetDimAlpha;
  }

  // ─── Main render ───────────────────────────────────────────────────
  function render(state, now) {
    if (!mainCanvas) return;
    const W = mainCanvas.width, H = mainCanvas.height;
    mainCtx.clearRect(0, 0, W, H);

    // 1. Background
    drawBackground(state);
    // 2. Stardust
    drawStardust(state);
    // 3. Milky Way
    drawMilkyWay(state);
    // 4. Grid
    drawGrid(state);
    // 5. Star Trail (offscreen canvas drawn by app via trailCanvas CSS)
    updateTrail(state);
    // 6. Horizon mask
    drawHorizonMask(state);
    // 7+9. Stars (dark + bright)
    drawStars(state, now);
    // 8. Constellation lines
    drawConstellationLines(state, now);
    // 10. Planets
    drawPlanets(state);
    // 11. Constellation names
    drawConstellationNames(state);
    // 12+13. Horizon + compass
    drawHorizon(state);
    // 14. Meteors
    drawMeteors(state, now);
    // 15. 북극성 항상 표시
    drawPolarisIndicator();
    // Focus dim (P3)
    drawFocusDim(state);
  }

  // ─── Public API ────────────────────────────────────────────────────
  return {
    init,
    reproject,
    render,
    startConstAnimation,
    stopConstAnimation,
    clearTrail,
    setFocusConst,
    get constAnimActive() { return constAnim.active; },
  };
})();


// ═══ audio.js ═══
// [11] AUDIO — 앰비언트 사운드 (Web Audio API, 프로시저럴)
'use strict';

const AUDIO = (() => {
  let ctx = null;
  let masterGain = null;
  let windNode = null;
  let isRunning = false;
  let cricketTimer = null;
  const TARGET_VOLUME = 0.04;

  function createAudioContext() {
    if (ctx) return ctx;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.setValueAtTime(0, ctx.currentTime);
      masterGain.connect(ctx.destination);
    } catch(e) {
      ctx = null;
    }
    return ctx;
  }

  // ─── Brown noise generator ───────────────────────────────────────
  function createBrownNoise() {
    if (!ctx) return null;
    const bufferSize = ctx.sampleRate * 2;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    let lastOut = 0;
    for (let i = 0; i < bufferSize; i++) {
      const white = Math.random() * 2 - 1;
      data[i] = (lastOut + 0.02 * white) / 1.02;
      lastOut = data[i];
      data[i] *= 3.5; // normalize
    }

    const src = ctx.createBufferSource();
    src.buffer = buffer;
    src.loop = true;

    // Low-pass filter (wind-like)
    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.setValueAtTime(200, ctx.currentTime);
    lpf.Q.setValueAtTime(1, ctx.currentTime);

    // Volume LFO (0.1 Hz gentle swell)
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.setValueAtTime(0.1, ctx.currentTime);
    const lfoGain = ctx.createGain();
    lfoGain.gain.setValueAtTime(0.3, ctx.currentTime);
    lfo.connect(lfoGain);

    const windGain = ctx.createGain();
    windGain.gain.setValueAtTime(0.7, ctx.currentTime);
    lfoGain.connect(windGain.gain);

    src.connect(lpf);
    lpf.connect(windGain);
    windGain.connect(masterGain);

    lfo.start();
    src.start();

    return { src, lpf, windGain, lfo };
  }

  // ─── Single cricket chirp ────────────────────────────────────────
  function chirp() {
    if (!ctx || !isRunning) return;
    const freq = 4000 + Math.random() * 1000;
    const pan = (Math.random() - 0.5) * 2; // -1 to 1

    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.015, ctx.currentTime + 0.01);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.08);

    const panner = ctx.createStereoPanner();
    panner.pan.setValueAtTime(pan, ctx.currentTime);

    osc.connect(gain);
    gain.connect(panner);
    panner.connect(masterGain);

    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.1);

    // Schedule next chirp
    const nextDelay = 2000 + Math.random() * 3000;
    cricketTimer = setTimeout(chirp, nextDelay);
  }

  // ─── Start audio ─────────────────────────────────────────────────
  function start(immediate = false) {
    if (!createAudioContext()) return;
    if (ctx.state === 'suspended') ctx.resume();
    if (isRunning) return;
    isRunning = true;

    windNode = createBrownNoise();

    // Fade in master gain
    const targetT = ctx.currentTime + (immediate ? 0 : 2.0);
    masterGain.gain.cancelScheduledValues(ctx.currentTime);
    masterGain.gain.setValueAtTime(
      immediate ? TARGET_VOLUME : 0,
      ctx.currentTime
    );
    if (!immediate) {
      masterGain.gain.linearRampToValueAtTime(TARGET_VOLUME, targetT);
    }

    // Start cricket chirps
    const firstDelay = 1000 + Math.random() * 2000;
    cricketTimer = setTimeout(chirp, firstDelay);
  }

  // ─── Stop audio ──────────────────────────────────────────────────
  function stop() {
    if (!isRunning) return;
    isRunning = false;

    clearTimeout(cricketTimer);

    if (ctx && masterGain) {
      masterGain.gain.cancelScheduledValues(ctx.currentTime);
      masterGain.gain.setValueAtTime(masterGain.gain.value, ctx.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
    }

    setTimeout(() => {
      if (!isRunning && windNode) {
        try { windNode.src.stop(); } catch(e) {}
        try { windNode.lfo.stop(); } catch(e) {}
        windNode = null;
      }
    }, 400);
  }

  // ─── Public API ──────────────────────────────────────────────────
  return { start, stop };
})();


// ═══ ui.js ═══
// [12] UI — 사용자 입력 처리
'use strict';

const UI = (() => {
  let state, app;
  let infoPanelOpen = false;
  let miniMapOpen = false;

  // ─── Init ─────────────────────────────────────────────────────────
  function init(appState, appFns) {
    state = appState;
    app = appFns;

    wireTimeControls();
    wireToggleButtons();
    wireLightPollution();
    wireInfoPanel();
    wireMiniMap();
    wireDatePicker();
    wireLocationBtn();
  }

  // ─── Time Controls ────────────────────────────────────────────────
  function wireTimeControls() {
    const playBtn   = document.getElementById('playBtn');
    const speedBtn  = document.getElementById('speedBtn');
    const slider    = document.getElementById('timeSlider');

    playBtn.addEventListener('click', () => app.togglePlay());

    speedBtn.addEventListener('click', () => {
      const speeds = [1, 5, 30, 60];
      const labels = ['×1','×5','×30','×60'];
      const cur = speeds.indexOf(state.playSpeed);
      state.playSpeed = speeds[(cur + 1) % speeds.length];
      speedBtn.textContent = labels[(cur + 1) % speeds.length];
    });

    slider.addEventListener('input', () => {
      // Slider = minutes since 18:00 KST today (0-720 = 18:00 to 06:00 next day)
      const min = parseInt(slider.value);
      const base = getBaseDate();
      state.date = new Date(base.getTime() + min * 60000);
      app.updateJD();
      app.RENDERER.reproject(state);
      app.RENDERER.clearTrail(false);
      updateTimeDisplay();
    });
  }

  function getBaseDate() {
    const d = new Date(state.date);
    // Today 18:00 KST = 09:00 UTC
    const todayKST = new Date(d.getTime() + 9*3600000);
    todayKST.setUTCHours(9, 0, 0, 0);
    return new Date(todayKST.getTime() - 9*3600000);
  }

  function updateTimeDisplay() {
    const kst = new Date(state.date.getTime() + 9*3600000);
    const y = kst.getUTCFullYear();
    const mo = kst.getUTCMonth() + 1;
    const day = kst.getUTCDate();
    const h = String(kst.getUTCHours()).padStart(2,'0');
    const m = String(kst.getUTCMinutes()).padStart(2,'0');
    document.getElementById('timeDisplay').textContent =
      `${y}년 ${mo}월 ${day}일 ${h}:${m} KST`;
  }

  // ─── Toggle Buttons ───────────────────────────────────────────────
  function wireToggleButtons() {
    document.getElementById('btnLines').addEventListener('click', () => app.toggleLines());
    document.getElementById('btnNames').addEventListener('click', () => app.toggleNames());
    document.getElementById('btnGrid').addEventListener('click', () => app.toggleGrid());
    document.getElementById('btnMilky').addEventListener('click', () => app.toggleMilky());
    document.getElementById('btnMeteor').addEventListener('click', () => app.toggleMeteors());
    document.getElementById('btnTrail').addEventListener('click', () => app.toggleTrail());
    document.getElementById('btnAudio').addEventListener('click', () => app.toggleAudio());
    document.getElementById('todayBtn').addEventListener('click', () => {
      const now = new Date();
      const kst = new Date(now.getTime() + 9*3600000);
      kst.setUTCHours(13, 0, 0, 0); // 22:00 KST
      state.date = new Date(kst.getTime() - 9*3600000);
      app.updateJD();
      app.RENDERER.reproject(state);
      app.RENDERER.clearTrail(false);
      document.getElementById('timeSlider').value = 240; // 22:00 = 4h after 18:00 = 240min
      updateTimeDisplay();
    });
  }

  // ─── Light Pollution ──────────────────────────────────────────────
  function wireLightPollution() {
    const slider = document.getElementById('lpSlider');
    const label  = document.getElementById('lpLabel');
    const labels = ['도심','교외','시골','산간','완전 암흑'];

    slider.addEventListener('input', () => {
      const lp = parseInt(slider.value);
      state.lpLevel = lp;
      label.textContent = labels[lp - 1];
      app.RENDERER.reproject(state);
    });
  }

  // ─── Date Picker ─────────────────────────────────────────────────
  function wireDatePicker() {
    const dp = document.getElementById('datePicker');
    dp.addEventListener('change', () => {
      const [y, mo, d] = dp.value.split('-').map(Number);
      const kst = new Date(state.date.getTime() + 9*3600000);
      kst.setUTCFullYear(y, mo-1, d);
      state.date = new Date(kst.getTime() - 9*3600000);
      app.updateJD();
      app.RENDERER.reproject(state);
      updateTimeDisplay();
    });
  }

  // ─── Location Button ──────────────────────────────────────────────
  function wireLocationBtn() {
    document.getElementById('locationBtn').addEventListener('click', () => {
      if (miniMapOpen) closeMiniMap();
      else openMiniMap();
    });
  }

  // ─── Info Panel ───────────────────────────────────────────────────
  function openInfoPanel(con) {
    const panel = document.getElementById('infoPanel');
    const allIds = new Set();
    con.lines.forEach(([a,b]) => { allIds.add(a); allIds.add(b); });

    // Find stars in this constellation
    const conStars = DATA_STARS
      .filter(s => allIds.has(s[0]) && s[2]) // has English name
      .sort((a,b) => a[6] - b[6])            // sort by magnitude
      .slice(0, 8);

    // Populate panel
    document.getElementById('infoPanelTitle').textContent = con.name;
    document.getElementById('infoPanelSubtitle').textContent = `${con.nameEn} · ${con.abbr}`;
    document.getElementById('infoPanelMyth').textContent = con.myth || '';

    const tbody = document.getElementById('infoPanelStars');
    tbody.innerHTML = '';
    conStars.forEach(s => {
      const [,nameKo, nameEn,,,, mag, sp] = s;
      const spColors = {O:'🔵',B:'🔵',A:'⚪',F:'🟡',G:'🟡',K:'🟠',M:'🔴'};
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${nameKo || nameEn || '-'}</td>
        <td>${mag.toFixed(2)}</td>
        <td>${spColors[sp] || '⚪'}</td>
      `;
      tbody.appendChild(tr);
    });

    // Animate open
    if (!infoPanelOpen) {
      panel.classList.add('open');
      infoPanelOpen = true;
    } else {
      // Cross-fade content
      panel.style.opacity = '0.5';
      setTimeout(() => { panel.style.opacity = '1'; }, 150);
    }
  }

  function closeInfoPanel() {
    const panel = document.getElementById('infoPanel');
    panel.classList.remove('open');
    infoPanelOpen = false;
  }

  document.getElementById && document.addEventListener('DOMContentLoaded', () => {
    const closeBtn = document.getElementById('infoPanelClose');
    if (closeBtn) closeBtn.addEventListener('click', closeInfoPanel);
  });

  // ─── Mini Map ─────────────────────────────────────────────────────
  let mapCanvas, mapCtx;
  let currentPin = { x: 77, y: 37 }; // Default Seoul

  function openMiniMap() {
    const el = document.getElementById('miniMap');
    el.classList.add('open');
    miniMapOpen = true;
    if (!mapCanvas) {
      mapCanvas = document.getElementById('mapCanvas');
      mapCtx = mapCanvas.getContext('2d');
      wireMapInteractions();
    }
    drawMap();
  }

  function closeMiniMap() {
    document.getElementById('miniMap').classList.remove('open');
    miniMapOpen = false;
  }

  function latLngToMapXY(lat, lng) {
    return {
      x: (lng - 124.0) * 26,
      y: (38.5 - lat) * 40
    };
  }

  function mapXYToLatLng(x, y) {
    return {
      lat: 38.5 - y / 40,
      lng: x / 26 + 124.0
    };
  }

  function drawMap(hoverX, hoverY) {
    if (!mapCtx) return;
    const W = mapCanvas.width, H = mapCanvas.height;
    mapCtx.clearRect(0, 0, W, H);

    // Draw peninsula outline
    if (DATA_MAP && DATA_MAP.peninsulaPath) {
      mapCtx.beginPath();
      DATA_MAP.peninsulaPath.forEach(([x, y], i) => {
        if (i === 0) mapCtx.moveTo(x, y); else mapCtx.lineTo(x, y);
      });
      mapCtx.closePath();
      mapCtx.fillStyle = 'rgba(100, 149, 237, 0.05)';
      mapCtx.fill();
      mapCtx.strokeStyle = 'rgba(100, 149, 237, 0.3)';
      mapCtx.lineWidth = 1;
      mapCtx.stroke();
    }

    // Jeju Island
    if (DATA_MAP && DATA_MAP.jejuPath) {
      mapCtx.beginPath();
      DATA_MAP.jejuPath.forEach(([x, y], i) => {
        if (i === 0) mapCtx.moveTo(x, y); else mapCtx.lineTo(x, y);
      });
      mapCtx.closePath();
      mapCtx.fillStyle = 'rgba(100, 149, 237, 0.05)';
      mapCtx.fill();
      mapCtx.strokeStyle = 'rgba(100, 149, 237, 0.3)';
      mapCtx.lineWidth = 1;
      mapCtx.stroke();
    }

    // Ulleungdo dot
    if (DATA_MAP && DATA_MAP.ulleungdo) {
      const [ux, uy] = DATA_MAP.ulleungdo;
      mapCtx.fillStyle = 'rgba(100, 149, 237, 0.4)';
      mapCtx.beginPath();
      mapCtx.arc(ux, uy, 2, 0, Math.PI * 2);
      mapCtx.fill();
    }

    // Current location pin
    mapCtx.save();
    mapCtx.shadowColor = '#4a90d9';
    mapCtx.shadowBlur = 8;
    mapCtx.fillStyle = '#4a90d9';
    mapCtx.beginPath();
    mapCtx.arc(currentPin.x, currentPin.y, 5, 0, Math.PI * 2);
    mapCtx.fill();
    mapCtx.restore();

    // Hover crosshair and coords
    if (hoverX !== undefined) {
      mapCtx.save();
      mapCtx.strokeStyle = 'rgba(255,255,255,0.2)';
      mapCtx.lineWidth = 0.5;
      mapCtx.beginPath();
      mapCtx.moveTo(hoverX, 0); mapCtx.lineTo(hoverX, H);
      mapCtx.moveTo(0, hoverY); mapCtx.lineTo(W, hoverY);
      mapCtx.stroke();
      mapCtx.restore();

      const ll = mapXYToLatLng(hoverX, hoverY);
      const lat = ll.lat.toFixed(2);
      const lng = ll.lng.toFixed(2);
      const hemi = ll.lat >= 0 ? 'N' : 'S';
      document.getElementById('mapCoords').textContent =
        `${Math.abs(lat)}°${hemi}, ${lng}°E`;
    }
  }

  function wireMapInteractions() {
    mapCanvas.addEventListener('mousemove', e => {
      const rect = mapCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      drawMap(x, y);
    });
    mapCanvas.addEventListener('mouseleave', () => {
      drawMap();
      document.getElementById('mapCoords').textContent = '';
    });

    mapCanvas.addEventListener('click', e => {
      const rect = mapCanvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const ll = mapXYToLatLng(x, y);

      // Point-in-polygon check for peninsula
      if (!isInsideKorea(ll.lat, ll.lng)) return;

      currentPin = { x, y };
      const cityName = findNearestCity(ll.lat, ll.lng);
      app.setLocation(ll.lat, ll.lng, cityName);
      drawMap();
    });

    // Preset buttons
    document.getElementById('mapPresets').addEventListener('click', e => {
      const cityName = e.target.dataset.city;
      if (!cityName) return;
      const city = DATA_CITIES.find(c => c.name === cityName);
      if (!city) return;
      const xy = latLngToMapXY(city.lat, city.lng);
      currentPin = xy;
      app.setLocation(city.lat, city.lng, city.name);
      drawMap();
      if (city.name === '시드니' || city.name === '레이캬비크') {
        closeMiniMap();
      }
    });

    // Overseas preset buttons (outside mapPresets, below the divider)
    document.querySelectorAll('[data-city]').forEach(btn => {
      btn.addEventListener('click', e => {
        const cname = e.target.dataset.city;
        const city = DATA_CITIES.find(c => c.name === cname);
        if (!city) return;
        const xy = latLngToMapXY(city.lat, city.lng);
        currentPin = { x: Math.max(0,Math.min(208,xy.x)), y: Math.max(0,Math.min(220,xy.y)) };
        app.setLocation(city.lat, city.lng, city.name);
        closeMiniMap();
      });
    });

    // GPS button (if added)
    document.addEventListener('click', e => {
      if (e.target.id === 'gpsBtn') {
        navigator.geolocation?.getCurrentPosition(pos => {
          const { latitude: lat, longitude: lng } = pos.coords;
          const xy = latLngToMapXY(lat, lng);
          currentPin = { x: Math.max(0,Math.min(208,xy.x)), y: Math.max(0,Math.min(220,xy.y)) };
          const cityName = findNearestCity(lat, lng);
          app.setLocation(lat, lng, cityName);
          drawMap();
        }, () => {});
      }
    });
  }

  // ─── Point-in-polygon: rough Korea check ──────────────────────────
  function isInsideKorea(lat, lng) {
    if (!PENINSULA_POLYGON) return true; // fallback
    const poly = PENINSULA_POLYGON;
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const [yi, xi] = poly[i];
      const [yj, xj] = poly[j];
      const intersect = ((xi > lng) !== (xj > lng)) &&
        (lat < (yj - yi) * (lng - xi) / (xj - xi) + yi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  // ─── Find nearest city ────────────────────────────────────────────
  function findNearestCity(lat, lng) {
    if (!DATA_CITIES) return '알 수 없음';
    let best = DATA_CITIES[0], bestD = Infinity;
    DATA_CITIES.forEach(c => {
      const dlat = c.lat - lat, dlng = c.lng - lng;
      const d = dlat*dlat + dlng*dlng;
      if (d < bestD) { bestD = d; best = c; }
    });
    return best.name;
  }

  // ─── Constellation detection (for canvas click) ───────────────────
  function findConstellationAt(mx, my, starScreenPositions) {
    if (!starScreenPositions) return null;

    // Build map from star id to screen position
    const starById = {};
    starScreenPositions.forEach(sp => { if(sp) starById[sp.id] = sp; });

    let bestCon = null, bestDist = 60 * 60;

    DATA_CONST.forEach(con => {
      const allIds = new Set();
      con.lines.forEach(([a,b]) => { allIds.add(a); allIds.add(b); });
      let sumX = 0, sumY = 0, count = 0;
      allIds.forEach(id => {
        const sp = starById[id];
        if (sp && sp.screen && sp.screen.visible && sp.alt > 3) {
          sumX += sp.screen.x; sumY += sp.screen.y; count++;
        }
      });
      if (count < 2) return;
      const cx = sumX/count, cy = sumY/count;
      const d = (mx-cx)*(mx-cx) + (my-cy)*(my-cy);
      if (d < bestDist) {
        bestDist = d;
        bestCon = con;
      }
    });
    return bestCon;
  }

  // ─── Close panels on outside click ───────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    document.addEventListener('click', e => {
      const panel = document.getElementById('infoPanel');
      const map = document.getElementById('miniMap');
      const locBtn = document.getElementById('locationBtn');
      if (panel && infoPanelOpen && !panel.contains(e.target)) {
        closeInfoPanel();
      }
      if (map && miniMapOpen && !map.contains(e.target) && e.target !== locBtn) {
        closeMiniMap();
      }
    });

    document.getElementById('infoPanelClose')?.addEventListener('click', closeInfoPanel);
  });

  // ─── Public API ───────────────────────────────────────────────────
  return {
    init,
    openInfoPanel,
    closeInfoPanel,
    openMiniMap,
    closeMiniMap,
    findConstellationAt,
    updateTimeDisplay,
  };
})();

'use strict';

// ─── Application State ─────────────────────────────────────────────
const STATE = {

  lat: 37.5088,
  lng: 127.0631,
  cityName: '서울',

  audioOn:     true,

  lpLevel: 3,

  // Interaction
  isDragging: false,
  dragStartX: 0, dragStartY: 0,
  dragStartAlt: 0, dragStartAz: 0,
  hoveredStarId: null,
  hoverStartTime: 0,
  hoveredConst: null,

  introPhase: 0,  // 0..6 (6=COMPLETE)
  introStartTime: 0,
