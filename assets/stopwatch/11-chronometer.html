<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>크로노미터</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23F3E9CE' stroke='%23C9A24A' stroke-width='5'/></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:"Georgia","Times New Roman",'Pretendard',serif;
    background:radial-gradient(circle at 50% 32%,#322a1a 0%,#1d1810 55%,#100b07 100%);
    display:flex;align-items:center;justify-content:center;color:#EADFC4;padding:14px}
  .stage{display:flex;flex-direction:column;align-items:center;gap:16px}

  .watch{position:relative;width:262px;height:262px}
  /* 금 케이스 */
  .case{position:absolute;inset:0;border-radius:50%;padding:13px;
    background:conic-gradient(from 125deg,#6e5418,#e9cf86,#b8902f,#f3dca0,#8a6a2a,#f0d894,#a8821e,#f3dca0,#6e5418);
    box-shadow:0 18px 40px rgba(0,0,0,.62),inset 0 2px 3px rgba(255,255,255,.6),inset 0 -5px 10px rgba(80,55,10,.6)}
  .case::before{content:"";position:absolute;inset:9px;border-radius:50%;
    box-shadow:inset 0 0 0 2px rgba(120,90,30,.55),inset 0 0 0 3px rgba(245,225,160,.35)}
  /* 크라운 */
  .crown{position:absolute;right:-7px;top:50%;transform:translateY(-50%);width:15px;height:30px;border-radius:4px;z-index:0;
    background:linear-gradient(90deg,#7a5e1e,#e9cf86 45%,#a8821e);
    box-shadow:0 3px 5px rgba(0,0,0,.5),inset 0 1px 1px rgba(255,255,255,.5)}
  .crown::after{content:"";position:absolute;inset:3px 4px;border-radius:2px;
    background:repeating-linear-gradient(90deg,rgba(80,55,10,.6) 0 1px,transparent 1px 3px)}
  /* 다이얼 */
  .dial{position:relative;width:100%;height:100%;border-radius:50%;overflow:hidden;
    background:radial-gradient(circle at 50% 40%,#FBF4DF 0%,#EFE0BC 62%,#DEC99B 100%);
    box-shadow:inset 0 3px 10px rgba(120,90,40,.32),inset 0 -2px 6px rgba(120,90,40,.2)}
  .dialsvg{position:absolute;inset:0;width:100%;height:100%}
  .brand{position:absolute;top:29%;left:0;right:0;text-align:center;z-index:1;
    font-style:italic;font-weight:700;font-size:19px;color:#7A5A1E;letter-spacing:.5px;text-shadow:0 1px 0 rgba(255,255,255,.4)}
  .stars{position:absolute;top:67%;left:0;right:0;text-align:center;z-index:1;color:#8A6A22;font-size:10px;font-weight:700;letter-spacing:1.5px;text-indent:1.5px;font-variant-numeric:tabular-nums}
  /* 중앙 디지털 카르투슈 */
  .cartouche{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1;
    padding:5px 14px;border-radius:7px;
    background:linear-gradient(180deg,#2b2114,#15100a);
    border:2px solid #C9A24A;
    box-shadow:0 2px 7px rgba(0,0,0,.45),inset 0 0 8px rgba(0,0,0,.55),inset 0 1px 0 rgba(245,225,160,.25)}
  .time{font-weight:700;font-variant-numeric:tabular-nums;font-size:27px;color:#F3DFA2;letter-spacing:1px;
    text-shadow:0 0 6px rgba(201,162,71,.35)}
  .time .cs{font-size:15px;color:#C9A24A}

  .row{display:flex;gap:9px}
  button{font-family:inherit;font-weight:700;font-size:11px;cursor:pointer;padding:10px 0;width:70px;border-radius:22px;
    border:1px solid #C9A24A;background:linear-gradient(180deg,rgba(60,48,26,.6),rgba(28,21,12,.7));color:#EADFC4;
    transition:transform .07s,background .15s;box-shadow:inset 0 1px 0 rgba(245,225,160,.18),0 3px 8px rgba(0,0,0,.4)}
  button:active{transform:translateY(2px)}
  #b1{background:linear-gradient(180deg,#E8CF86,#B8902F);color:#2a2010;border-color:#F0DCA0;
    box-shadow:0 3px 10px rgba(201,162,71,.4),inset 0 1px 0 rgba(255,255,255,.5)}
  #b1.run{background:linear-gradient(180deg,#9a2f1a,#6e1f10);color:#f4eeda;border-color:#9a2f1a}
  button:disabled{opacity:.4;cursor:default}
  .recs{width:100%;max-width:228px;display:flex;flex-direction:column;gap:4px;max-height:60px;overflow:auto}
  .recs div{display:flex;justify-content:space-between;font-size:12px;color:#CDB680;border-bottom:1px solid rgba(201,162,71,.2);padding:3px 4px;font-variant-numeric:tabular-nums}
  .recs .mk{color:#C9A24A}
  button:focus-visible{outline:2px solid #F3DFA2;outline-offset:2px}
</style>
</head>
<body>
  <div class="stage">
    <div class="watch">
      <div class="crown" aria-hidden="true"></div>
      <div class="case">
        <div class="dial">
          <svg class="dialsvg" viewBox="0 0 200 200" id="dialsvg" aria-hidden="true"></svg>
          <div class="brand">Chronometer</div>
          <div class="cartouche"><span class="time"><span id="t">00:00<span class="cs">.00</span></span></span></div>
          <div class="stars" id="lapline">✦ ✦ ✦</div>
        </div>
      </div>
    </div>
    <div class="row">
      <button id="b1">START</button>
      <button id="b2" disabled>LAP</button>
      <button id="b3" disabled>RESET</button>
    </div>
  </div>
<script>
(function(){
  // ── 다이얼 디테일 생성 (선버스트 기요셰 + 분 트랙 + 금 인덱스) ──
  var ns="http://www.w3.org/2000/svg",svg=document.getElementById("dialsvg"),cx=100,cy=100;
  function ln(x1,y1,x2,y2,s,w,cap){var l=document.createElementNS(ns,"line");
    l.setAttribute("x1",x1.toFixed(2));l.setAttribute("y1",y1.toFixed(2));l.setAttribute("x2",x2.toFixed(2));l.setAttribute("y2",y2.toFixed(2));
    l.setAttribute("stroke",s);l.setAttribute("stroke-width",w);if(cap)l.setAttribute("stroke-linecap",cap);svg.appendChild(l);}
  // 선버스트 (가는 방사선)
  for(var i=0;i<200;i++){var a=i*1.8*Math.PI/180;ln(cx+16*Math.sin(a),cy-16*Math.cos(a),cx+86*Math.sin(a),cy-86*Math.cos(a),i%2?"rgba(150,115,40,.05)":"rgba(110,82,26,.09)",0.6);}
  // 동심원 (바리콘 느낌)
  for(var r=26;r<=82;r+=7){var c=document.createElementNS(ns,"circle");c.setAttribute("cx",cx);c.setAttribute("cy",cy);c.setAttribute("r",r);c.setAttribute("fill","none");c.setAttribute("stroke","rgba(140,105,36,.05)");c.setAttribute("stroke-width","0.6");svg.appendChild(c);}
  // 분 트랙
  var ring=document.createElementNS(ns,"circle");ring.setAttribute("cx",cx);ring.setAttribute("cy",cy);ring.setAttribute("r",90);ring.setAttribute("fill","none");ring.setAttribute("stroke","rgba(122,90,30,.5)");ring.setAttribute("stroke-width","1");svg.appendChild(ring);
  for(var i=0;i<60;i++){var a=i*6*Math.PI/180,maj=i%5===0;ln(cx+(maj?82:86)*Math.sin(a),cy-(maj?82:86)*Math.cos(a),cx+90*Math.sin(a),cy-90*Math.cos(a),"#7A5A1E",maj?1.6:0.7,"round");}
  // 금 시간 인덱스 (12개)
  for(var h=0;h<12;h++){var a=h*30*Math.PI/180;ln(cx+67*Math.sin(a),cy-67*Math.cos(a),cx+78*Math.sin(a),cy-78*Math.cos(a),"#B8902F",h%3===0?3.4:2.4,"round");}

  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3'),lapline=document.getElementById('lapline');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(cc).padStart(2,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){b1.textContent=run?'STOP':(el()>0?'RESUME':'START');b1.classList.toggle('run',run);b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lapline.textContent='✦ ✦ ✦';}
  function lap(){if(!run)return;var e=el();last=e;laps.push(e);lapline.textContent='LAP '+laps.length+'  ·  '+plain(e);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
