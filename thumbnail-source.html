<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Thumbnail</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; background: #1a0f0a; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    background: radial-gradient(ellipse at 30% 40%, #3a241a 0%, #1a0f0a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .card {
    width: 1060px;
    height: 500px;
    border-radius: 40px;
    background: linear-gradient(135deg, #c9674a 0%, #a84e30 60%, #8a3d24 100%);
    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.15),
      inset 0 -3px 0 rgba(0,0,0,0.25),
      0 40px 80px rgba(0,0,0,0.5);
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 20% 0%, rgba(255,255,255,0.12) 0%, transparent 50%);
    pointer-events: none;
  }
  .icons {
    position: absolute;
    top: 28px;
    right: 32px;
    display: flex;
    gap: 12px;
  }
  .icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(255,255,255,0.9);
  }
  .icon svg { width: 20px; height: 20px; }
  .eyebrow {
    color: rgba(255,255,255,0.85);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.3em;
    margin-bottom: 28px;
  }
  .title {
    color: #ffffff;
    font-size: 64px;
    font-weight: 900;
    letter-spacing: -0.02em;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    margin-bottom: 28px;
    white-space: nowrap;
  }
  .subtitle {
    color: rgba(255,255,255,0.88);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .logo {
    position: absolute;
    bottom: 32px;
    right: 40px;
    color: rgba(255,255,255,0.22);
    font-size: 38px;
    font-weight: 900;
    font-style: italic;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="card">
<div class="eyebrow">AI ROASTING</div>
    <div class="title">비즈니스 리더를 위한 Claude 완전 정복</div>
    <div class="subtitle">AI와 함께 일하는 5단계 실전 가이드 · 진단부터 자동화까지</div>
    <div class="logo">AI ROASTING</div>
  </div>
</body>
</html>
