<!-- ===================================================================
  _shell.html — 통합 HTML 골격 (HEAD/STYLE/HEADER/PROGRESS + 푸터/스크립트)

  병합 방식:
  최종 HTML = _shell.html 상단부
            + fragments/stage_1-1.html
            + fragments/stage_2-1.html
            + ... (완료된 스테이지 순서대로)
            + 공통 산출물 섹션(BOM/레시피/체크리스트/출처)
            + _shell.html 하단부

  병합 스크립트: assets/merge.py 사용 (아래 빌드 방법 참조)
==================================================================== -->
<!-- @@SHELL_TOP@@ -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{브랜드명}} — {{메뉴명}} 메뉴개발 사이클 결과</title>
<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --ink:#1f2733; --muted:#6b7280;
  --line:#e5e7eb; --brand:#16432f; --brand-soft:#e8f0ea; --accent:#c8a24a;
  --ok:#15803d; --warn:#b45309; --bad:#b91c1c; --info:#1d4ed8;
  --shadow:0 1px 4px rgba(0,0,0,.09);
  --stage1:#16432f; --stage2:#1a5c8a; --stage3:#7c3aed;
  --stage4:#b45309; --stage5:#065f46; --stage6:#9d174d;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  line-height:1.65;font-size:15px;}

/* ── TOP HEADER ── */
.doc-header{background:var(--brand);color:#fff;padding:32px 40px 28px;}
.doc-header .eyebrow{font-size:12px;letter-spacing:.14em;color:var(--accent);
  text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.doc-header h1{margin:0 0 12px;font-size:30px;font-weight:900;letter-spacing:-.02em;}
.doc-header .meta{display:flex;flex-wrap:wrap;gap:6px 24px;font-size:13px;color:#c5d9ce;}
.doc-header .meta b{color:#fff;}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;
  font-weight:700;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.15);
  color:#fff;border:1px solid rgba(255,255,255,.3);}
.status-badge.done{background:#dcfce7;color:#14532d;border-color:#86efac;}
.status-badge.disc{background:#fee2e2;color:#7f1d1d;border-color:#fca5a5;}

/* ── PROGRESS TIMELINE ── */
.progress-wrap{background:#fff;border-bottom:1px solid var(--line);padding:20px 40px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.progress-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:10px;}
.progress-track{display:flex;align-items:center;gap:0;overflow-x:auto;padding-bottom:4px;}
.prog-stage{display:flex;align-items:center;gap:0;flex:1;min-width:78px;}
.prog-node{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;
  min-width:78px;}
.prog-dot{width:32px;height:32px;border-radius:50%;border:2.5px solid var(--line);
  background:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:var(--muted);transition:.2s;}
.prog-node.done .prog-dot{background:var(--ok);border-color:var(--ok);color:#fff;}
.prog-node.active .prog-dot{background:var(--brand);border-color:var(--brand);color:#fff;
  box-shadow:0 0 0 4px rgba(22,67,47,.15);}
.prog-node.disc .prog-dot{background:var(--bad);border-color:var(--bad);color:#fff;}
.prog-node.revise .prog-dot{background:var(--warn);border-color:var(--warn);color:#fff;}
.prog-node.pending .prog-dot{background:#fff;border-style:dashed;}
.prog-name{font-size:10.5px;font-weight:600;color:var(--muted);text-align:center;
  max-width:76px;line-height:1.3;}
.prog-node.done .prog-name,.prog-node.active .prog-name{color:var(--ink);}
.prog-connector{flex:1;height:2.5px;background:var(--line);min-width:14px;}
.prog-connector.done{background:var(--ok);}

/* ── MAIN ── */
.wrap{max-width:980px;margin:0 auto;padding:32px 24px 80px;}

/* ── PHASE HEADER ── */
.phase-header{display:flex;align-items:center;gap:14px;margin:36px 0 16px;}
.phase-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:17px;font-weight:900;color:#fff;flex:none;}
.phase-title{font-size:20px;font-weight:900;letter-spacing:-.01em;}
.phase-subtitle{font-size:13px;color:var(--muted);margin-top:2px;}

/* ── STAGE CARD ── */
.stage-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  margin-bottom:14px;box-shadow:var(--shadow);overflow:hidden;}
.stage-card.pending{opacity:.6;}
.stage-card-header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;cursor:pointer;user-select:none;transition:background .15s;}
.stage-card-header:hover{background:#fafbfc;}
.stage-card-header.open{background:var(--brand-soft);}
.stage-info{display:flex;align-items:center;gap:12px;}
.stage-num{font-size:12px;font-weight:800;color:#fff;background:var(--brand);
  padding:3px 9px;border-radius:6px;letter-spacing:.04em;}
.stage-name{font-size:16px;font-weight:800;}
.stage-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.stage-right{display:flex;align-items:center;gap:10px;}
.stage-score-badge{font-size:12px;font-weight:800;padding:3px 10px;border-radius:999px;}
.score-pass{background:#dcfce7;color:#14532d;}
.score-fail{background:#fee2e2;color:#7f1d1d;}
.score-warn{background:#fef3c7;color:#92400e;}
.score-pending{background:#f3f4f6;color:#6b7280;}
.chevron{font-size:18px;color:var(--muted);transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.stage-body{display:none;padding:0 20px 20px;border-top:1px solid var(--line);}
.stage-body.open{display:block;}

/* ── CRITERIA ── */
.criteria-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0;}
.crit-box{background:#f8faf8;border:1px solid var(--line);border-radius:10px;padding:11px 14px;}
.crit-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:4px;}
.crit-val{font-size:13.5px;color:var(--ink);}

/* ── STAGE CHECKLIST (점검표) ── */
.stage-check{background:#fffdf5;border:1px solid #f0e6c8;border-radius:10px;
  padding:14px 16px;margin:14px 0;}
.stage-check h5{margin:0 0 10px;font-size:13px;font-weight:800;color:var(--warn);
  display:flex;align-items:center;gap:6px;}
.stage-check ul{list-style:none;margin:0;padding:0;}
.stage-check li{display:flex;align-items:flex-start;gap:9px;padding:5px 0;font-size:13px;}
.stage-check .ck{flex:none;width:18px;height:18px;border-radius:5px;display:flex;
  align-items:center;justify-content:center;font-size:12px;font-weight:900;margin-top:1px;}
.stage-check .ck.on{background:var(--ok);color:#fff;}
.stage-check .ck.off{background:#fff;border:1.5px solid var(--line);color:transparent;}
.stage-check li.crit .label::after{content:" ★";color:var(--accent);font-size:11px;}

/* ── DISCUSSION ── */
.disc-section{margin-top:18px;}
.disc-section h4{font-size:14px;font-weight:800;color:var(--brand);margin:0 0 12px;
  display:flex;align-items:center;gap:8px;}
.disc-section h4::after{content:"";flex:1;height:1px;background:var(--brand-soft);}
.round-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.round-tab{font-size:12px;font-weight:700;padding:5px 12px;border-radius:999px;
  border:1.5px solid var(--line);cursor:pointer;background:#fff;color:var(--muted);transition:.15s;}
.round-tab.active{background:var(--brand);color:#fff;border-color:var(--brand);}
.round-tab.pass{border-color:var(--ok);color:var(--ok);}
.round-tab.pass.active{background:var(--ok);color:#fff;}
.round-content{display:none;}
.round-content.active{display:block;}

/* ── PERSONA ── */
.persona-comments{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.persona-card{background:#fafbfc;border-left:3px solid var(--accent);
  border-radius:0 10px 10px 0;padding:11px 14px;}
.persona-name{font-size:12px;font-weight:800;color:var(--brand);margin-bottom:4px;
  display:flex;align-items:center;gap:6px;}
.persona-role-badge{font-size:10px;background:var(--brand-soft);color:var(--brand);
  padding:1px 6px;border-radius:4px;font-weight:700;}
.persona-text{font-size:13.5px;line-height:1.7;}
.persona-text .diag{font-weight:700;color:var(--ink);}
.persona-text .sugg{color:var(--muted);}

/* ── SCORE TABLE ── */
.score-table-wrap{margin-top:14px;}
table.score-tbl{width:100%;border-collapse:collapse;font-size:13.5px;}
table.score-tbl th,table.score-tbl td{border:1px solid var(--line);padding:8px 12px;vertical-align:top;}
table.score-tbl th{background:var(--brand-soft);font-weight:700;color:var(--brand);}
td.score-num{text-align:center;font-weight:800;font-variant-numeric:tabular-nums;}
td.score-num.pass{color:var(--ok);}
td.score-num.fail{color:var(--bad);}
td.score-num.warn{color:var(--warn);}
.round-verdict{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;}
.verdict-icon{font-size:16px;}

/* ── CONCLUSION ── */
.conclusion-box{background:var(--brand-soft);border:1px solid #b2d0be;border-radius:10px;
  padding:14px 16px;margin-top:16px;}
.conclusion-box .label{font-size:11px;font-weight:800;color:var(--brand);
  letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
.conclusion-box ul{margin:0;padding-left:18px;}
.conclusion-box li{font-size:13.5px;margin-bottom:4px;}

/* ── SENSORY (관능 정량 시트) ── */
.sensory-box{background:#f5f8ff;border:1px solid #cdddf7;border-radius:10px;
  padding:14px 16px;margin-top:16px;}
.sensory-box h5{margin:0 0 10px;font-size:13px;font-weight:800;color:var(--info);}
table.sensory{width:100%;border-collapse:collapse;font-size:13px;}
table.sensory th,table.sensory td{border:1px solid #cdddf7;padding:6px 10px;}
table.sensory th{background:#e5eefb;color:#1e40af;font-weight:700;}
table.sensory td.sc{text-align:center;font-weight:800;font-variant-numeric:tabular-nums;}

/* ── GATE ── */
.gate-box{border-radius:12px;padding:16px 20px;margin-top:16px;
  display:flex;align-items:center;gap:14px;font-size:14px;}
.gate-box.intro{background:#dcfce7;border:2px solid #86efac;}
.gate-box.revise{background:#fef3c7;border:2px solid #fcd34d;}
.gate-box.discard{background:#fee2e2;border:2px solid #fca5a5;}
.gate-icon{font-size:28px;flex:none;}
.gate-label{font-weight:800;font-size:16px;margin-bottom:2px;}
.gate-reason{font-size:13px;color:var(--muted);}

/* ── BOM ── */
.bom-section,.recipe-section,.checklist-section,.source-section,.history-section,.allergen-section{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:22px 24px;margin-top:20px;box-shadow:var(--shadow);}
.bom-section h3,.recipe-section h3,.checklist-section h3,.source-section h3,
.history-section h3,.allergen-section h3{font-size:17px;font-weight:800;margin:0 0 16px;
  color:var(--brand);display:flex;align-items:center;gap:8px;}
table.bom{width:100%;border-collapse:collapse;font-size:13.5px;}
table.bom th,table.bom td{border:1px solid var(--line);padding:8px 11px;}
table.bom th{background:var(--brand-soft);font-weight:700;color:var(--brand);text-align:left;}
table.bom td.r{text-align:right;font-variant-numeric:tabular-nums;}
table.bom tfoot td{font-weight:800;background:#f8faf8;}
.cost-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px;}
.cost-kv{background:var(--brand-soft);border-radius:10px;padding:12px 14px;}
.cost-kv .k{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-bottom:4px;}
.cost-kv .v{font-size:20px;font-weight:900;color:var(--brand);}
.cost-kv .v.warn{color:var(--warn);}
.cost-kv .v.bad{color:var(--bad);}

/* ── RECIPE ── */
.recipe-steps{counter-reset:step;}
.recipe-step{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;}
.step-num{width:28px;height:28px;background:var(--brand);color:#fff;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none;}
.step-body{flex:1;}
.step-title{font-weight:700;font-size:14px;margin-bottom:3px;}
.step-desc{font-size:13.5px;color:#374151;}
.ccp-tag{display:inline-block;font-size:10px;font-weight:800;background:#fee2e2;color:#b91c1c;
  padding:1px 6px;border-radius:4px;margin-left:6px;}

/* ── ALLERGEN ── */
.allergen-grid{display:flex;flex-wrap:wrap;gap:8px;}
.allergen-chip{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;
  background:#f3f4f6;color:#6b7280;border:1px solid var(--line);}
.allergen-chip.on{background:#fef2f2;color:#b91c1c;border-color:#fca5a5;}

/* ── CHECKLIST ── */
.checklist{list-style:none;padding:0;margin:0;}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:8px 0;
  border-bottom:1px dashed var(--line);font-size:13.5px;}
.checklist li:last-child{border-bottom:none;}
.check-icon{flex:none;font-size:16px;margin-top:1px;}
.check-icon.done{color:var(--ok);}
.check-icon.pend{color:var(--muted);}

/* ── SOURCE ── */
table.src{width:100%;border-collapse:collapse;font-size:13px;}
table.src th,table.src td{border:1px solid var(--line);padding:7px 11px;vertical-align:top;}
table.src th{background:var(--brand-soft);font-weight:700;color:var(--brand);}
.tier-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
.tier1{background:#dbeafe;color:#1e40af;}
.tier2{background:#dcfce7;color:#14532d;}
.tier3{background:#f3f4f6;color:#4b5563;}

/* ── HISTORY ── */
.history-item{display:flex;gap:14px;margin-bottom:14px;}
.hist-dot{width:10px;height:10px;border-radius:50%;background:var(--warn);flex:none;margin-top:5px;}
.hist-label{font-size:12px;font-weight:700;color:var(--warn);}
.hist-desc{font-size:13.5px;margin-top:2px;}

/* ── USER VOICE (사용자 의견 안건) ── */
.user-voice{background:#fff7ed;border:1px solid #fed7aa;border-left:4px solid var(--accent);
  border-radius:0 10px 10px 0;padding:13px 16px;margin:14px 0;}
.user-voice .uv-label{font-size:11px;font-weight:800;color:var(--warn);letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.user-voice .uv-body{font-size:13.5px;line-height:1.7;}
.user-voice ul{margin:6px 0 0;padding-left:18px;}
.user-voice li{font-size:13.5px;margin-bottom:3px;}

/* ── GATE PROMPT (사용자 확인 게이트 표시) ── */
.gate-prompt{background:#eef6f0;border:1.5px dashed var(--brand);border-radius:10px;
  padding:13px 16px;margin:16px 0;display:flex;align-items:center;gap:10px;font-size:13.5px;}
.gate-prompt .gp-icon{font-size:18px;}
.gate-prompt b{color:var(--brand);}

/* ── PLAN TABLE (기획서/분석표 공통, 인쇄·복사용) ── */
.plan-section{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:22px 24px;margin-top:20px;box-shadow:var(--shadow);}
.plan-section h3{font-size:17px;font-weight:800;margin:0 0 16px;color:var(--brand);
  display:flex;align-items:center;gap:8px;}
table.plan{width:100%;border-collapse:collapse;font-size:13.5px;}
table.plan th,table.plan td{border:1px solid var(--line);padding:9px 12px;vertical-align:top;text-align:left;}
table.plan th{background:var(--brand-soft);font-weight:700;color:var(--brand);white-space:nowrap;}
table.plan td.r{text-align:right;font-variant-numeric:tabular-nums;}
.plan-kv{display:grid;grid-template-columns:130px 1fr;gap:1px;background:var(--line);
  border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:13.5px;}
.plan-kv dt{background:var(--brand-soft);color:var(--brand);font-weight:700;padding:9px 12px;}
.plan-kv dd{background:#fff;margin:0;padding:9px 12px;}
.highlight-cell{background:#dcfce7;font-weight:700;}

/* ── INTERACTIVE RECIPE CARDS (2-1) ── */
.recipe-cards{display:flex;flex-direction:column;gap:18px;margin-top:8px;}
.rc-card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow);overflow:hidden;}
.rc-card.selected{border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft);}
.rc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;
  padding:16px 20px;background:var(--brand-soft);border-bottom:1px solid var(--line);}
.rc-title{font-size:16px;font-weight:800;color:var(--brand);}
.rc-tagline{font-size:12.5px;color:var(--muted);margin-top:3px;}
.rc-select-btn{font-size:12px;font-weight:700;padding:6px 14px;border-radius:999px;
  border:1.5px solid var(--brand);background:#fff;color:var(--brand);cursor:pointer;white-space:nowrap;}
.rc-card.selected .rc-select-btn{background:var(--brand);color:#fff;}
.rc-body{padding:16px 20px;}
table.rc-tbl{width:100%;border-collapse:collapse;font-size:13px;}
table.rc-tbl th,table.rc-tbl td{border:1px solid var(--line);padding:6px 9px;}
table.rc-tbl th{background:#f8faf8;font-weight:700;color:var(--brand);text-align:left;}
table.rc-tbl td.r{text-align:right;font-variant-numeric:tabular-nums;}
.rc-tbl input[type=number]{width:64px;padding:3px 6px;border:1px solid var(--line);
  border-radius:6px;font-size:13px;text-align:right;font-variant-numeric:tabular-nums;}
.rc-del{background:#fee2e2;color:#b91c1c;border:none;border-radius:6px;width:24px;height:24px;
  cursor:pointer;font-weight:800;font-size:13px;}
.rc-add-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center;}
.rc-add-row input{padding:5px 9px;border:1px solid var(--line);border-radius:7px;font-size:13px;}
.rc-add-row input.nm{flex:1;min-width:120px;}
.rc-add-btn{background:var(--brand);color:#fff;border:none;border-radius:7px;padding:6px 14px;
  font-size:13px;font-weight:700;cursor:pointer;}
.rc-cost{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.rc-cost .kv{background:var(--brand-soft);border-radius:9px;padding:10px 12px;}
.rc-cost .k{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:3px;}
.rc-cost .v{font-size:18px;font-weight:900;color:var(--brand);font-variant-numeric:tabular-nums;}
.rc-cost .v.warn{color:var(--warn);}
.rc-cost .v.bad{color:var(--bad);}
.rc-steps{margin-top:14px;}
.rc-steps h6{margin:0 0 8px;font-size:12px;font-weight:800;color:var(--brand);letter-spacing:.04em;}
.rc-steps ol{margin:0;padding-left:20px;font-size:13px;line-height:1.7;}
.rc-meta{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted);}
.rc-meta b{color:var(--ink);}
.price-input{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;}
.price-input input{width:90px;padding:5px 8px;border:1px solid var(--line);border-radius:7px;
  text-align:right;font-variant-numeric:tabular-nums;font-size:13px;}

/* ── DOC LINK CARDS (1-1 연결 문서) ── */
.doc-link-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.doc-link{display:flex;align-items:center;gap:12px;text-decoration:none;color:inherit;
  background:#fafbfc;border:1px solid var(--line);border-radius:11px;padding:14px 16px;transition:.15s;}
.doc-link:hover{border-color:var(--brand);background:var(--brand-soft);box-shadow:var(--shadow);}
.doc-link .dl-icon{font-size:26px;flex:none;}
.doc-link .dl-body{flex:1;}
.doc-link .dl-title{font-size:14.5px;font-weight:800;color:var(--brand);}
.doc-link .dl-desc{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
.doc-link .dl-open{font-size:12.5px;font-weight:700;color:var(--brand);white-space:nowrap;}
@media(max-width:640px){.doc-link-grid{grid-template-columns:1fr;}}

<script>
/*__DOC_TOOLBAR_JS__*/
</script>
<script>
function toggleStage(header){
  const body=header.nextElementSibling;
  const chevron=header.querySelector('.chevron');
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  header.classList.toggle('open',!isOpen);
  if(chevron) chevron.classList.toggle('open',!isOpen);
}
function switchRound(tab,contentId){
  const tabs=tab.parentElement.querySelectorAll('.round-tab');
  tabs.forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  const contents=tab.closest('.disc-section').querySelectorAll('.round-content');
  contents.forEach(c=>c.classList.remove('active'));
  document.getElementById(contentId).classList.add('active');
}
function scrollToStage(id){
  const el=document.getElementById(id);
  if(!el) return;
  const header=el.querySelector('.stage-card-header');
  const body=el.querySelector('.stage-body');
  const chevron=header.querySelector('.chevron');
  body.classList.add('open');header.classList.add('open');
  if(chevron) chevron.classList.add('open');
  setTimeout(()=>el.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
document.addEventListener('DOMContentLoaded',()=>{
  const firstHeader=document.querySelector('.stage-card-header');
  if(firstHeader) toggleStage(firstHeader);
});
</script>
</body>
