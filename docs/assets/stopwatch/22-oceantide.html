<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오션 타이드 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    position:relative;overflow:hidden;color:#EAF7F7;
    display:flex;align-items:center;justify-content:center;padding:14px;
    background:linear-gradient(180deg,#032B33 0%,#0B5B63 46%,#2BA3A8 100%)}
  /* ── 기포 ── */
  .bub{position:absolute;bottom:-40px;border-radius:50%;
    background:radial-gradient(circle at 34% 30%,rgba(255,255,255,.5),rgba(255,255,255,.08) 62%);
    animation:rise linear infinite;opacity:.55}
  @keyframes rise{to{transform:translateY(-120vh)}}
  .bub:nth-child(1){left:6%;width:18px;height:18px;animation-duration:13s;animation-delay:-3s}
  .bub:nth-child(2){left:16%;width:9px;height:9px;animation-duration:10s;animation-delay:-7s;filter:blur(1px)}
  .bub:nth-child(3){left:30%;width:13px;height:13px;animation-duration:15s;animation-delay:-11s}
  .bub:nth-child(4){left:52%;width:8px;height:8px;animation-duration:9s;animation-delay:-2s;filter:blur(1.5px)}
  .bub:nth-child(5){left:66%;width:16px;height:16px;animation-duration:14s;animation-delay:-9s}
  .bub:nth-child(6){left:80%;width:11px;height:11px;animation-duration:11s;animation-delay:-5s;filter:blur(1px)}
  .bub:nth-child(7){left:90%;width:20px;height:20px;animation-duration:16s;animation-delay:-13s;filter:blur(2px)}
  body.go .bub{animation-duration:7s}
  body.go .bub:nth-child(2){animation-duration:5.5s}
  body.go .bub:nth-child(4){animation-duration:5s}
  body.go .bub:nth-child(7){animation-duration:8s}
  /* ── 글래스 카드 ── */
  .panel{position:relative;z-index:2;width:100%;max-width:300px;padding:26px 20px 20px;border-radius:26px;
    background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.22);
    -webkit-backdrop-filter:blur(9px);backdrop-filter:blur(9px);
    box-shadow:0 16px 44px rgba(0,20,26,.35);
    display:flex;flex-direction:column;align-items:center;gap:15px}
  .title{font-size:15px;font-weight:700;letter-spacing:7px;color:#F2FBFB;text-indent:7px}
  .subtitle{font-size:9px;font-weight:600;letter-spacing:3.5px;color:rgba(220,245,245,.55);margin-top:-11px;text-indent:3.5px}
  .time{font-variant-numeric:tabular-nums;font-weight:200;font-size:36px;letter-spacing:1px;color:#F4FDFD;margin-top:4px}
  .time .cs{font-size:19px;color:rgba(210,240,240,.6)}
  .glowline{width:64px;height:3px;border-radius:3px;margin-top:-4px;
    background:linear-gradient(90deg,transparent,#9FE8E4,transparent);
    box-shadow:0 0 10px rgba(140,230,225,.7)}
  body.go .glowline{animation:tideGlow 2.4s ease-in-out infinite}
  @keyframes tideGlow{50%{box-shadow:0 0 18px rgba(140,230,225,1);width:88px}}
  .row{display:flex;gap:11px;margin-top:5px}
  button{font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;
    padding:12px 0;width:74px;border-radius:26px;transition:all .18s;color:#EAF7F7}
  button:disabled{opacity:.38;cursor:default}
  button:focus-visible{outline:2px solid #9FE8E4;outline-offset:2px}
  #b1{border:none;background:linear-gradient(135deg,#2FA9A4,#127A7C);
    box-shadow:0 4px 16px rgba(30,150,145,.45)}
  #b1:hover{box-shadow:0 4px 22px rgba(40,180,170,.6)}
  #b2,#b3{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.30)}
  #b2:hover:not(:disabled),#b3:hover:not(:disabled){background:rgba(255,255,255,.13)}
  .rule{width:100%;border-top:1px solid rgba(255,255,255,.18);margin-top:6px}
  .laps{width:100%;min-height:16px;font-size:11.5px;font-weight:500;letter-spacing:.5px;
    color:rgba(220,245,245,.72);text-align:center;font-variant-numeric:tabular-nums}
  @media (prefers-reduced-motion: reduce){.bub{animation:none;display:none}.glowline{animation:none !important}}
</style>
</head>
<body>
  <span class="bub" aria-hidden="true"></span><span class="bub" aria-hidden="true"></span>
  <span class="bub" aria-hidden="true"></span><span class="bub" aria-hidden="true"></span>
  <span class="bub" aria-hidden="true"></span><span class="bub" aria-hidden="true"></span>
  <span class="bub" aria-hidden="true"></span>

  <div class="panel">
    <div class="title">OCEAN TIDE</div>
    <div class="subtitle">TIME FLOWS LIKE THE SEA</div>
    <div class="time"><span id="t">00:00:00<span class="cs">.000</span></span></div>
    <div class="glowline" aria-hidden="true"></div>
    <div class="row">
      <button id="b1">시작</button>
      <button id="b2" disabled>랩</button>
      <button id="b3" disabled>리셋</button>
    </div>
    <div class="rule" aria-hidden="true"></div>
    <div class="laps" id="lp"></div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),
      b3=document.getElementById('b3'),lp=document.getElementById('lp');
  var run=false,st=0,acc=0,iv=null,laps=[],last=0;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var mmm=Math.floor(ms)%1000,s=Math.floor(ms/1000),ss=s%60,m=Math.floor(s/60),mm=m%60,hh=Math.floor(m/60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(mmm).padStart(3,'0')+'</span>';}
  function plain(ms){if(ms<0)ms=0;var mmm=Math.floor(ms)%1000,s=Math.floor(ms/1000),ss=s%60,mm=Math.floor(s/60);
    return String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'.'+String(mmm).padStart(3,'0');}
  function draw(){t.innerHTML=f(el());}
  function ui(){document.body.classList.toggle('go',run);
    b1.textContent=run?'정지':(el()>0?'재개':'시작');
    b2.disabled=!run;b3.disabled=run||el()===0;}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;laps=[];last=0;draw();ui();lp.textContent='';}
  function lap(){if(!run)return;var e=el(),sp=e-last;last=e;laps.push(sp);
    lp.textContent='LAP '+laps.length+'  +'+plain(sp);}
  b1.onclick=function(){run?stop():start();};b2.onclick=lap;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
