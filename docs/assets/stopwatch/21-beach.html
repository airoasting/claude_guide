<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>여름 해변 스탑워치</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏖️</text></svg>" />
<style>
  @font-face{font-family:'Pretendard';src:url('../fonts/PretendardVariable.ttf') format('truetype');font-weight:100 900;font-style:normal;font-display:swap;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    position:relative;overflow:hidden;color:#3a4a58;
    display:flex;align-items:center;justify-content:center;padding:14px;
    background:linear-gradient(180deg,#9DD6F0 0%,#BCE6F7 100%)}
  /* ── 풍경 레이어 ── */
  .sun{position:absolute;top:7%;right:9%;width:52px;height:52px;border-radius:50%;
    background:radial-gradient(circle at 42% 38%,#FFE38A,#F7C94A 70%);
    box-shadow:0 0 26px rgba(255,214,90,.75)}
  .cloud{position:absolute;background:#fff;border-radius:40px;opacity:.92}
  .cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
  .c1{top:11%;left:9%;width:64px;height:20px}
  .c1::before{width:26px;height:26px;top:-13px;left:11px}
  .c1::after{width:19px;height:19px;top:-9px;left:32px}
  .c2{top:24%;left:56%;width:46px;height:15px}
  .c2::before{width:19px;height:19px;top:-9px;left:8px}
  .c2::after{width:14px;height:14px;top:-6px;left:24px}
  .sea{position:absolute;left:0;right:0;top:46%;bottom:0;background:linear-gradient(180deg,#3E8FC7 0%,#2E6FA8 100%)}
  .sea::before{content:'';position:absolute;top:-9px;left:0;right:0;height:18px;
    background:radial-gradient(circle at 9px 0,#3E8FC7 9px,transparent 9.5px);background-size:18px 18px}
  .wave{position:absolute;left:-40px;right:-40px;height:10px;top:26%;
    background:radial-gradient(circle at 8px 0,rgba(255,255,255,.5) 7px,transparent 7.5px);background-size:16px 10px}
  body.go .sea .wave{animation:waveDrift 3.2s linear infinite}
  @keyframes waveDrift{to{transform:translateX(16px)}}
  .sand{position:absolute;left:0;right:0;bottom:0;height:17%;background:linear-gradient(180deg,#E8CF9E 0%,#DDBE85 100%)}
  .sand::before{content:'';position:absolute;top:-4px;left:0;right:0;height:4px;
    background:rgba(255,255,255,.55);border-radius:4px 4px 0 0;filter:blur(1px)}
  .critter{position:absolute;font-size:13px;line-height:1}
  .cr1{left:12%;bottom:4%}
  .cr2{left:46%;bottom:9%}
  .cr3{right:14%;bottom:5%}
  .runner{position:absolute;left:50%;bottom:3.5%;transform:translateX(-50%);font-size:19px;line-height:1}
  body.go .runner{animation:runnerJog .55s ease-in-out infinite}
  @keyframes runnerJog{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
  /* ── 유리 카드 ── */
  .panel{position:relative;z-index:2;width:100%;max-width:296px;padding:22px 16px 18px;border-radius:22px;
    background:rgba(255,255,255,.34);border:1px solid rgba(255,255,255,.55);
    -webkit-backdrop-filter:blur(7px);backdrop-filter:blur(7px);
    box-shadow:0 12px 30px rgba(40,90,130,.18);
    display:flex;flex-direction:column;align-items:center;gap:14px}
  .title{font-size:13px;font-weight:800;letter-spacing:4px;color:#2E4A62}
  .time{font-variant-numeric:tabular-nums;font-weight:800;font-size:37px;letter-spacing:.5px;color:#243B50}
  .time .cs{font-size:21px;color:#3E6E96}
  /* ── 해파리 버튼 ── */
  .row{display:flex;gap:14px}
  button{position:relative;width:64px;height:66px;border:none;background:none;cursor:pointer;padding:0;
    transition:transform .08s,opacity .15s;filter:drop-shadow(0 5px 6px rgba(40,80,110,.22))}
  button:active{transform:translateY(3px)}
  button:disabled{opacity:.45;cursor:default}
  button:focus-visible{outline:3px solid #2E4A62;outline-offset:3px;border-radius:12px}
  button svg{width:100%;height:100%;display:block}
  button .lbl{position:absolute;left:0;right:0;bottom:22px;font-family:inherit;
    font-size:12px;font-weight:800;text-align:center;pointer-events:none}
  #b1 .lbl{color:#2E6B48}#b2 .lbl{color:#8A3226}#b3 .lbl{color:#2A4E86}
  body.go button .jelly{transform-origin:50% 100%}
  body.go #b2 .jelly{animation:jellySway 1.6s ease-in-out infinite}
  @keyframes jellySway{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  @media (prefers-reduced-motion: reduce){
    body.go .sea .wave,body.go .runner,body.go #b2 .jelly{animation:none}
  }
</style>
</head>
<body>
  <div class="sun" aria-hidden="true"></div>
  <div class="cloud c1" aria-hidden="true"></div>
  <div class="cloud c2" aria-hidden="true"></div>
  <div class="sea" aria-hidden="true"><div class="wave"></div></div>
  <div class="sand" aria-hidden="true">
    <span class="critter cr1">🦀</span>
    <span class="critter cr2">🐚</span>
    <span class="critter cr3">🦀</span>
    <span class="runner" id="runner">🏃</span>
  </div>

  <div class="panel">
    <div class="title">OCEAN STOPWATCH</div>
    <div class="time"><span id="t">00:00:00<span class="cs">.00</span></span></div>
    <div class="row">
      <button id="b1" aria-label="시작">
        <svg viewBox="0 0 64 66" aria-hidden="true"><g class="jelly">
          <path d="M8 40 A24 27 0 0 1 56 40 L52 46 L46 41 L40 47 L32 41 L24 47 L18 41 L12 46 Z" fill="#BFE3C9" stroke="#7FBF93" stroke-width="2"/>
          <path d="M32 14 L20 42 M32 14 L32 43 M32 14 L44 42" stroke="#8FCBA1" stroke-width="1.6" fill="none"/>
        </g></svg><span class="lbl">시작</span>
      </button>
      <button id="b2" aria-label="스톱" disabled>
        <svg viewBox="0 0 64 66" aria-hidden="true"><g class="jelly">
          <path d="M8 40 A24 27 0 0 1 56 40 L52 46 L46 41 L40 47 L32 41 L24 47 L18 41 L12 46 Z" fill="#F5B3AC" stroke="#DE7A6C" stroke-width="2"/>
          <path d="M32 14 L20 42 M32 14 L32 43 M32 14 L44 42" stroke="#E8938A" stroke-width="1.6" fill="none"/>
        </g></svg><span class="lbl">스톱</span>
      </button>
      <button id="b3" aria-label="리셋" disabled>
        <svg viewBox="0 0 64 66" aria-hidden="true"><g class="jelly">
          <path d="M8 40 A24 27 0 0 1 56 40 L52 46 L46 41 L40 47 L32 41 L24 47 L18 41 L12 46 Z" fill="#BBD4F2" stroke="#7FA6D9" stroke-width="2"/>
          <path d="M32 14 L20 42 M32 14 L32 43 M32 14 L44 42" stroke="#93B8E4" stroke-width="1.6" fill="none"/>
        </g></svg><span class="lbl">리셋</span>
      </button>
    </div>
  </div>
<script>
(function(){
  var t=document.getElementById('t'),b1=document.getElementById('b1'),b2=document.getElementById('b2'),b3=document.getElementById('b3');
  var run=false,st=0,acc=0,iv=null;
  function el(){return acc+(run?performance.now()-st:0);}
  function f(ms){if(ms<0)ms=0;var c=Math.floor(ms/10),cc=c%100,s=Math.floor(c/100),ss=s%60,m=Math.floor(s/60),mm=m%60,hh=Math.floor(m/60);
    return String(hh).padStart(2,'0')+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0')+'<span class="cs">.'+String(cc).padStart(2,'0')+'</span>';}
  function draw(){t.innerHTML=f(el());}
  function ui(){document.body.classList.toggle('go',run);
    b1.disabled=run;b2.disabled=!run;b3.disabled=run||el()===0;
    b1.querySelector('.lbl').textContent=(!run&&el()>0)?'재개':'시작';}
  function start(){run=true;st=performance.now();if(!iv)iv=setInterval(draw,31);draw();ui();}
  function stop(){if(!run)return;acc=el();run=false;clearInterval(iv);iv=null;draw();ui();}
  function reset(){run=false;clearInterval(iv);iv=null;acc=0;st=0;draw();ui();}
  b1.onclick=start;b2.onclick=stop;b3.onclick=reset;
  document.addEventListener('visibilitychange',function(){if(!document.hidden&&run)draw();});
  draw();ui();
})();
</script>
</body>
</html>
